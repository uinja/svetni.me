<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 8 5 L 0 8 z" fill="#1a30ae" />
    </marker>
    <marker id="arrow-fallback" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 8 5 L 0 8 z" fill="#ff4d4d" />
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1" />
    </filter>
  </defs>
  
  <!-- Canvas background -->
  <rect x="0" y="0" width="800" height="500" rx="16" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" />
  
  <!-- Title -->
  <text x="400" y="45" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#202124" text-anchor="middle">Мултивендорна ИИ Архитектура за Технологичен Суверенитет</text>
  
  <!-- User Query -->
  <rect x="50" y="210" width="140" height="80" rx="8" fill="#ffffff" stroke="#1a30ae" stroke-width="2" filter="url(#shadow)" />
  <text x="120" y="245" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#202124" text-anchor="middle">Заявка от</text>
  <text x="120" y="265" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#202124" text-anchor="middle">Потребител</text>
  
  <!-- Arrow from Query to Coordinator -->
  <path d="M 190 250 L 254 250" stroke="#1a30ae" stroke-width="2.5" marker-end="url(#arrow)" />
  
  <!-- Coordinator Layer Container -->
  <rect x="260" y="150" width="180" height="200" rx="12" fill="#f8f9fa" stroke="#1a30ae" stroke-width="2" stroke-dasharray="4 4" filter="url(#shadow)" />
  <text x="350" y="180" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1a30ae" text-anchor="middle">Управляващ слой</text>
  
  <!-- Inside Coordinator: Router Box -->
  <rect x="280" y="210" width="140" height="80" rx="8" fill="#1a30ae" stroke="none" />
  <text x="350" y="245" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Координатор</text>
  <text x="350" y="265" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">(напр. Sakana Fugu)</text>
  
  <!-- Route 1 (OpenAI GPT-5.6 - Blocked/Outage scenario) -->
  <path d="M 440 230 C 470 230, 470 120, 500 120 L 514 120" stroke="#ff4d4d" stroke-width="2.5" marker-end="url(#arrow-fallback)" stroke-dasharray="4" />
  
  <!-- Block symbol (Red X) -->
  <circle cx="480" cy="155" r="12" fill="#ff4d4d" />
  <path d="M 474 149 L 486 161 M 486 149 L 474 161" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
  <text x="480" y="135" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ff4d4d" text-anchor="middle">Ограничен износ</text>
  
  <!-- Route 2 (Anthropic Mythos - Fallback active) -->
  <path d="M 440 250 L 514 250" stroke="#1a30ae" stroke-width="2.5" marker-end="url(#arrow)" />
  <text x="475" y="242" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1a30ae" text-anchor="middle">Активен</text>
  
  <!-- Route 3 (Local / Alternative model) -->
  <path d="M 440 270 C 470 270, 470 380, 500 380 L 514 380" stroke="#1a30ae" stroke-width="2.5" marker-end="url(#arrow)" />
  <text x="475" y="330" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1a30ae" text-anchor="middle">Резервен</text>
  
  <!-- Fallback redirection arrow inside Coordinator -->
  <path d="M 458 178 C 440 178, 410 190, 410 210" stroke="#ff4d4d" stroke-width="2" marker-end="url(#arrow-fallback)" stroke-dasharray="3" />
  
  <!-- Model 1 (OpenAI GPT-5.6) -->
  <rect x="520" y="80" width="200" height="80" rx="8" fill="#ffffff" stroke="#ff4d4d" stroke-width="1.5" filter="url(#shadow)" opacity="0.6" />
  <text x="620" y="115" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#7f8c8d" text-anchor="middle">OpenAI GPT-5.6</text>
  <text x="620" y="135" font-family="system-ui, sans-serif" font-size="12" fill="#c0392b" text-anchor="middle">Преустановен достъп</text>
  
  <!-- Model 2 (Anthropic Mythos) -->
  <rect x="520" y="210" width="200" height="80" rx="8" fill="#ffffff" stroke="#1a30ae" stroke-width="2" filter="url(#shadow)" />
  <text x="620" y="245" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#202124" text-anchor="middle">Anthropic Mythos</text>
  <text x="620" y="265" font-family="system-ui, sans-serif" font-size="12" fill="#7f8c8d" text-anchor="middle">(Ограничен достъп)</text>
  
  <!-- Model 3 (Локални модели / Llama 3) -->
  <rect x="520" y="340" width="200" height="80" rx="8" fill="#ffffff" stroke="#1a30ae" stroke-width="2" filter="url(#shadow)" />
  <text x="620" y="375" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#202124" text-anchor="middle">Локален хостинг</text>
  <text x="620" y="395" font-family="system-ui, sans-serif" font-size="12" fill="#7f8c8d" text-anchor="middle">(Llama / Mistral / Qwen)</text>
  
  <!-- Legend / Explanation at the bottom -->
  <rect x="50" y="440" width="700" height="40" rx="6" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1" />
  <text x="400" y="464" font-family="system-ui, sans-serif" font-size="12" fill="#202124" text-anchor="middle">Системата автоматично пренасочва заявките към налични алтернативи при отпадане на даден доставчик.</text>
</svg>
