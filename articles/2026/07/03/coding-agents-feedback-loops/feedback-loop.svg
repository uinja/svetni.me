<svg width="100%" height="100%" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="var(--color-primary, #1a30ae)" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2e7d32" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#d32f2f" />
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Background (transparent) -->
  <rect width="800" height="500" fill="none" />

  <!-- Diagram Title -->
  <text x="400" y="40" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="var(--color-on-surface, #202124)" text-anchor="middle">
    Цикъл на обратна връзка при кодиращи агенти
  </text>

  <!-- 1. Agent Box -->
  <rect x="40" y="208" width="140" height="80" rx="8" fill="var(--color-primary, #1a30ae)" filter="url(#shadow)" />
  <text x="110" y="240" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="var(--color-on-primary, #ffffff)" text-anchor="middle" dominant-baseline="middle">
    Кодиращ агент
  </text>
  <text x="110" y="260" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-on-primary, #ffffff)" opacity="0.8" text-anchor="middle" dominant-baseline="middle">
    Claude / Cursor / Codex
  </text>

  <!-- 2. Git Worktree Container -->
  <rect x="228" y="88" width="344" height="320" rx="12" fill="none" stroke="var(--color-secondary, #1b31ae)" stroke-width="2" stroke-dasharray="6 6" />
  <text x="400" y="112" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="var(--color-secondary, #1b31ae)" text-anchor="middle" dominant-baseline="middle">
    Изолиран Git Worktree
  </text>

  <!-- 2a. Env files symlink -->
  <rect x="248" y="140" width="304" height="48" rx="6" fill="var(--color-surface, #f8f9fa)" stroke="var(--color-secondary, #1b31ae)" stroke-width="1" filter="url(#shadow)" />
  <text x="400" y="164" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface, #202124)" text-anchor="middle" dominant-baseline="middle">
    1. Symlink на .env (Единен източник)
  </text>

  <!-- 2b. Port isolation -->
  <rect x="248" y="204" width="304" height="48" rx="6" fill="var(--color-surface, #f8f9fa)" stroke="var(--color-secondary, #1b31ae)" stroke-width="1" filter="url(#shadow)" />
  <text x="400" y="228" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface, #202124)" text-anchor="middle" dominant-baseline="middle">
    2. Docker Compose (Свободни портове)
  </text>

  <!-- 2c. Bootstrap builds -->
  <rect x="248" y="268" width="304" height="48" rx="6" fill="var(--color-surface, #f8f9fa)" stroke="var(--color-secondary, #1b31ae)" stroke-width="1" filter="url(#shadow)" />
  <text x="400" y="292" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface, #202124)" text-anchor="middle" dominant-baseline="middle">
    3. postinstall Билд (Липсващи пакети)
  </text>

  <!-- 2d. Execution Harness -->
  <rect x="248" y="332" width="304" height="48" rx="6" fill="var(--color-surface, #f8f9fa)" stroke="var(--color-secondary, #1b31ae)" stroke-width="1" filter="url(#shadow)" />
  <text x="400" y="356" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface, #202124)" text-anchor="middle" dominant-baseline="middle">
    4. Makefile (Интерфейс за тестване)
  </text>

  <!-- 3. Validation Box -->
  <rect x="620" y="208" width="140" height="80" rx="8" fill="var(--color-tertiary, #1e33af)" filter="url(#shadow)" />
  <text x="690" y="240" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="var(--color-on-primary, #ffffff)" text-anchor="middle" dominant-baseline="middle">
    Валидиране на кода
  </text>
  <text x="690" y="260" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-on-primary, #ffffff)" opacity="0.8" text-anchor="middle" dominant-baseline="middle">
    Тестове, Lint &amp; Format
  </text>

  <!-- Connecting Lines -->
  <!-- Agent to Worktree -->
  <line x1="180" y1="248" x2="220" y2="248" stroke="var(--color-primary, #1a30ae)" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Worktree to Validation -->
  <line x1="572" y1="248" x2="612" y2="248" stroke="var(--color-primary, #1a30ae)" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Success Path (Green) -->
  <line x1="690" y1="288" x2="690" y2="352" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrow-green)" />
  <text x="704" y="320" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#2e7d32" dominant-baseline="middle">
    Успех
  </text>

  <!-- Success Target -->
  <rect x="620" y="360" width="140" height="48" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" />
  <text x="690" y="384" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#2e7d32" text-anchor="middle" dominant-baseline="middle">
    Готовност за Stage
  </text>

  <!-- Failure Path / Self-Correction Loop (Red/Primary) -->
  <!-- Top loop going back to Agent -->
  <path d="M 690,208 L 690,68 L 108,68 L 108,200" fill="none" stroke="#d32f2f" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow-red)" />
  
  <!-- Label for Failure Path -->
  <rect x="328" y="56" width="144" height="24" rx="4" fill="#ffebee" stroke="#d32f2f" stroke-width="1" />
  <text x="400" y="68" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#d32f2f" text-anchor="middle" dominant-baseline="middle">
    Грешка: Самокорекция
  </text>
</svg>
