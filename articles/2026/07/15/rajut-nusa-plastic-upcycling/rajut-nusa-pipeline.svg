<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <rect width="800" height="500" fill="#ffffff" rx="16" ry="16" />
  
  <!-- Flowchart Title -->
  <text x="400" y="52" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1a30ae">Производствен процес на Rajut Nusa</text>
  <text x="400" y="80" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="400" fill="#202124">Трансформиране на пластмасови отпадъци в занаятчийски продукти</text>

  <!-- Arrow Definitions -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#1a30ae" />
    </marker>
  </defs>

  <!-- Connection Lines (Arrows) -->
  <!-- Row 1: Step 1 to Step 2 -->
  <path d="M 240 160 L 312 160" stroke="#1a30ae" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <!-- Row 1: Step 2 to Step 3 -->
  <path d="M 480 160 L 552 160" stroke="#1a30ae" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <!-- Row 1 to Row 2: Step 3 to Step 4 -->
  <path d="M 640 200 L 640 292" stroke="#1a30ae" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <!-- Row 2: Step 4 to Step 5 -->
  <path d="M 560 340 L 488 340" stroke="#1a30ae" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <!-- Row 2: Step 5 to Step 6 -->
  <path d="M 320 340 L 248 340" stroke="#1a30ae" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- STEP 1: Събиране и сортиране -->
  <rect x="80" y="120" width="160" height="80" rx="8" ry="8" fill="#f0f2fd" stroke="#1a30ae" stroke-width="2" />
  <circle cx="96" cy="136" r="10" fill="#1a30ae" />
  <text x="96" y="137" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff">1</text>
  <text x="160" y="152" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#202124">Събиране &amp; сортиране</text>
  <text x="160" y="172" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#202124">Отпадъци от waste banks</text>

  <!-- STEP 2: Измиване и почистване -->
  <rect x="320" y="120" width="160" height="80" rx="8" ry="8" fill="#f0f2fd" stroke="#1a30ae" stroke-width="2" />
  <circle cx="336" cy="136" r="10" fill="#1a30ae" />
  <text x="336" y="137" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff">2</text>
  <text x="400" y="152" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#202124">Почистване</text>
  <text x="400" y="172" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#202124">Измиване и сушене</text>

  <!-- STEP 3: Нарязване на ленти -->
  <rect x="560" y="120" width="160" height="80" rx="8" ry="8" fill="#f0f2fd" stroke="#1a30ae" stroke-width="2" />
  <circle cx="576" cy="136" r="10" fill="#1a30ae" />
  <text x="576" y="137" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff">3</text>
  <text x="640" y="152" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#202124">Рязане на ленти</text>
  <text x="640" y="172" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#202124">Ширина около 1 cm</text>

  <!-- STEP 4: Свързване в нишки -->
  <rect x="560" y="300" width="160" height="80" rx="8" ry="8" fill="#f0f2fd" stroke="#1a30ae" stroke-width="2" />
  <circle cx="576" cy="316" r="10" fill="#1a30ae" />
  <text x="576" y="317" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff">4</text>
  <text x="640" y="332" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#202124">Свързване в нишки</text>
  <text x="640" y="352" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#202124">„Пластмасова прежда“</text>

  <!-- STEP 5: Ръчно плетене -->
  <rect x="320" y="300" width="160" height="80" rx="8" ry="8" fill="#f0f2fd" stroke="#1a30ae" stroke-width="2" />
  <circle cx="336" cy="316" r="10" fill="#1a30ae" />
  <text x="336" y="317" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff">5</text>
  <text x="400" y="332" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#202124">Ръчно плетене</text>
  <text x="400" y="352" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#202124">15 домашни майсторки</text>

  <!-- STEP 6: Готов продукт -->
  <rect x="80" y="300" width="160" height="80" rx="8" ry="8" fill="#f0f2fd" stroke="#1a30ae" stroke-width="2" />
  <circle cx="96" cy="316" r="10" fill="#1a30ae" />
  <text x="96" y="317" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff">6</text>
  <text x="160" y="332" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#202124">Готов продукт</text>
  <text x="160" y="352" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#202124">Уникален занаятчийски дизайн</text>
</svg>
