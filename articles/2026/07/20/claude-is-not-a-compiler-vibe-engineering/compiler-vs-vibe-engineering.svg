<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a" rx="12"/>

  <!-- Title & Subtitle -->
  <text x="400" y="38" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Традиционен компилатор vs. Вайб инженерство</text>
  <text x="400" y="62" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="system-ui, -apple-system, sans-serif">Сравнение между стъпаловидната изолация и вертикалната интеграция чрез LLM</text>

  <!-- LEFT COLUMN: Traditional Stack -->
  <rect x="40" y="85" width="330" height="385" fill="#1e293b" rx="10" stroke="#334155" stroke-width="1.5"/>
  <rect x="40" y="85" width="330" height="40" fill="#334155" rx="10"/>
  <!-- Fix bottom corners of header rect -->
  <rect x="40" y="115" width="330" height="10" fill="#334155"/>
  <text x="205" y="110" text-anchor="middle" fill="#f87171" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Традиционен стек (Изолирани слоеве)</text>

  <!-- Layers Left -->
  <!-- Layer 1: Executive / Strategy -->
  <rect x="65" y="140" width="280" height="34" fill="#0f172a" rx="6" stroke="#475569" stroke-width="1"/>
  <text x="205" y="162" text-anchor="middle" fill="#cbd5e1" font-size="12" font-font-weight="500" font-family="system-ui, -apple-system, sans-serif">1. Стратегия и Визия (Executive)</text>

  <!-- Arrow down 1 -->
  <path d="M 205 174 L 205 188" stroke="#f87171" stroke-width="2" stroke-dasharray="3 3"/>
  <polygon points="205,193 201,186 209,186" fill="#f87171"/>

  <!-- Layer 2: Product / PM -->
  <rect x="65" y="195" width="280" height="34" fill="#0f172a" rx="6" stroke="#475569" stroke-width="1"/>
  <text x="205" y="217" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="500" font-family="system-ui, -apple-system, sans-serif">2. Продуктови изисквания (PM)</text>

  <!-- Arrow down 2 -->
  <path d="M 205 229 L 205 243" stroke="#f87171" stroke-width="2" stroke-dasharray="3 3"/>
  <polygon points="205,248 201,241 209,241" fill="#f87171"/>

  <!-- Layer 3: Architecture -->
  <rect x="65" y="250" width="280" height="34" fill="#0f172a" rx="6" stroke="#475569" stroke-width="1"/>
  <text x="205" y="272" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="500" font-family="system-ui, -apple-system, sans-serif">3. Архитектура на системата (Architect)</text>

  <!-- Arrow down 3 -->
  <path d="M 205 284 L 205 298" stroke="#f87171" stroke-width="2" stroke-dasharray="3 3"/>
  <polygon points="205,303 201,296 209,296" fill="#f87171"/>

  <!-- Layer 4: Implementation -->
  <rect x="65" y="305" width="280" height="34" fill="#0f172a" rx="6" stroke="#475569" stroke-width="1"/>
  <text x="205" y="327" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="500" font-family="system-ui, -apple-system, sans-serif">4. Изходен код (Engineer)</text>

  <!-- Arrow down 4 -->
  <path d="M 205 339 L 205 353" stroke="#64748b" stroke-width="2"/>
  <polygon points="205,358 201,351 209,351" fill="#64748b"/>

  <!-- Layer 5: Compiler & Binary -->
  <rect x="65" y="360" width="280" height="34" fill="#0f172a" rx="6" stroke="#475569" stroke-width="1"/>
  <text x="205" y="382" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="500" font-family="system-ui, -apple-system, sans-serif">5. Компилатор &#x2192; Машинен код (Binary)</text>

  <!-- Warning callout at bottom left -->
  <rect x="65" y="408" width="280" height="48" fill="#451a1a" rx="6" stroke="#f87171" stroke-width="1"/>
  <text x="205" y="427" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">&#x26A0;&#xFE0F; Бариери в комуникацията</text>
  <text x="205" y="444" text-anchor="middle" fill="#f87171" font-size="10" font-family="system-ui, -apple-system, sans-serif">Абстракциите изтичат; бавен транслационен процес</text>


  <!-- RIGHT COLUMN: Vibe Engineering -->
  <rect x="430" y="85" width="330" height="385" fill="#1e293b" rx="10" stroke="#334155" stroke-width="1.5"/>
  <rect x="430" y="85" width="330" height="40" fill="#065f46" rx="10"/>
  <rect x="430" y="115" width="330" height="10" fill="#065f46"/>
  <text x="595" y="110" text-anchor="middle" fill="#34d399" font-size="14" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Вайб инженерство (Вертикален LLM)</text>

  <!-- Vertically Integrated Spine/Hub -->
  <rect x="455" y="140" width="280" height="254" fill="#064e3b" fill-opacity="0.25" rx="8" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- LLM Agent Central Badge -->
  <rect x="500" y="240" width="190" height="54" fill="#047857" rx="8" stroke="#34d399" stroke-width="1.5"/>
  <text x="595" y="263" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Claude / LLM Агент</text>
  <text x="595" y="280" text-anchor="middle" fill="#a7f3d0" font-size="10" font-family="system-ui, -apple-system, sans-serif">Вертикален Мулти-Компилатор</text>

  <!-- Connections from LLM to all layers -->
  <!-- Line up to Strategy -->
  <path d="M 595 240 L 595 174" stroke="#34d399" stroke-width="2"/>
  <polygon points="595,169 591,176 599,176" fill="#34d399"/>
  <text x="595" y="162" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Стратегически цели &amp; Продукт</text>

  <!-- Line down to Spec & Code -->
  <path d="M 595 294 L 595 360" stroke="#34d399" stroke-width="2"/>
  <polygon points="595,365 591,358 599,358" fill="#34d399"/>
  <text x="595" y="377" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Архитектура, Код &amp; Edge-Cases</text>

  <!-- Left/Right Mechanical Sympathy indicators -->
  <path d="M 500 267 L 465 267" stroke="#34d399" stroke-width="1.5" stroke-dasharray="2 2"/>
  <path d="M 690 267 L 725 267" stroke="#34d399" stroke-width="1.5" stroke-dasharray="2 2"/>

  <!-- Success callout at bottom right -->
  <rect x="455" y="408" width="280" height="48" fill="#064e3b" rx="6" stroke="#34d399" stroke-width="1"/>
  <text x="595" y="427" text-anchor="middle" fill="#a7f3d0" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">&#x2705; Механична симпатия през слоевете</text>
  <text x="595" y="444" text-anchor="middle" fill="#6ee7b7" font-size="10" font-family="system-ui, -apple-system, sans-serif">Пряка комуникация без организационен овърхед</text>
</svg>
