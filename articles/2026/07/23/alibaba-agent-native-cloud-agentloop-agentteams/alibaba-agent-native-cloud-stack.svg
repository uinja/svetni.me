<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="100%" height="100%">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="600" height="500" fill="#0d0d11" rx="12" />
  
  <!-- Title / Header -->
  <text x="300" y="40" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">ALIBABA AGENT-NATIVE CLOUD STACK</text>
  <text x="300" y="60" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" fill="#8f93a2">WAIC 2026: Вертикална интеграция на ИИ инфраструктурата</text>

  <!-- Gradients -->
  <defs>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8f3d" />
      <stop offset="100%" stop-color="#ff5c00" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4d88ff" />
      <stop offset="100%" stop-color="#1a53ff" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="gray-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3f3f46" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>
  </defs>

  <!-- Layers (Top to Bottom) -->
  
  <!-- Layer 5: AgentTeams Governance -->
  <g transform="translate(50, 90)">
    <rect width="500" height="55" rx="8" fill="url(#orange-grad)" stroke="#ffb84d" stroke-width="1.5" />
    <text x="250" y="24" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#000000">AgentTeams (Управление и координация)</text>
    <text x="250" y="42" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" fill="#111111">Управление на мултиагентни работни потоци и политики за сигурност</text>
  </g>

  <!-- Arrow -->
  <path d="M300,145 L300,160" stroke="#ff8f3d" stroke-dasharray="4" stroke-width="2" />

  <!-- Layer 4: AgentLoop Observability -->
  <g transform="translate(50, 160)">
    <rect width="500" height="55" rx="8" fill="#1c1c24" stroke="#ff8f3d" stroke-width="1.5" />
    <text x="250" y="24" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">AgentLoop (Наблюдение и оптимизация)</text>
    <text x="250" y="42" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" fill="#8f93a2">Трейсинг в реално време, евалуация (evals) и анализ на производителността</text>
  </g>

  <!-- Arrow -->
  <path d="M300,215 L300,230" stroke="#ff8f3d" stroke-dasharray="4" stroke-width="2" />

  <!-- Layer 3: AgentRun Runtime -->
  <g transform="translate(50, 230)">
    <rect width="500" height="55" rx="8" fill="#1c1c24" stroke="#4d88ff" stroke-width="1.5" />
    <text x="250" y="24" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">AgentRun (Жизнен цикъл и среда за изпълнение)</text>
    <text x="250" y="42" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" fill="#8f93a2">Разработка, внедряване и управление на жизнения цикъл на агентите</text>
  </g>

  <!-- Arrow -->
  <path d="M300,285 L300,300" stroke="#4d88ff" stroke-dasharray="4" stroke-width="2" />

  <!-- Layer 2: TokenWorks Serving -->
  <g transform="translate(50, 300)">
    <rect width="500" height="55" rx="8" fill="#1c1c24" stroke="#a855f7" stroke-width="1.5" />
    <text x="250" y="24" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">TokenWorks Inference Serving (PAI-EAS)</text>
    <text x="250" y="42" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" fill="#a855f7">Маршрутизация на заявки, оптимизирано изпълнение и повторно използване на изчисления</text>
  </g>

  <!-- Arrow -->
  <path d="M300,355 L300,370" stroke="#a855f7" stroke-dasharray="4" stroke-width="2" />

  <!-- Layer 1: Hardware & Low-Level Soft (Zhenwu & T-Head SAIL) -->
  <g transform="translate(50, 370)">
    <rect width="500" height="85" rx="8" fill="url(#gray-grad)" stroke="#52525b" stroke-width="1.5" />
    <text x="250" y="22" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#e4e4e7">T-Head SAIL (AI Software Stack)</text>
    <text x="250" y="40" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" fill="#a1a1aa">Отворен стек (операционни системи, SDK, драйвери)</text>
    <text x="250" y="58" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="bold" fill="#ff8f3d">Хардуерен чипсет Zhenwu (560K+ доставени бройки)</text>
  </g>
</svg>
