<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="hsl(220, 30%, 15%)" />
      <stop offset="100%" stop-color="hsl(220, 40%, 10%)" />
    </linearGradient>
    <linearGradient id="glowRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="hsl(0, 70%, 50%)" />
      <stop offset="100%" stop-color="hsl(0, 80%, 40%)" />
    </linearGradient>
    <linearGradient id="glowBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="hsl(210, 80%, 60%)" />
      <stop offset="100%" stop-color="hsl(210, 90%, 50%)" />
    </linearGradient>
    <linearGradient id="glowPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="hsl(270, 70%, 60%)" />
      <stop offset="100%" stop-color="hsl(270, 80%, 50%)" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5" />
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bgGradient)" />
  
  <text x="400" y="40" font-family="sans-serif" font-size="22" font-weight="bold" fill="hsl(0, 0%, 90%)" text-anchor="middle">Геополитическа динамика в AI сектора (2026)</text>
  <text x="400" y="65" font-family="sans-serif" font-size="14" fill="hsl(0, 0%, 70%)" text-anchor="middle">Напрежение около интелектуалната собственост и пазарно влияние</text>

  <!-- US Side -->
  <g transform="translate(100, 150)">
    <rect width="200" height="120" rx="12" fill="url(#glowBlue)" filter="url(#shadow)" opacity="0.9" />
    <text x="100" y="35" font-family="sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">САЩ</text>
    <text x="100" y="60" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle">OpenAI</text>
    <text x="100" y="80" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle">Anthropic (Fable 5)</text>
    <text x="100" y="100" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle">Санкции &amp; Контрол</text>
  </g>

  <!-- China Side -->
  <g transform="translate(500, 150)">
    <rect width="200" height="120" rx="12" fill="url(#glowRed)" filter="url(#shadow)" opacity="0.9" />
    <text x="100" y="35" font-family="sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">Китай (Moonshot AI)</text>
    <text x="100" y="60" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle">Kimi K3 (2.8T MoE)</text>
    <text x="100" y="80" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle">Zhipu AI (-27%)</text>
    <text x="100" y="100" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle">MiniMax (-16%)</text>
  </g>

  <!-- Connections and Conflict -->
  <path d="M 300 210 Q 400 150 500 210" fill="none" stroke="hsl(270, 70%, 60%)" stroke-width="4" stroke-dasharray="8 4" />
  <path d="M 500 210 l -15 -5 l 5 15 z" fill="hsl(270, 70%, 60%)" />
  
  <rect x="330" y="155" width="140" height="30" rx="15" fill="hsl(220, 30%, 25%)" />
  <text x="400" y="175" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle">Обвинения в дестилация</text>

  <path d="M 300 250 L 500 250" fill="none" stroke="hsl(0, 70%, 50%)" stroke-width="3" />
  <text x="400" y="270" font-family="sans-serif" font-size="12" fill="hsl(0, 70%, 70%)" text-anchor="middle">Заплахи за санкции (IP кражби)</text>

  <!-- Industry Context -->
  <g transform="translate(300, 340)">
    <rect width="200" height="80" rx="12" fill="hsl(220, 20%, 25%)" filter="url(#shadow)" />
    <text x="100" y="30" font-family="sans-serif" font-size="16" font-weight="bold" fill="hsl(0, 0%, 90%)" text-anchor="middle">Индустриален дебат</text>
    <text x="100" y="50" font-family="sans-serif" font-size="12" fill="hsl(0, 0%, 70%)" text-anchor="middle">Microsoft / Hugging Face</text>
    <text x="100" y="65" font-family="sans-serif" font-size="12" fill="hsl(0, 0%, 70%)" text-anchor="middle">Относно AI дестилацията</text>
  </g>

  <line x1="200" y1="270" x2="350" y2="340" stroke="hsl(220, 20%, 40%)" stroke-width="2" />
  <line x1="600" y1="270" x2="450" y2="340" stroke="hsl(220, 20%, 40%)" stroke-width="2" />
</svg>
