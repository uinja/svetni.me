<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff" rx="16" />
  
  <!-- Title -->
  <text x="400" y="48" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#202124">Moonshot AI Kimi K3: Нов етап в ИИ надпреварата</text>
  <text x="400" y="80" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="15" fill="#202124" opacity="0.7">Сравнение на мащаба, достъпа и пазарното въздействие (Юли 2026)</text>
  
  <!-- Grid Boxes -->
  <rect x="48" y="120" width="208" height="240" fill="#f8f9fa" rx="12" stroke="#1b31ae" stroke-width="2" />
  <rect x="296" y="120" width="208" height="240" fill="#f8f9fa" rx="12" stroke="#202124" stroke-width="1" opacity="0.4" />
  <rect x="544" y="120" width="208" height="240" fill="#f8f9fa" rx="12" stroke="#202124" stroke-width="1" opacity="0.4" />
  
  <!-- Column 1: Kimi K3 -->
  <text x="152" y="156" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a30ae">Kimi K3</text>
  <text x="152" y="180" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="13" fill="#202124" font-weight="600">Moonshot AI (Китай)</text>
  <circle cx="152" cy="236" r="40" fill="#1a30ae" />
  <text x="152" y="236" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">2.8 T</text>
  <text x="152" y="296" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" fill="#202124" opacity="0.8">Параметри (трилиона)</text>
  <rect x="72" y="316" width="160" height="28" fill="#1a30ae" rx="6" />
  <text x="152" y="330" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Отворен код (Open-source)</text>
  
  <!-- Column 2: Anthropic Models -->
  <text x="400" y="156" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#202124">Fable / Mythos</text>
  <text x="400" y="180" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="13" fill="#202124" opacity="0.7">Anthropic (САЩ)</text>
  <circle cx="400" cy="236" r="40" fill="#202124" opacity="0.1" stroke="#202124" stroke-width="1.5" />
  <text x="400" y="236" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#202124">Затворен</text>
  <text x="400" y="296" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" fill="#202124" opacity="0.8">Временни забрани в САЩ</text>
  <rect x="320" y="316" width="160" height="28" fill="#e0e0e0" rx="6" />
  <text x="400" y="330" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#202124" opacity="0.7">Собствен (Closed)</text>
  
  <!-- Column 3: OpenAI Models -->
  <text x="648" y="156" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#202124">GPT-4 / GPT-5</text>
  <text x="648" y="180" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="13" fill="#202124" opacity="0.7">OpenAI (САЩ)</text>
  <circle cx="648" cy="236" r="40" fill="#202124" opacity="0.1" stroke="#202124" stroke-width="1.5" />
  <text x="648" y="236" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#202124">Затворен</text>
  <text x="648" y="296" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" fill="#202124" opacity="0.8">Търговски лицензи</text>
  <rect x="568" y="316" width="160" height="28" fill="#e0e0e0" rx="6" />
  <text x="648" y="330" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#202124" opacity="0.7">Собствен (Closed)</text>
  
  <!-- Impact / Competitors Section -->
  <rect x="48" y="380" width="704" height="88" fill="#f8f9fa" rx="12" stroke="#202124" stroke-width="1" opacity="0.2" />
  <text x="72" y="416" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#202124">Пазарно въздействие в Хонконг след анонса:</text>
  
  <text x="72" y="444" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#c2410c">Zhipu AI: -27%</text>
  <text x="212" y="444" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="400" fill="#202124" opacity="0.8">(спад на акциите)</text>
  
  <text x="368" y="444" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#c2410c">MiniMax: -16%</text>
  <text x="508" y="444" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="400" fill="#202124" opacity="0.8">(спад на акциите)</text>
</svg>
