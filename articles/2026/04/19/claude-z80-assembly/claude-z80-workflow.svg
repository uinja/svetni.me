<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --purple-light: #eef2ff;
      --purple-main: #6366f1;
      --purple-dark: #3730a3;
      --teal-light: #f0fdfa;
      --teal-main: #14b8a6;
      --teal-dark: #0f766e;
      --gray-scaffold: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f8fafc;
        --purple-light: #1e1b4b;
        --purple-main: #818cf8;
        --purple-dark: #e0e7ff;
        --teal-light: #134e4a;
        --teal-main: #2dd4bf;
        --teal-dark: #ccfbf1;
        --gray-scaffold: #475569;
      }
    }
    text { font-family: 'Inter', sans-serif; fill: var(--text); }
    .header { font-size: 14px; font-weight: 500; }
    .label { font-size: 12px; font-weight: 400; }
    .connector { stroke: var(--teal-main); stroke-width: 1.5px; fill: none; marker-end: url(#arrowhead); }
    .leader { stroke: var(--gray-scaffold); stroke-width: 0.5px; stroke-dasharray: 4,4; fill: none; }
    .node-purple { fill: var(--purple-light); stroke: var(--purple-main); stroke-width: 0.5px; }
    .node-teal { fill: var(--teal-light); stroke: var(--teal-main); stroke-width: 0.5px; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--teal-main)" />
    </marker>
  </defs>

  <rect width="800" height="500" fill="var(--bg)" />

  <!-- Center composition: Cycle Mechanism -->
  <g transform="translate(470, 250)">
    <!-- Human Expert (Purple - Cognition) -->
    <circle cx="-120" cy="0" r="55" class="node-purple" />
    <text x="-120" y="5" text-anchor="middle" class="header" style="fill: var(--purple-dark);">Експерт</text>
    
    <!-- Claude LLM (Purple - Logic) -->
    <circle cx="120" cy="0" r="55" class="node-purple" />
    <text x="120" y="5" text-anchor="middle" class="header" style="fill: var(--purple-dark);">Claude</text>

    <!-- Cycle Flow -->
    <path d="M -65 -20 Q 0 -60 60 -20" class="connector" />
    <text x="0" y="-55" text-anchor="middle" class="label">Инструкции</text>

    <path d="M 65 20 Q 0 60 -60 20" class="connector" />
    <text x="0" y="70" text-anchor="middle" class="label">Обратна връзка</text>
  </g>

  <!-- Output (Teal - Systems) -->
  <rect x="660" y="210" width="100" height="80" class="node-teal" rx="4" />
  <text x="710" y="255" text-anchor="middle" class="header" style="fill: var(--teal-dark);">Z80 Код</text>
  <path d="M 590 250 L 655 250" class="connector" />

  <!-- Left Margin (140px) for Labeled Leader Lines -->
  <line x1="345" y1="250" x2="140" y2="250" class="leader" />
  <text x="10" y="255" class="label">Човешки надзор</text>
  
  <line x1="710" y1="290" x2="710" y2="400" class="leader" />
  <line x1="710" y1="400" x2="140" y2="400" class="leader" />
  <text x="10" y="405" class="label">Цел (TEC-1G SBC)</text>

</svg>
