<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="var(--foreground, #000000)" />
    </marker>
  </defs>
  <style>
    .bg { fill: var(--background, #ffffff); }
    .node { fill: var(--surface-soft, #fafafa); stroke: var(--foreground, #000000); stroke-width: 1.5; }
    .node-ai { fill: var(--surface-soft, #fafafa); stroke: var(--blue, #1231b5); stroke-width: 2.5; }
    .node-saas { fill: var(--surface-soft, #fafafa); stroke: var(--yellow, #fac832); stroke-width: 2.5; }
    .text-main { fill: var(--foreground, #000000); }
    .text-dim { fill: var(--foreground, #000000); opacity: 0.6; }
    .line { fill: none; stroke: var(--foreground, #000000); stroke-width: 2; }
    text { font-family: system-ui, -apple-system, sans-serif; }
  </style>
  <rect width="800" height="500" class="bg" />

  <text x="400" y="60" text-anchor="middle" dominant-baseline="central" font-size="28" font-weight="600" class="text-main">AI &amp; SaaS Collaboration (China 2026)</text>
  <text x="400" y="95" text-anchor="middle" dominant-baseline="central" font-size="16" class="text-dim">Synergy between Model Infrastructure and Industry Expertise</text>

  <!-- AI Model Infrastructure -->
  <g transform="translate(100, 180)">
    <rect width="220" height="180" rx="16" class="node-ai" />
    <text x="110" y="40" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="700" fill="var(--blue, #1231b5)">AI Model Startups</text>
    <text x="110" y="80" text-anchor="middle" dominant-baseline="central" font-size="14" class="text-main">(MiniMax, Zhipu AI)</text>
    <line x1="30" y1="110" x2="190" y2="110" stroke="var(--blue, #1231b5)" stroke-width="1" opacity="0.3" />
    <text x="110" y="135" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" class="text-main">Core Infrastructure</text>
    <text x="110" y="155" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" class="text-main">Computational Power</text>
  </g>

  <!-- Plus Sign -->
  <text x="400" y="270" text-anchor="middle" dominant-baseline="central" font-size="48" font-weight="300" class="text-main">+</text>

  <!-- Legacy SaaS Knowledge -->
  <g transform="translate(480, 180)">
    <rect width="220" height="180" rx="16" class="node-saas" />
    <text x="110" y="40" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="700" fill="var(--yellow, #fac832)">Legacy SaaS Firms</text>
    <text x="110" y="80" text-anchor="middle" dominant-baseline="central" font-size="14" class="text-main">(Kingdee, Salesforce China)</text>
    <line x1="30" y1="110" x2="190" y2="110" stroke="var(--yellow, #fac832)" stroke-width="1" opacity="0.3" />
    <text x="110" y="135" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" class="text-main">Vertical Domain Data</text>
    <text x="110" y="155" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" class="text-main">Industry Distribution</text>
  </g>

  <!-- Resulting Value -->
  <path d="M 400 380 L 400 420" class="line" marker-end="url(#arrow)" />
  <rect x="250" y="430" width="300" height="40" rx="20" fill="var(--blue, #1231b5)" />
  <text x="400" y="450" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="700" fill="white">Turbocharged Enterprise Value</text>
</svg>
