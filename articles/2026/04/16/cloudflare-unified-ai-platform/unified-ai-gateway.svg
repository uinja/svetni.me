<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --teal-light: #f0fdfa;
      --teal-main: #14b8a6;
      --teal-dark: #0f766e;
      --gray-scaffold: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f8fafc;
        --teal-light: #134e4a;
        --teal-main: #2dd4bf;
        --teal-dark: #ccfbf1;
        --gray-scaffold: #475569;
      }
    }
    text { font-family: 'Inter', sans-serif; fill: var(--text); }
    .header { font-size: 14px; font-weight: 500; }
    .label { font-size: 12px; font-weight: 400; }
    .node-teal { fill: var(--teal-light); stroke: var(--teal-main); stroke-width: 0.5px; }
    .leader { stroke: var(--gray-scaffold); stroke-width: 0.5px; stroke-dasharray: 4,4; fill: none; }
    .funnel-path { fill: var(--teal-light); stroke: var(--teal-main); stroke-width: 1.5px; fill-opacity: 0.6; }
  </style>

  <rect width="800" height="500" fill="var(--bg)" />

  <!-- Center: Filters/Funnels Form (Gateway) -->
  <g transform="translate(470, 250)">
    <!-- Diverse AI Models (Wide Top) -->
    <path d="M -150 -120 L 150 -120 L 60 -20 L -60 -20 Z" class="funnel-path" />
    <text x="-100" y="-95" text-anchor="middle" class="label">OpenAI</text>
    <text x="0" y="-95" text-anchor="middle" class="label">Anthropic</text>
    <text x="100" y="-95" text-anchor="middle" class="label">Llama</text>
    
    <!-- Unified Gateway (Narrow Neck) -->
    <rect x="-60" y="-20" width="120" height="40" class="node-teal" />
    <text x="0" y="5" text-anchor="middle" class="header" style="fill: var(--teal-dark);">AI Gateway</text>

    <!-- Consistent Output (Flow Bottom) -->
    <path d="M -60 20 L 60 20 L 100 120 L -100 120 Z" class="funnel-path" style="fill-opacity: 0.3;" />
    <text x="0" y="75" text-anchor="middle" class="label">Унифициран API</text>
  </g>

  <!-- Left Margin Labeled Leader Lines -->
  <line x1="320" y1="130" x2="140" y2="130" class="leader" />
  <text x="10" y="135" class="label">Множество доставчици</text>
  
  <line x1="390" y1="370" x2="140" y2="370" class="leader" />
  <text x="10" y="375" class="label">Единен контрол</text>

</svg>
