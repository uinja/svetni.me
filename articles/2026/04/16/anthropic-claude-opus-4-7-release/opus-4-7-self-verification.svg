<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--foreground, #000000)" />
    </marker>
  </defs>
  <style>
    .bg { fill: var(--background, #ffffff); }
    .surface { fill: var(--surface-soft, #fafafa); stroke: var(--foreground, #000000); stroke-width: 1.5; }
    .accent-blue { fill: var(--blue, #1231b5); }
    .accent-yellow { fill: var(--yellow, #fac832); }
    .text-main { fill: var(--foreground, #000000); }
    .text-dim { fill: var(--foreground, #000000); opacity: 0.6; }
    .line { fill: none; stroke: var(--foreground, #000000); stroke-width: 2; }
    text { font-family: system-ui, sans-serif; }
  </style>
  <rect width="800" height="500" class="bg" />

  <text x="400" y="60" text-anchor="middle" dominant-baseline="central" font-size="24" font-weight="600" class="text-main">Autonomous Self-Verification Cycle</text>
  <text x="400" y="90" text-anchor="middle" dominant-baseline="central" font-size="14" class="text-dim">Ensuring Reliability in Multi-Step Agentic Tasks</text>

  <!-- Step 1: Input -->
  <rect x="50" y="200" width="160" height="100" rx="12" class="surface" />
  <text x="130" y="240" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="600" class="text-main">Input</text>
  <text x="130" y="265" text-anchor="middle" dominant-baseline="central" font-size="12" class="text-dim">User Task / Goal</text>

  <!-- Step 2: Reason -->
  <path d="M 210 250 L 260 250" class="line" marker-end="url(#arrowhead)" />
  <rect x="270" y="200" width="160" height="100" rx="12" class="surface" stroke="var(--blue, #1231b5)" stroke-width="2" />
  <text x="350" y="240" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="600" class="text-main">Reasoning</text>
  <text x="350" y="265" text-anchor="middle" dominant-baseline="central" font-size="12" class="text-dim">CoT Drafting</text>

  <!-- Step 3: Verify -->
  <path d="M 430 250 L 480 250" class="line" marker-end="url(#arrowhead)" />
  <circle cx="560" cy="250" r="75" class="surface" stroke="var(--yellow, #fac832)" stroke-width="3" stroke-dasharray="10 5" />
  <text x="560" y="240" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="700" fill="var(--yellow, #fac832)">VERIFY</text>
  <text x="560" y="265" text-anchor="middle" dominant-baseline="central" font-size="12" class="text-dim">Logical Check</text>

  <!-- Loopback -->
  <path d="M 560 175 A 80 80 0 0 0 350 175" class="line" marker-end="url(#arrowhead)" opacity="0.3" stroke-dasharray="5 5" />
  <text x="455" y="140" text-anchor="middle" dominant-baseline="central" font-size="12" font-style="italic" class="text-dim">Refinement Loop</text>

  <!-- Step 4: Done -->
  <path d="M 635 250 L 685 250" class="line" marker-end="url(#arrowhead)" />
  <rect x="695" y="210" width="80" height="80" rx="40" fill="var(--blue, #1231b5)" />
  <text x="735" y="250" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="700" fill="white">DONE</text>

  <text x="400" y="450" text-anchor="middle" dominant-baseline="central" font-size="14" class="text-dim">Opus 4.7 validates its own logic before finalizing the response.</text>
</svg>
