<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style>
    .bg { fill: var(--background, #ffffff); }
    .surface { fill: var(--surface-soft, #fafafa); }
    .accent-blue { fill: var(--blue, #1231b5); stroke: var(--blue, #1231b5); }
    .accent-yellow { fill: var(--yellow, #fac832); stroke: var(--yellow, #fac832); }
    .accent-red { fill: var(--red, #f83735); stroke: var(--red, #f83735); }
    .text-main { fill: var(--foreground, #000000); }
    .text-dim { fill: var(--foreground, #000000); opacity: 0.7; }
    .line { stroke: var(--foreground, #000000); stroke-width: 2; fill: none; }
    text { font-family: system-ui, sans-serif; }
  </style>
  <rect width="800" height="500" class="bg" />
  
  <text x="400" y="50" text-anchor="middle" font-size="24" font-weight="500" class="text-main">Claude 4.7 Self-Verification Mechanism</text>

  <!-- Step 1: Input -->
  <rect x="50" y="200" width="140" height="80" rx="8" class="surface" stroke="var(--foreground)" stroke-width="1" />
  <text x="120" y="245" text-anchor="middle" font-size="16" font-weight="500" class="text-main">User Prompt</text>
  
  <!-- Arrow to Step 2 -->
  <path d="M 190 240 L 250 240" class="line" marker-end="url(#arrowhead)" />

  <!-- Step 2: Reasoning -->
  <rect x="250" y="200" width="160" height="80" rx="8" class="surface" stroke="var(--blue)" stroke-width="2" />
  <text x="330" y="235" text-anchor="middle" font-size="16" font-weight="500" class="text-main">Initial</text>
  <text x="330" y="255" text-anchor="middle" font-size="16" font-weight="500" class="text-main">Reasoning</text>

  <!-- Arrow to Step 3 -->
  <path d="M 410 240 L 470 240" class="line" marker-end="url(#arrowhead)" />

  <!-- Step 3: Self-Verification Loop -->
  <circle cx="550" cy="240" r="70" class="surface" stroke="var(--yellow)" stroke-width="3" stroke-dasharray="8 4" />
  <text x="550" y="235" text-anchor="middle" font-size="16" font-weight="700" class="accent-yellow">Verification</text>
  <text x="550" y="255" text-anchor="middle" font-size="14" font-weight="500" class="text-main">Internal Check</text>

  <!-- Circular Arrow Loop -->
  <path d="M 550 170 A 70 70 0 1 1 549 170" fill="none" stroke="var(--yellow)" stroke-width="2" marker-end="url(#arrowhead-yellow)" />

  <!-- Arrow to Step 4 -->
  <path d="M 620 240 L 680 240" class="line" marker-end="url(#arrowhead)" />

  <!-- Step 4: Final Output -->
  <rect x="680" y="200" width="100" height="80" rx="8" class="accent-blue" />
  <text x="730" y="245" text-anchor="middle" font-size="16" font-weight="600" fill="white">Verified Output</text>

  <!-- Arrow Head Definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="text-main" />
    </marker>
    <marker id="arrowhead-yellow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="accent-yellow" />
    </marker>
  </defs>

  <!-- Sub-caption -->
  <text x="400" y="450" text-anchor="middle" font-size="14" class="text-dim">Reduces hallucinations by validating logic before output.</text>
</svg>
