<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style>
    .bg { fill: var(--background, #ffffff); }
    .surface { fill: var(--surface-soft, #fafafa); stroke: var(--foreground, #000000); stroke-width: 0.5; opacity: 0.5; }
    .accent-blue { fill: var(--blue, #1231b5); stroke: var(--blue, #1231b5); }
    .accent-yellow { fill: var(--yellow, #fac832); stroke: var(--yellow, #fac832); }
    .text-main { fill: var(--foreground, #000000); }
    .text-dim { fill: var(--foreground, #000000); opacity: 0.6; }
    .glow { filter: blur(4px); opacity: 0.4; }
    text { font-family: system-ui, sans-serif; }
  </style>
  <rect width="800" height="500" class="bg" />
  
  <!-- Background Grid -->
  <path d="M 0 50 H 800 M 0 100 H 800 M 0 150 H 800 M 0 200 H 800 M 0 250 H 800 M 0 300 H 800 M 0 350 H 800 M 0 400 H 800 M 0 450 H 800
           M 50 0 V 500 M 100 0 V 500 M 150 0 V 500 M 200 0 V 500 M 250 0 V 500 M 300 0 V 500 M 350 0 V 500 M 400 0 V 500 M 450 0 V 500 M 500 0 V 500 M 550 0 V 500 M 600 0 V 500 M 650 0 V 500 M 700 0 V 500 M 750 0 V 500" 
        stroke="var(--foreground, #000000)" stroke-width="0.5" opacity="0.05" />

  <!-- Central Agent Core -->
  <g transform="translate(400, 250)">
    <circle r="120" class="surface" />
    <circle r="120" class="accent-blue glow" fill="none" stroke-width="8" />
    <circle r="100" class="surface" stroke-width="2" />
    
    <!-- Rotating Elements (Abstract) -->
    <path d="M -80 0 A 80 80 0 0 1 80 0" fill="none" stroke="var(--blue, #1231b5)" stroke-width="4" stroke-linecap="round" />
    <path d="M 80 0 A 80 80 0 0 1 -80 0" fill="none" stroke="var(--yellow, #fac832)" stroke-width="4" stroke-dasharray="10 10" />
    
    <text y="5" text-anchor="middle" font-size="32" font-weight="700" class="text-main">OPUS 4.7</text>
    <text y="35" text-anchor="middle" font-size="14" font-weight="500" class="accent-blue">AUTONOMOUS CORE</text>
  </g>

  <!-- Peripheral Nodes -->
  <g class="nodes">
    <circle cx="150" cy="150" r="40" class="surface" stroke="var(--blue, #1231b5)" stroke-width="2" />
    <text x="150" y="155" text-anchor="middle" font-size="12" font-weight="600" class="text-main">REASONING</text>
    <line x1="185" y1="175" x2="300" y2="210" stroke="var(--blue, #1231b5)" stroke-width="1.5" opacity="0.3" />

    <circle cx="650" cy="150" r="40" class="surface" stroke="var(--yellow, #fac832)" stroke-width="2" />
    <text x="650" y="155" text-anchor="middle" font-size="12" font-weight="600" class="text-main">VERIFY</text>
    <line x1="615" y1="175" x2="500" y2="210" stroke="var(--yellow, #fac832)" stroke-width="1.5" opacity="0.3" />

    <circle cx="150" cy="350" r="40" class="surface" stroke="var(--blue, #1231b5)" stroke-width="2" />
    <text x="150" y="355" text-anchor="middle" font-size="12" font-weight="600" class="text-main">VISION</text>
    <line x1="185" y1="325" x2="300" y2="290" stroke="var(--blue, #1231b5)" stroke-width="1.5" opacity="0.3" />

    <circle cx="650" cy="350" r="40" class="surface" stroke="var(--yellow, #fac832)" stroke-width="2" />
    <text x="650" y="355" text-anchor="middle" font-size="12" font-weight="600" class="text-main">TOOLS</text>
    <line x1="615" y1="325" x2="500" y2="290" stroke="var(--yellow, #fac832)" stroke-width="1.5" opacity="0.3" />
  </g>

  <!-- Title Overlay -->
  <rect x="0" y="440" width="800" height="60" fill="var(--background, #ffffff)" opacity="0.8" />
  <text x="400" y="475" text-anchor="middle" font-size="20" font-weight="600" class="text-main">Anthropic Claude Opus 4.7 Architecture</text>
</svg>
