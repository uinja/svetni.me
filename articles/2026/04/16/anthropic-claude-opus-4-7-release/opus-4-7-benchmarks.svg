<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:var(--blue, #1231b5);stop-opacity:1" />
      <stop offset="100%" style="stop-color:var(--blue, #1231b5);stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:var(--yellow, #fac832);stop-opacity:1" />
      <stop offset="100%" style="stop-color:var(--yellow, #fac832);stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:var(--red, #f83735);stop-opacity:1" />
      <stop offset="100%" style="stop-color:var(--red, #f83735);stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <style>
    .bg { fill: var(--background, #ffffff); }
    .text-main { fill: var(--foreground, #000000); }
    .text-dim { fill: var(--foreground, #000000); opacity: 0.6; }
    .grid { stroke: var(--foreground, #000000); stroke-width: 1; opacity: 0.1; }
    text { font-family: system-ui, -apple-system, sans-serif; }
  </style>
  <rect width="800" height="500" class="bg" />
  
  <text x="400" y="60" text-anchor="middle" font-size="24" font-weight="600" class="text-main">GDPVal-AA Elo Rating Leadership (2026)</text>
  <text x="400" y="90" text-anchor="middle" font-size="14" class="text-dim">Standardized Knowledge &amp; Reasoning Benchmark</text>

  <!-- Y-Axis Grid -->
  <line x1="120" y1="150" x2="720" y2="150" class="grid" />
  <line x1="120" y1="230" x2="720" y2="230" class="grid" />
  <line x1="120" y1="310" x2="720" y2="310" class="grid" />
  <line x1="120" y1="390" x2="720" y2="390" class="grid" />

  <!-- Labels -->
  <text x="110" y="155" text-anchor="end" font-size="12" class="text-dim">2000</text>
  <text x="110" y="235" text-anchor="end" font-size="12" class="text-dim">1500</text>
  <text x="110" y="315" text-anchor="end" font-size="12" class="text-dim">1000</text>
  <text x="110" y="395" text-anchor="end" font-size="12" class="text-dim">500</text>

  <!-- Bars (Scaled: y = 470 - (val/2000 * 320)) -->
  <g transform="translate(180, 0)">
    <rect y="190" width="100" height="280" rx="4" fill="url(#blueGrad)" />
    <text x="50" y="180" text-anchor="middle" font-size="18" font-weight="700" fill="var(--blue, #1231b5)">1753</text>
    <text x="50" y="490" text-anchor="middle" font-size="14" font-weight="500" class="text-main">Claude 4.7</text>
  </g>

  <g transform="translate(350, 0)">
    <rect y="202" width="100" height="268" rx="4" fill="url(#yellowGrad)" />
    <text x="50" y="192" text-anchor="middle" font-size="18" font-weight="700" fill="var(--yellow, #fac832)">1674</text>
    <text x="50" y="490" text-anchor="middle" font-size="14" font-weight="500" class="text-main">GPT-5.4</text>
  </g>

  <g transform="translate(520, 0)">
    <rect y="260" width="100" height="210" rx="4" fill="url(#redGrad)" />
    <text x="50" y="250" text-anchor="middle" font-size="18" font-weight="700" fill="var(--red, #f83735)">1314</text>
    <text x="50" y="490" text-anchor="middle" font-size="14" font-weight="500" class="text-main">Gemini 3.1</text>
  </g>

  <line x1="120" y1="470" x2="720" y2="470" stroke="var(--foreground, #000000)" stroke-width="2" />
</svg>
