<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --purple-light: #eef2ff;
      --purple-main: #6366f1;
      --purple-dark: #3730a3;
      --gray-scaffold: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f8fafc;
        --purple-light: #1e1b4b;
        --purple-main: #818cf8;
        --purple-dark: #e0e7ff;
        --gray-scaffold: #475569;
      }
    }
    text { font-family: 'Inter', sans-serif; fill: var(--text); }
    .header { font-size: 14px; font-weight: 500; }
    .label { font-size: 12px; font-weight: 400; }
    .node-purple { fill: var(--purple-light); stroke: var(--purple-main); stroke-width: 0.5px; }
    .leader { stroke: var(--gray-scaffold); stroke-width: 0.5px; stroke-dasharray: 4,4; fill: none; }
  </style>

  <rect width="800" height="500" fill="var(--bg)" />

  <!-- Center: Layers/Depth Form (Evolution) -->
  <g transform="translate(470, 250)">
    <!-- Stage 1: Auto-complete -->
    <rect x="-120" y="80" width="240" height="40" class="node-purple" rx="4" style="fill-opacity: 0.2;" />
    <text x="0" y="105" text-anchor="middle" class="label" style="fill: var(--purple-dark);">Автодовършване (2021)</text>

    <!-- Stage 2: Code Generation -->
    <rect x="-120" y="40" width="240" height="40" class="node-purple" rx="4" style="fill-opacity: 0.4;" />
    <text x="0" y="65" text-anchor="middle" class="label" style="fill: var(--purple-dark);">Генерация на функции (2023)</text>

    <!-- Stage 3: Chat/Assistant -->
    <rect x="-120" y="0" width="240" height="40" class="node-purple" rx="4" style="fill-opacity: 0.7;" />
    <text x="0" y="25" text-anchor="middle" class="label" style="fill: var(--purple-dark);">Интерактивен чат (2024)</text>

    <!-- Stage 4: Agentic Platform -->
    <rect x="-120" y="-40" width="240" height="40" class="node-purple" rx="4" />
    <text x="0" y="-15" text-anchor="middle" class="header" style="fill: var(--purple-dark);">Агентна платформа (2026)</text>
  </g>

  <!-- Left Margin Labeled Leader Lines -->
  <line x1="350" y1="230" x2="140" y2="230" class="leader" />
  <text x="10" y="235" class="label">Еволюция на Codex</text>
  
  <line x1="470" y1="310" x2="470" y2="400" class="leader" />
  <line x1="470" y1="400" x2="140" y2="400" class="leader" />
  <text x="10" y="405" class="label">От инструмент към агент</text>

</svg>
