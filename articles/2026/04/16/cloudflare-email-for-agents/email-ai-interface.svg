<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --teal-light: #f0fdfa;
      --teal-main: #14b8a6;
      --teal-dark: #0f766e;
      --gray-scaffold: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f8fafc;
        --teal-light: #134e4a;
        --teal-main: #2dd4bf;
        --teal-dark: #ccfbf1;
        --gray-scaffold: #475569;
      }
    }
    text { font-family: 'Inter', sans-serif; fill: var(--text); }
    .header { font-size: 14px; font-weight: 500; }
    .label { font-size: 12px; font-weight: 400; }
    .node-teal { fill: var(--teal-light); stroke: var(--teal-main); stroke-width: 0.5px; }
    .connector { stroke: var(--teal-main); stroke-width: 1.5px; fill: none; marker-end: url(#arrowhead); }
    .leader { stroke: var(--gray-scaffold); stroke-width: 0.5px; stroke-dasharray: 4,4; fill: none; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--teal-main)" />
    </marker>
  </defs>

  <rect width="800" height="500" fill="var(--bg)" />

  <!-- Center: Flow/System Form -->
  <g transform="translate(470, 250)">
    <!-- Human -->
    <rect x="-180" y="-40" width="100" height="80" class="node-teal" rx="4" />
    <text x="-130" y="5" text-anchor="middle" class="header" style="fill: var(--teal-dark);">Потребител</text>
    
    <!-- Cloudflare Email -->
    <rect x="-40" y="-40" width="80" height="80" class="node-teal" rx="4" style="fill-opacity: 0.5;" />
    <text x="0" y="5" text-anchor="middle" class="label">Имейл</text>

    <!-- AI Agent -->
    <rect x="80" y="-40" width="100" height="80" class="node-teal" rx="4" />
    <text x="130" y="5" text-anchor="middle" class="header" style="fill: var(--teal-dark);">AI Агент</text>

    <!-- Flows -->
    <path d="M -80 -20 L -45 -20" class="connector" />
    <path d="M 45 -20 L 75 -20" class="connector" />
    
    <path d="M 75 20 L 45 20" class="connector" />
    <path d="M -45 20 L -80 20" class="connector" />
  </g>

  <!-- Left Margin Labeled Leader Lines -->
  <line x1="290" y1="250" x2="140" y2="250" class="leader" />
  <text x="10" y="255" class="label">Асинхронен интерфейс</text>
  
  <line x1="470" y1="210" x2="470" y2="100" class="leader" />
  <line x1="470" y1="100" x2="140" y2="100" class="leader" />
  <text x="10" y="105" class="label">Cloudflare Workers</text>

</svg>
