<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" rx="20" fill="#1e272e" />
  
  <!-- Central Stylized Protein/Molecule -->
  <g transform="translate(400, 200)">
    <circle cx="0" cy="0" r="40" fill="#ffd32a" fill-opacity="0.2" />
    <path d="M-30,-10 Q0,-50 30,-10 T60,20" fill="none" stroke="#ffd32a" stroke-width="4" stroke-linecap="round" />
    <path d="M-60,20 Q-30,-10 0,20 T30,-10" fill="none" stroke="#ff5e57" stroke-width="4" stroke-linecap="round" />
    <circle cx="-30" cy="-10" r="6" fill="#ffd32a" />
    <circle cx="30" cy="-10" r="6" fill="#ff5e57" />
    <circle cx="0" cy="20" r="8" fill="#00d2ff" />
  </g>

  <!-- Circular Loop Arrows -->
  <g fill="none" stroke="#00d2ff" stroke-width="3" stroke-dasharray="5 5">
    <path d="M400,80 A120,120 0 0,1 520,200" />
    <path d="M520,200 A120,120 0 0,1 400,320" />
    <path d="M400,320 A120,120 0 0,1 280,200" />
    <path d="M280,200 A120,120 0 0,1 400,80" />
  </g>

  <!-- Labels -->
  <g font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">
    <rect x="350" y="50" width="100" height="30" rx="15" fill="#05c46b" />
    <text x="400" y="71" fill="#fff">GENERATE</text>
    
    <rect x="530" y="185" width="100" height="30" rx="15" fill="#0fbcf9" />
    <text x="580" y="206" fill="#fff">TEST</text>
    
    <rect x="350" y="320" width="100" height="30" rx="15" fill="#575fcf" />
    <text x="400" y="341" fill="#fff">LEARN</text>
    
    <rect x="170" y="185" width="100" height="30" rx="15" fill="#ef5777" />
    <text x="220" y="206" fill="#fff">REVIEW</text>
  </g>

  <!-- Title/Context -->
  <text x="400" y="30" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="20" font-weight="bold" opacity="0.8">OpenProtein.AI No-Code Platform</text>
  <text x="400" y="380" text-anchor="middle" fill="#00d2ff" font-family="sans-serif" font-size="14">AI-Driven Protein Design Loop</text>
</svg>
