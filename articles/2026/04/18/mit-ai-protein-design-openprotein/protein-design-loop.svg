<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --teal-light: #f0fdfa;
      --teal-main: #14b8a6;
      --teal-dark: #0f766e;
      --purple-light: #eef2ff;
      --purple-main: #6366f1;
      --purple-dark: #3730a3;
      --gray-scaffold: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f8fafc;
        --teal-light: #134e4a;
        --teal-main: #2dd4bf;
        --teal-dark: #ccfbf1;
        --purple-light: #1e1b4b;
        --purple-main: #818cf8;
        --purple-dark: #e0e7ff;
        --gray-scaffold: #475569;
      }
    }
    text { font-family: 'Inter', sans-serif; fill: var(--text); }
    .header { font-size: 14px; font-weight: 500; }
    .label { font-size: 12px; font-weight: 400; }
    .node-teal { fill: var(--teal-light); stroke: var(--teal-main); stroke-width: 0.5px; }
    .node-purple { fill: var(--purple-light); stroke: var(--purple-main); stroke-width: 0.5px; }
    .connector { stroke: var(--teal-main); stroke-width: 1.5px; fill: none; marker-end: url(#arrowhead); }
    .leader { stroke: var(--gray-scaffold); stroke-width: 0.5px; stroke-dasharray: 4,4; fill: none; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--teal-main)" />
    </marker>
  </defs>

  <rect width="800" height="500" fill="var(--bg)" />

  <!-- Center: Cycle Mechanism -->
  <g transform="translate(470, 250)">
    <!-- AI Prediction (Purple) -->
    <rect x="-160" y="-40" width="120" height="80" class="node-purple" rx="4" />
    <text x="-100" y="5" text-anchor="middle" class="header" style="fill: var(--purple-dark);">OpenProtein</text>
    
    <!-- Lab Synthesis (Teal) -->
    <rect x="40" y="-40" width="120" height="80" class="node-teal" rx="4" />
    <text x="100" y="5" text-anchor="middle" class="header" style="fill: var(--teal-dark);">Лаборатория</text>

    <!-- Cycle Flows -->
    <path d="M -40 -20 Q 0 -60 40 -20" class="connector" />
    <text x="0" y="-55" text-anchor="middle" class="label">Дизайн</text>

    <path d="M 40 20 Q 0 60 -40 20" class="connector" />
    <text x="0" y="70" text-anchor="middle" class="label">Резултати</text>
  </g>

  <!-- Left Margin Labeled Leader Lines -->
  <line x1="310" y1="250" x2="140" y2="250" class="leader" />
  <text x="10" y="255" class="label">AI оптимизация</text>
  
  <line x1="470" y1="340" x2="470" y2="400" class="leader" />
  <line x1="470" y1="400" x2="140" y2="400" class="leader" />
  <text x="10" y="405" class="label">Биотехнологичен цикъл</text>

</svg>
