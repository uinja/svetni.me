<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --purple-light: #eef2ff;
      --purple-main: #6366f1;
      --purple-dark: #3730a3;
      --teal-light: #f0fdfa;
      --teal-main: #14b8a6;
      --teal-dark: #0f766e;
      --gray-scaffold: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f8fafc;
        --purple-light: #1e1b4b;
        --purple-main: #818cf8;
        --purple-dark: #e0e7ff;
        --teal-light: #134e4a;
        --teal-main: #2dd4bf;
        --teal-dark: #ccfbf1;
        --gray-scaffold: #475569;
      }
    }
    text { font-family: 'Inter', sans-serif; fill: var(--text); }
    .header { font-size: 14px; font-weight: 500; }
    .label { font-size: 12px; font-weight: 400; }
    .node-purple { fill: var(--purple-light); stroke: var(--purple-main); stroke-width: 0.5px; }
    .node-teal { fill: var(--teal-light); stroke: var(--teal-main); stroke-width: 0.5px; }
    .fan-line { stroke: var(--purple-main); stroke-width: 1.5px; fill: none; marker-end: url(#arrowhead); }
    .leader { stroke: var(--gray-scaffold); stroke-width: 0.5px; stroke-dasharray: 4,4; fill: none; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--purple-main)" />
    </marker>
  </defs>

  <rect width="800" height="500" fill="var(--bg)" />

  <g transform="translate(470, 250)">
    <!-- Source Skill (Purple) -->
    <circle cx="-150" cy="0" r="40" class="node-purple" />
    <text x="-150" y="5" text-anchor="middle" class="header" style="fill: var(--purple-dark);">Мета-умения</text>

    <!-- Fan of transfer -->
    <path d="M -110 0 L 100 -120" class="fan-line" />
    <path d="M -110 0 L 110 -40" class="fan-line" style="stroke-width: 3px;" />
    <path d="M -110 0 L 110 40" class="fan-line" style="stroke-width: 2px;" />
    <path d="M -110 0 L 100 120" class="fan-line" />

    <!-- Targets (Teal) -->
    <rect x="120" y="-140" width="100" height="40" class="node-teal" rx="4" />
    <text x="170" y="-115" text-anchor="middle" class="label" style="fill: var(--teal-dark);">Математика</text>
    
    <rect x="120" y="-60" width="100" height="40" class="node-teal" rx="4" />
    <text x="170" y="-35" text-anchor="middle" class="label" style="fill: var(--teal-dark);">Роботика</text>

    <rect x="120" y="20" width="100" height="40" class="node-teal" rx="4" />
    <text x="170" y="45" text-anchor="middle" class="label" style="fill: var(--teal-dark);">Логика</text>

    <rect x="120" y="100" width="100" height="40" class="node-teal" rx="4" />
    <text x="170" y="125" text-anchor="middle" class="label" style="fill: var(--teal-dark);">...още</text>
  </g>

  <!-- Left Margin Labeled Leader Lines -->
  <line x1="320" y1="250" x2="140" y2="250" class="leader" />
  <text x="10" y="255" class="label">Трансфер на знания</text>
</svg>
