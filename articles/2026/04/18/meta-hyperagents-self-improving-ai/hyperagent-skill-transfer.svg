<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('../../../css/svg-theme.css');
    :root { --foreground: #000000; --background: #ffffff; --surface-soft: #fafafa; --blue: #1231b5; --yellow: #fac832; --red: #f83735; }
    @media (prefers-color-scheme: dark) { :root { --foreground: #e5e0d6; --background: #191d28; --surface-soft: #222838; --blue: #9ec2ff; --yellow: #ffd56a; --red: #ff6e68; } }
    svg { background-color: var(--background); font-family: system-ui, sans-serif; }
    .bg-main { fill: var(--background); }
    .surf { fill: var(--surface-soft); }
    .blue-part { fill: var(--blue); stroke: var(--blue); }
    .yellow-part { fill: var(--yellow); stroke: var(--yellow); }
    .red-part { fill: var(--red); stroke: var(--red); }
    .txt { fill: var(--foreground); }
    .link-line { stroke: var(--foreground); stroke-width: 2; fill: none; opacity: 0.5; }
    .node-box { fill: var(--background); stroke: var(--foreground); stroke-width: 2; rx: 8; }
  </style>

  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="var(--foreground)" opacity="0.1" />
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="txt" opacity="0.5" />
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg-main" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <text x="40" y="40" class="txt" font-size="22" font-weight="800">HyperAgent: Meta-Skill Transfer</text>
  <text x="40" y="60" class="txt" font-size="14" opacity="0.7">Capabilities learned in initial domains transfer to unseen tasks</text>

  <!-- Training Domains -->
  <g transform="translate(60, 100)">
    <rect width="300" height="250" rx="12" class="surf" stroke="var(--blue)" stroke-width="2" opacity="0.4" />
    <text x="150" y="30" text-anchor="middle" class="blue-part" font-weight="bold" stroke="none">Training Environments</text>

    <!-- Domain 1 -->
    <rect x="40" y="60" width="220" height="60" class="node-box" stroke="var(--yellow)" />
    <text x="150" y="85" text-anchor="middle" class="txt" font-weight="bold">Paper Review</text>
    <text x="150" y="105" text-anchor="middle" class="txt" font-size="10" opacity="0.8">Learned: Strict decision pipelines</text>

    <!-- Domain 2 -->
    <rect x="40" y="140" width="220" height="60" class="node-box" stroke="var(--yellow)" />
    <text x="150" y="165" text-anchor="middle" class="txt" font-weight="bold">Robotics Reward Models</text>
    <text x="150" y="185" text-anchor="middle" class="txt" font-size="10" opacity="0.8">Learned: Systematic parameter search</text>
  </g>

  <!-- General Meta-Skills Extraction -->
  <g transform="translate(360, 190)">
    <path d="M 0 -20 L 60 -20 L 60 20 L 110 20" class="link-line" marker-end="url(#arrow)" />
    <path d="M 0 60 L 60 60 L 60 20 L 110 20" class="link-line" marker-end="url(#arrow)" />
  </g>

  <!-- Unseen Domain -->
  <g transform="translate(480, 100)">
    <rect width="260" height="250" rx="12" fill="var(--red)" opacity="0.05" stroke="var(--red)" stroke-width="2" stroke-dasharray="6 4" />
    <text x="130" y="30" text-anchor="middle" class="red-part" font-weight="bold" stroke="none">Unseen Hold-Out Domain</text>

    <!-- Unified Meta-Skill Set -->
    <rect x="30" y="60" width="200" height="60" class="node-box" stroke="var(--blue)" />
    <text x="130" y="85" text-anchor="middle" class="blue-part" font-weight="bold" stroke="none">Unified Meta-Skills</text>
    <text x="130" y="105" text-anchor="middle" class="txt" font-size="10" opacity="0.8">Memory, Planning, Budgeting</text>

    <path d="M 130 120 L 130 160" class="link-line" marker-end="url(#arrow)" />

    <!-- Math Grading -->
    <rect x="30" y="160" width="200" height="80" class="node-box" stroke="var(--red)" />
    <text x="130" y="190" text-anchor="middle" class="txt" font-weight="bold">Olympiad Math Grading</text>
    <text x="130" y="210" text-anchor="middle" class="red-part" font-size="12" stroke="none">HyperAgent: 0.630 Score</text>
    <text x="130" y="225" text-anchor="middle" class="txt" font-size="10" opacity="0.6">Classic DGM: 0.0 Score</text>
  </g>

</svg>
