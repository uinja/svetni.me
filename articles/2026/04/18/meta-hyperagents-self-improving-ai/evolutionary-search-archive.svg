<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('../../../css/svg-theme.css');
    :root { --foreground: #000000; --background: #ffffff; --surface-soft: #fafafa; --blue: #1231b5; --yellow: #fac832; --red: #f83735; }
    @media (prefers-color-scheme: dark) { :root { --foreground: #e5e0d6; --background: #191d28; --surface-soft: #222838; --blue: #9ec2ff; --yellow: #ffd56a; --red: #ff6e68; } }
    svg { background-color: var(--background); font-family: system-ui, sans-serif; }
    .bg-main { fill: var(--background); }
    .surf { fill: var(--surface-soft); }
    .blue-part { fill: var(--blue); stroke: var(--blue); }
    .yellow-part { fill: var(--yellow); stroke: var(--yellow); }
    .red-part { fill: var(--red); stroke: var(--red); }
    .green-part { fill: #05c46b; stroke: #05c46b; }
    .txt { fill: var(--foreground); }
    .link-line { stroke: var(--foreground); stroke-width: 2; fill: none; }
    .dash-line { stroke: var(--foreground); stroke-width: 2; fill: none; stroke-dasharray: 4 4; opacity: 0.5; }
    .node-box { fill: var(--background); stroke: var(--foreground); stroke-width: 2; rx: 8; }
  </style>

  <defs>
    <pattern id="dot-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="var(--foreground)" opacity="0.05" />
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="txt" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#05c46b" />
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg-main" />
  <rect width="100%" height="100%" fill="url(#dot-grid)" />

  <!-- Title -->
  <text x="40" y="40" class="txt" font-size="22" font-weight="800">DGM-H: Open-Ended Evolutionary Archive</text>
  <text x="40" y="60" class="txt" font-size="14" opacity="0.7">Branching from successful candidates ensures compounding improvements</text>

  <!-- Archive Section (Left) -->
  <rect x="40" y="90" width="160" height="280" rx="8" class="surf" stroke="var(--blue)" stroke-width="2" opacity="0.3" />
  <text x="120" y="115" text-anchor="middle" class="blue-part" stroke="none" font-weight="bold">HyperAgent Archive</text>
  <path d="M 60 130 L 180 130" stroke="var(--blue)" stroke-width="1" opacity="0.5" />
  
  <rect x="60" y="150" width="120" height="40" class="node-box" />
  <text x="120" y="175" text-anchor="middle" class="txt" font-weight="600" font-size="12">Base Agent</text>

  <rect x="60" y="210" width="120" height="40" class="node-box" stroke="var(--yellow)" />
  <text x="120" y="235" text-anchor="middle" class="txt" font-weight="600" font-size="12">Gen 1-A (Task)</text>

  <rect x="60" y="270" width="120" height="40" class="node-box" stroke="var(--blue)" />
  <text x="120" y="295" text-anchor="middle" class="txt" font-weight="600" font-size="12">Gen 2 (Logic)</text>

  <text x="120" y="340" text-anchor="middle" class="txt" font-size="10" opacity="0.5">... Continues growing</text>

  <!-- Evaluation Section (Right) -->
  <rect x="260" y="90" width="500" height="280" rx="8" class="surf" stroke="var(--foreground)" stroke-width="1" opacity="0.3" stroke-dasharray="6 4" />
  <text x="510" y="115" text-anchor="middle" class="txt" font-weight="bold" opacity="0.6">Exploration & Evaluation Environment</text>

  <!-- Base to Gen 1 -->
  <path d="M 180 170 L 260 170 L 290 140" class="link-line" marker-end="url(#arrow)" />
  <path d="M 260 170 L 290 200" class="link-line" marker-end="url(#arrow)" />

  <!-- Nodes Gen 1 -->
  <g transform="translate(300, 120)">
    <rect width="120" height="40" class="node-box" stroke="var(--yellow)" />
    <text x="60" y="20" text-anchor="middle" class="txt" font-size="12" font-weight="bold">Variant A</text>
    <text x="60" y="33" text-anchor="middle" class="yellow-part" stroke="none" font-size="10">Score: 0.85</text>
    <!-- Add to archive loop -->
    <path d="M 60 40 L 60 100 L -210 100" class="link-line" stroke="#05c46b" marker-end="url(#arrow-green)" />
    <rect x="-90" y="90" width="100" height="20" fill="var(--background)" rx="4" />
    <text x="-40" y="104" text-anchor="middle" fill="#05c46b" font-size="10" font-weight="bold">Promote & Save</text>
  </g>

  <g transform="translate(300, 180)">
    <rect width="120" height="40" class="node-box" stroke="var(--red)" opacity="0.5" />
    <text x="60" y="20" text-anchor="middle" class="txt" font-size="12" font-weight="bold" opacity="0.5">Variant B</text>
    <text x="60" y="33" text-anchor="middle" class="red-part" stroke="none" font-size="10" opacity="0.5">Score: 0.42 (Drop)</text>
  </g>

  <!-- Gen 1 to Gen 2 -->
  <path d="M 180 230 L 460 230 L 480 260" class="link-line" marker-end="url(#arrow)" />
  <path d="M 460 230 L 480 200" class="link-line" marker-end="url(#arrow)" />

  <!-- Nodes Gen 2 -->
  <g transform="translate(490, 240)">
    <rect width="130" height="40" class="node-box" stroke="var(--blue)" />
    <text x="65" y="20" text-anchor="middle" class="txt" font-size="12" font-weight="bold">Variant C (Meta)</text>
    <text x="65" y="33" text-anchor="middle" class="blue-part" stroke="none" font-size="10">Score: 0.91</text>
    <!-- Add to archive loop -->
    <path d="M 65 40 L 65 150 L -400 150 L -400 65" class="link-line" stroke="#05c46b" marker-end="url(#arrow-green)" />
    <rect x="-180" y="140" width="100" height="20" fill="var(--background)" rx="4" />
    <text x="-130" y="154" text-anchor="middle" fill="#05c46b" font-size="10" font-weight="bold">Promote & Save</text>
  </g>
  
  <g transform="translate(490, 180)">
    <rect width="130" height="40" class="node-box" stroke="var(--red)" opacity="0.5" />
    <text x="65" y="20" text-anchor="middle" class="txt" font-size="12" font-weight="bold" opacity="0.5">Variant D (Meta)</text>
    <text x="65" y="33" text-anchor="middle" class="red-part" stroke="none" font-size="10" opacity="0.5">Eval Timeout</text>
  </g>

  <!-- Explanation note -->
  <g transform="translate(640, 120)">
    <rect width="100" height="80" rx="4" fill="var(--yellow)" opacity="0.1" />
    <text x="50" y="25" text-anchor="middle" class="yellow-part" stroke="none" font-size="10" font-weight="bold">Task Upgrade</text>
    <text x="50" y="45" text-anchor="middle" class="txt" font-size="9">Agent rewrote</text>
    <text x="50" y="57" text-anchor="middle" class="txt" font-size="9">its domain</text>
    <text x="50" y="69" text-anchor="middle" class="txt" font-size="9">execution logic.</text>
  </g>

  <g transform="translate(640, 240)">
    <rect width="100" height="80" rx="4" fill="var(--blue)" opacity="0.1" />
    <text x="50" y="25" text-anchor="middle" class="blue-part" stroke="none" font-size="10" font-weight="bold">Meta Upgrade</text>
    <text x="50" y="45" text-anchor="middle" class="txt" font-size="9">Agent rewrote</text>
    <text x="50" y="57" text-anchor="middle" class="txt" font-size="9">its own evaluation</text>
    <text x="50" y="69" text-anchor="middle" class="txt" font-size="9">protocols.</text>
  </g>

</svg>
