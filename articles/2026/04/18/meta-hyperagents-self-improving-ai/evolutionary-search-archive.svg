<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --teal-light: #f0fdfa;
      --teal-main: #14b8a6;
      --teal-dark: #0f766e;
      --amber-light: #fffbeb;
      --amber-main: #f59e0b;
      --amber-dark: #92400e;
      --gray-scaffold: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f8fafc;
        --teal-light: #134e4a;
        --teal-main: #2dd4bf;
        --teal-dark: #ccfbf1;
        --amber-light: #451a03;
        --amber-main: #fbbf24;
        --amber-dark: #fef3c7;
        --gray-scaffold: #475569;
      }
    }
    text { font-family: 'Inter', sans-serif; fill: var(--text); }
    .header { font-size: 14px; font-weight: 500; }
    .label { font-size: 12px; font-weight: 400; }
    .node-teal { fill: var(--teal-light); stroke: var(--teal-main); stroke-width: 0.5px; }
    .node-amber { fill: var(--amber-light); stroke: var(--amber-main); stroke-width: 0.5px; }
    .connector { stroke: var(--teal-main); stroke-width: 1.5px; fill: none; }
    .leader { stroke: var(--gray-scaffold); stroke-width: 0.5px; stroke-dasharray: 4,4; fill: none; }
  </style>

  <rect width="800" height="500" fill="var(--bg)" />

  <!-- Archive (Layers/Depth) -->
  <g transform="translate(550, 200)">
    <rect x="0" y="120" width="140" height="40" class="node-teal" rx="4" style="fill-opacity: 0.2;" />
    <rect x="0" y="80" width="140" height="40" class="node-teal" rx="4" style="fill-opacity: 0.5;" />
    <rect x="0" y="40" width="140" height="40" class="node-teal" rx="4" style="fill-opacity: 0.8;" />
    <rect x="0" y="0" width="140" height="40" class="node-amber" rx="4" />
    <text x="70" y="25" text-anchor="middle" class="header" style="fill: var(--amber-dark);">Архив</text>
  </g>

  <!-- Evolutionary Search (Network) -->
  <g transform="translate(300, 250)">
    <circle cx="0" cy="0" r="30" class="node-teal" />
    <text x="0" y="45" text-anchor="middle" class="label">Търсене</text>
    
    <circle cx="-80" cy="-60" r="10" class="node-teal" />
    <circle cx="80" cy="-60" r="10" class="node-teal" />
    <circle cx="-80" cy="60" r="10" class="node-teal" />
    <circle cx="80" cy="60" r="15" class="node-amber" /> <!-- Successful agent -->
    
    <line x1="-25" y1="-20" x2="-70" y2="-50" class="connector" stroke-width="0.5px" />
    <line x1="25" y1="-20" x2="70" y2="-50" class="connector" stroke-width="0.5px" />
    <line x1="-25" y1="20" x2="-70" y2="50" class="connector" stroke-width="0.5px" />
    <line x1="25" y1="20" x2="68" y2="48" class="connector" />
  </g>

  <!-- Left Margin Labeled Leader Lines -->
  <line x1="260" y1="250" x2="140" y2="250" class="leader" />
  <text x="10" y="255" class="label">Автономна еволюция</text>
</svg>
