<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --purple-light: #eef2ff;
      --purple-main: #6366f1;
      --purple-dark: #3730a3;
      --gray-light: #f9fafb;
      --gray-main: #9ca3af;
      --gray-dark: #374151;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f8fafc;
        --purple-light: #1e1b4b;
        --purple-main: #818cf8;
        --purple-dark: #e0e7ff;
        --gray-light: #1f2937;
        --gray-main: #4b5563;
        --gray-dark: #d1d5db;
      }
    }
    text { font-family: 'Inter', sans-serif; fill: var(--text); }
    .header { font-size: 14px; font-weight: 500; }
    .label { font-size: 12px; font-weight: 400; }
    .connector { stroke: var(--gray-main); stroke-width: 1.5px; fill: none; marker-end: url(#arrowhead); }
    .leader { stroke: var(--gray-main); stroke-width: 0.5px; stroke-dasharray: 4,4; fill: none; }
    .node-purple { fill: var(--purple-light); stroke: var(--purple-main); stroke-width: 0.5px; }
    .node-gray { fill: var(--gray-light); stroke: var(--gray-main); stroke-width: 0.5px; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--gray-main)" />
    </marker>
  </defs>

  <rect width="800" height="500" fill="var(--bg)" />

  <g transform="translate(470, 250)">
    <!-- Meta Agent (Fixed) -->
    <rect x="-160" y="-40" width="100" height="80" class="node-gray" rx="4" />
    <text x="-110" y="5" text-anchor="middle" class="header" style="fill: var(--gray-dark);">Мета-агент</text>
    
    <!-- Task Agent -->
    <rect x="60" y="-40" width="100" height="80" class="node-purple" rx="4" />
    <text x="110" y="5" text-anchor="middle" class="header" style="fill: var(--purple-dark);">Изпълнител</text>

    <!-- Cycle -->
    <path d="M -60 -20 Q 0 -60 60 -20" class="connector" />
    <text x="0" y="-55" text-anchor="middle" class="label">Модификация</text>

    <path d="M 60 20 Q 0 60 -60 20" class="connector" />
    <text x="0" y="70" text-anchor="middle" class="label">Код/Данни</text>

    <!-- Maintenance Wall -->
    <line x1="-180" y1="-80" x2="-180" y2="80" class="leader" style="stroke-dasharray: none; stroke-width: 1px;" />
    <text x="-190" y="0" text-anchor="end" class="label" style="fill: var(--gray-main);">Стена на поддръжката</text>
  </g>

  <!-- Left Margin Labeled Leader Lines -->
  <line x1="310" y1="250" x2="140" y2="250" class="leader" />
  <text x="10" y="255" class="label">Проектиран от хора</text>
</svg>
