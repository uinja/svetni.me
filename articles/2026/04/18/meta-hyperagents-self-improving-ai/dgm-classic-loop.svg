<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('../../../css/svg-theme.css');
    :root { --foreground: #000000; --background: #ffffff; --surface-soft: #fafafa; --blue: #1231b5; --yellow: #fac832; --red: #f83735; }
    @media (prefers-color-scheme: dark) { :root { --foreground: #e5e0d6; --background: #191d28; --surface-soft: #222838; --blue: #9ec2ff; --yellow: #ffd56a; --red: #ff6e68; } }
    svg { background-color: var(--background); font-family: system-ui, sans-serif; }
    .bg-main { fill: var(--background); }
    .surf { fill: var(--surface-soft); }
    .blue-part { fill: var(--blue); stroke: var(--blue); }
    .yellow-part { fill: var(--yellow); stroke: var(--yellow); }
    .red-part { fill: var(--red); stroke: var(--red); }
    .txt { fill: var(--foreground); }
    .link-line { stroke: var(--foreground); stroke-width: 2; fill: none; opacity: 0.5; }
    .dash-line { stroke: var(--foreground); stroke-width: 2; fill: none; stroke-dasharray: 4 4; opacity: 0.5; }
  </style>

  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none" />
      <circle cx="2" cy="2" r="1" fill="var(--foreground)" opacity="0.1" />
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="txt" opacity="0.5" />
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg-main" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <text x="40" y="40" class="txt" font-size="22" font-weight="800">Classic DGM: Coding-Specific Self-Improvement</text>
  <text x="40" y="60" class="txt" font-size="14" opacity="0.7">Self-improvement works because the domain task (Coding) aligns with the meta-task (Rewriting Code)</text>

  <!-- Coding Domain Alignment -->
  <g transform="translate(100, 150)">
    <!-- Base Block -->
    <rect x="0" y="0" width="600" height="180" rx="12" class="surf" stroke="var(--blue)" stroke-width="2" opacity="0.4" />
    <text x="300" y="30" text-anchor="middle" class="blue-part" font-weight="bold" stroke="none">Alignment Zone: The "Skill Gap" is Zero</text>

    <!-- Meta Task -->
    <g transform="translate(80, 70)">
      <rect width="160" height="60" rx="8" class="bg-main" stroke="var(--red)" stroke-width="2" />
      <text x="80" y="25" text-anchor="middle" class="red-part" font-weight="bold" stroke="none">Meta Agent</text>
      <text x="80" y="45" text-anchor="middle" class="txt" font-size="12">Task: Rewrite Code</text>
    </g>

    <!-- Execution Task -->
    <g transform="translate(360, 70)">
      <rect width="160" height="60" rx="8" class="bg-main" stroke="var(--yellow)" stroke-width="2" />
      <text x="80" y="25" text-anchor="middle" class="yellow-part" font-weight="bold" stroke="none">Task Agent</text>
      <text x="80" y="45" text-anchor="middle" class="txt" font-size="12">Task: Write Software</text>
    </g>

    <!-- Connection -->
    <path d="M 240 100 L 360 100" class="link-line" marker-end="url(#arrow)" />
    <text x="300" y="90" text-anchor="middle" class="txt" font-size="10" opacity="0.6">Improves performance</text>

    <path d="M 440 130 L 440 160 L 160 160 L 160 130" class="link-line" marker-end="url(#arrow)" />
    <text x="300" y="150" text-anchor="middle" class="txt" font-size="10" opacity="0.6">Better coding skill directly improves the Meta Agent's rewriting ability</text>
  </g>

</svg>
