<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --purple-light: #eef2ff;
      --purple-main: #6366f1;
      --purple-dark: #3730a3;
      --teal-light: #f0fdfa;
      --teal-main: #14b8a6;
      --teal-dark: #0f766e;
      --gray-scaffold: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f8fafc;
        --purple-light: #1e1b4b;
        --purple-main: #818cf8;
        --purple-dark: #e0e7ff;
        --teal-light: #134e4a;
        --teal-main: #2dd4bf;
        --teal-dark: #ccfbf1;
        --gray-scaffold: #475569;
      }
    }
    text { font-family: 'Inter', sans-serif; fill: var(--text); }
    .header { font-size: 14px; font-weight: 500; }
    .label { font-size: 12px; font-weight: 400; }
    .connector { stroke: var(--teal-main); stroke-width: 1.5px; fill: none; marker-end: url(#arrowhead); }
    .leader { stroke: var(--gray-scaffold); stroke-width: 0.5px; stroke-dasharray: 4,4; fill: none; }
    .node-purple { fill: var(--purple-light); stroke: var(--purple-main); stroke-width: 0.5px; }
    .node-teal { fill: var(--teal-light); stroke: var(--teal-main); stroke-width: 0.5px; }
    .loop-path { stroke: var(--purple-main); stroke-width: 1.5px; fill: none; stroke-dasharray: 5,3; marker-end: url(#arrowhead-purple); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--teal-main)" />
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--purple-main)" />
    </marker>
  </defs>

  <rect width="800" height="500" fill="var(--bg)" />

  <!-- Center composition: Metacognitive Loop -->
  <g transform="translate(470, 250)">
    <!-- The Integrated Agent Core (Purple/Teal Merge) -->
    <rect x="-80" y="-80" width="160" height="160" class="node-purple" rx="20" style="stroke-width: 2px; fill-opacity: 0.5;" />
    <circle cx="0" cy="0" r="40" class="node-teal" />
    <text x="0" y="5" text-anchor="middle" class="header" style="fill: var(--teal-dark);">HyperAgent</text>

    <!-- Self-Modification Cycle (The Mechanism) -->
    <path d="M 90 0 A 90 90 0 1 1 -90 0 A 90 90 0 1 1 90 0" class="loop-path" style="stroke-width: 2.5px; stroke-dasharray: none;" />
    
    <!-- Meta-Evolution Steps -->
    <circle cx="0" cy="-90" r="10" class="node-purple" />
    <circle cx="90" cy="0" r="10" class="node-purple" />
    <circle cx="0" cy="90" r="10" class="node-purple" />
    <circle cx="-90" cy="0" r="10" class="node-purple" />

    <text x="0" y="-110" text-anchor="middle" class="label">Оптимизация на кода</text>
    <text x="110" y="5" text-anchor="start" class="label">Оценка</text>
    <text x="0" y="125" text-anchor="middle" class="label">Самореференция</text>
    <text x="-110" y="5" text-anchor="end" class="label">Подобряване</text>
  </g>

  <!-- Left Margin (140px) for Labeled Leader Lines -->
  <line x1="380" y1="250" x2="140" y2="250" class="leader" />
  <text x="10" y="255" class="label">Единна програма</text>
  
  <line x1="470" y1="160" x2="470" y2="80" class="leader" />
  <line x1="470" y1="80" x2="140" y2="80" class="leader" />
  <text x="10" y="85" class="label">Метакогнитивен цикъл</text>

  <line x1="470" y1="340" x2="470" y2="420" class="leader" />
  <line x1="470" y1="420" x2="140" y2="420" class="leader" />
  <text x="10" y="425" class="label">Архитектурна еволюция</text>

</svg>
