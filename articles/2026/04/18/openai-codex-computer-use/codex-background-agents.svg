<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --teal-light: #f0fdfa;
      --teal-main: #14b8a6;
      --teal-dark: #0f766e;
      --gray-scaffold: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f8fafc;
        --teal-light: #134e4a;
        --teal-main: #2dd4bf;
        --teal-dark: #ccfbf1;
        --gray-scaffold: #475569;
      }
    }
    text { font-family: 'Inter', sans-serif; fill: var(--text); }
    .header { font-size: 14px; font-weight: 500; }
    .label { font-size: 12px; font-weight: 400; }
    .node-teal { fill: var(--teal-light); stroke: var(--teal-main); stroke-width: 0.5px; }
    .leader { stroke: var(--gray-scaffold); stroke-width: 0.5px; stroke-dasharray: 4,4; fill: none; }
    .connector { stroke: var(--teal-main); stroke-width: 1.5px; fill: none; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--teal-main)" />
    </marker>
  </defs>

  <rect width="800" height="500" fill="var(--bg)" />

  <!-- Center: Layers/Depth Form -->
  <g transform="translate(470, 250)">
    <!-- Main User Interface Layer -->
    <rect x="-150" y="-120" width="300" height="40" class="node-teal" rx="4" />
    <text x="0" y="-95" text-anchor="middle" class="header" style="fill: var(--teal-dark);">Потребителски интерфейс (GUI)</text>
    
    <!-- Background Agents (Stacked Layers) -->
    <rect x="-130" y="-40" width="260" height="40" class="node-teal" rx="4" style="fill-opacity: 0.8;" />
    <text x="0" y="-15" text-anchor="middle" class="label" style="fill: var(--teal-dark);">Оркестриращ агент</text>

    <rect x="-110" y="40" width="220" height="40" class="node-teal" rx="4" style="fill-opacity: 0.5;" />
    <text x="0" y="65" text-anchor="middle" class="label" style="fill: var(--teal-dark);">Специализирани фонови агенти</text>

    <rect x="-90" y="120" width="180" height="40" class="node-teal" rx="4" style="fill-opacity: 0.2;" />
    <text x="0" y="145" text-anchor="middle" class="label" style="fill: var(--teal-dark);">Системни операции</text>

    <!-- Connectors -->
    <path d="M 0 -80 L 0 -45" class="connector" />
    <path d="M 0 0 L 0 35" class="connector" />
    <path d="M 0 80 L 0 115" class="connector" />
  </g>

  <!-- Left Margin Labeled Leader Lines -->
  <line x1="320" y1="130" x2="140" y2="130" class="leader" />
  <text x="10" y="135" class="label">Видим интерфейс</text>
  
  <line x1="340" y1="300" x2="140" y2="300" class="leader" />
  <text x="10" y="305" class="label">Фонова автоматизация</text>

</svg>
