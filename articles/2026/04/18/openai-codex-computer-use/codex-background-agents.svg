<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Desktop Background -->
  <rect width="800" height="400" rx="10" fill="#2d3436" />
  
  <!-- Grid pattern for desktop -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#636e72" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#grid)" rx="10" />

  <!-- Main User Window -->
  <rect x="150" y="50" width="500" height="300" rx="8" fill="#dfe6e9" stroke="#b2bec3" stroke-width="2" />
  <rect x="150" y="50" width="500" height="25" rx="8" fill="#b2bec3" />
  <text x="400" y="68" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#2d3436">User Application (Active)</text>
  <circle cx="165" cy="62.5" r="4" fill="#ff7675" />
  <circle cx="178" cy="62.5" r="4" fill="#fab1a0" />
  <circle cx="191" cy="62.5" r="4" fill="#55efc4" />
  
  <!-- Background Agent 1: Terminal -->
  <g transform="translate(50, 220) scale(0.8)">
    <rect width="200" height="150" rx="5" fill="#000" stroke="#00d2ff" stroke-width="1" />
    <text x="10" y="20" font-family="monospace" font-size="10" fill="#00ff00">> codex test --parallel</text>
    <text x="10" y="35" font-family="monospace" font-size="10" fill="#fff">Running unit tests...</text>
    <rect x="180" y="130" width="8" height="8" fill="#00d2ff" opacity="0.6" /> <!-- Agent cursor -->
  </g>

  <!-- Background Agent 2: Browser -->
  <g transform="translate(580, 80) scale(0.8)">
    <rect width="200" height="150" rx="5" fill="#fff" stroke="#a29bfe" stroke-width="1" />
    <rect width="200" height="15" rx="5" fill="#a29bfe" />
    <rect x="10" y="30" width="180" height="10" rx="2" fill="#dfe6e9" />
    <rect x="10" y="50" width="180" height="80" rx="2" fill="#f1f2f6" />
    <rect x="150" y="100" width="8" height="8" fill="#a29bfe" opacity="0.6" /> <!-- Agent cursor -->
  </g>

  <!-- Background Agent 3: Slack/Chat -->
  <g transform="translate(600, 260) scale(0.7)">
    <rect width="180" height="120" rx="5" fill="#4a154b" stroke="#fff" stroke-width="1" opacity="0.9" />
    <circle cx="20" cy="30" r="10" fill="#fff" opacity="0.5" />
    <rect x="40" y="25" width="120" height="10" rx="2" fill="#fff" opacity="0.3" />
    <rect x="20" y="80" width="8" height="8" fill="#fff" opacity="0.8" /> <!-- Agent cursor -->
  </g>

  <!-- Agent Overlay Label -->
  <rect x="300" y="360" width="200" height="30" rx="15" fill="#00cec9" />
  <text x="400" y="381" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">Codex Background Agents</text>
  
  <!-- Connection Lines (Stylized) -->
  <path d="M 400,360 C 400,320 150,300 130,295" stroke="#00cec9" stroke-width="1" fill="none" stroke-dasharray="4 2" />
  <path d="M 400,360 C 400,320 650,250 660,200" stroke="#00cec9" stroke-width="1" fill="none" stroke-dasharray="4 2" />
  <path d="M 400,360 C 400,340 700,340 690,320" stroke="#00cec9" stroke-width="1" fill="none" stroke-dasharray="4 2" />
</svg>
