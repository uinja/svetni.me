<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --amber-light: #fffbeb;
      --amber-main: #f59e0b;
      --amber-dark: #92400e;
      --gray-scaffold: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f8fafc;
        --amber-light: #451a03;
        --amber-main: #fbbf24;
        --amber-dark: #fef3c7;
        --gray-scaffold: #475569;
      }
    }
    text { font-family: 'Inter', sans-serif; fill: var(--text); }
    .header { font-size: 14px; font-weight: 500; }
    .label { font-size: 12px; font-weight: 400; }
    .node-amber { fill: var(--amber-light); stroke: var(--amber-main); stroke-width: 0.5px; }
    .leader { stroke: var(--gray-scaffold); stroke-width: 0.5px; stroke-dasharray: 4,4; fill: none; }
  </style>

  <rect width="800" height="500" fill="var(--bg)" />

  <!-- Center: Layers/Depth Form (Growth) -->
  <g transform="translate(470, 250)">
    <!-- Valuation Tiers -->
    <rect x="-100" y="80" width="200" height="40" class="node-amber" rx="4" style="fill-opacity: 0.2;" />
    <text x="0" y="105" text-anchor="middle" class="label" style="fill: var(--amber-dark);">$18B (2024)</text>

    <rect x="-120" y="40" width="240" height="40" class="node-amber" rx="4" style="fill-opacity: 0.5;" />
    <text x="0" y="65" text-anchor="middle" class="label" style="fill: var(--amber-dark);">$40B (2025)</text>

    <rect x="-150" y="0" width="300" height="40" class="node-amber" rx="4" />
    <text x="0" y="25" text-anchor="middle" class="header" style="fill: var(--amber-dark);">$80B+ (2026)</text>
  </g>

  <!-- Left Margin Labeled Leader Lines -->
  <line x1="320" y1="230" x2="140" y2="230" class="leader" />
  <text x="10" y="235" class="label">Експоненциален растеж</text>
  
  <line x1="470" y1="300" x2="470" y2="400" class="leader" />
  <line x1="470" y1="400" x2="140" y2="400" class="leader" />
  <text x="10" y="405" class="label">Anthropic пазарна оценка</text>

</svg>
