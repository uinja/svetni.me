<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --purple-light: #eef2ff;
      --purple-main: #6366f1;
      --purple-dark: #3730a3;
      --teal-light: #f0fdfa;
      --teal-main: #14b8a6;
      --teal-dark: #0f766e;
      --gray-scaffold: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f8fafc;
        --purple-light: #1e1b4b;
        --purple-main: #818cf8;
        --purple-dark: #e0e7ff;
        --teal-light: #134e4a;
        --teal-main: #2dd4bf;
        --teal-dark: #ccfbf1;
        --gray-scaffold: #475569;
      }
    }
    text { font-family: 'Inter', sans-serif; fill: var(--text); }
    .header { font-size: 14px; font-weight: 500; }
    .label { font-size: 12px; font-weight: 400; }
    .node-purple { fill: var(--purple-light); stroke: var(--purple-main); stroke-width: 0.5px; }
    .node-teal { fill: var(--teal-light); stroke: var(--teal-main); stroke-width: 0.5px; }
    .leader { stroke: var(--gray-scaffold); stroke-width: 0.5px; stroke-dasharray: 4,4; fill: none; }
  </style>

  <rect width="800" height="500" fill="var(--bg)" />

  <!-- Center: Layers/Depth Form (Security) -->
  <g transform="translate(470, 250)">
    <!-- Security Layers -->
    <rect x="-130" y="60" width="260" height="40" class="node-purple" rx="4" style="fill-opacity: 0.2;" />
    <text x="0" y="85" text-anchor="middle" class="label" style="fill: var(--purple-dark);">Сигурен Sandbox</text>

    <rect x="-130" y="10" width="260" height="40" class="node-purple" rx="4" style="fill-opacity: 0.5;" />
    <text x="0" y="35" text-anchor="middle" class="label" style="fill: var(--purple-dark);">Криптографска проверка</text>

    <rect x="-130" y="-40" width="260" height="40" class="node-teal" rx="4" />
    <text x="0" y="-15" text-anchor="middle" class="header" style="fill: var(--teal-dark);">OpenAI Agents SDK</text>
  </g>

  <!-- Left Margin Labeled Leader Lines -->
  <line x1="340" y1="210" x2="140" y2="210" class="leader" />
  <text x="10" y="215" class="label">Защита на изпълнението</text>
  
  <line x1="470" y1="350" x2="470" y2="400" class="leader" />
  <line x1="470" y1="400" x2="140" y2="400" class="leader" />
  <text x="10" y="405" class="label">Нов стандарт за сигурност</text>

</svg>
