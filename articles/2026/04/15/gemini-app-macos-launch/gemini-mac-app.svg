<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --purple-light: #eef2ff;
      --purple-main: #6366f1;
      --purple-dark: #3730a3;
      --teal-light: #f0fdfa;
      --teal-main: #14b8a6;
      --teal-dark: #0f766e;
      --gray-scaffold: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f8fafc;
        --purple-light: #1e1b4b;
        --purple-main: #818cf8;
        --purple-dark: #e0e7ff;
        --teal-light: #134e4a;
        --teal-main: #2dd4bf;
        --teal-dark: #ccfbf1;
        --gray-scaffold: #475569;
      }
    }
    text { font-family: 'Inter', sans-serif; fill: var(--text); }
    .header { font-size: 14px; font-weight: 500; }
    .label { font-size: 12px; font-weight: 400; }
    .node-purple { fill: var(--purple-light); stroke: var(--purple-main); stroke-width: 0.5px; }
    .node-teal { fill: var(--teal-light); stroke: var(--teal-main); stroke-width: 0.5px; }
    .leader { stroke: var(--gray-scaffold); stroke-width: 0.5px; stroke-dasharray: 4,4; fill: none; }
    .connector { stroke: var(--purple-main); stroke-width: 1.5px; fill: none; }
  </style>

  <rect width="800" height="500" fill="var(--bg)" />

  <!-- Center: Network Form (MacOS Integration) -->
  <g transform="translate(470, 250)">
    <!-- Gemini App (Purple) -->
    <rect x="-60" y="-60" width="120" height="120" class="node-purple" rx="20" />
    <text x="0" y="5" text-anchor="middle" class="header" style="fill: var(--purple-dark);">Gemini</text>
    
    <!-- MacOS Ecosystem (Teal Nodes) -->
    <circle cx="-140" cy="0" r="30" class="node-teal" />
    <text x="-140" y="5" text-anchor="middle" class="label" style="fill: var(--teal-dark);">Finder</text>
    
    <circle cx="140" cy="0" r="30" class="node-teal" />
    <text x="140" y="5" text-anchor="middle" class="label" style="fill: var(--teal-dark);">Xcode</text>
    
    <circle cx="0" cy="-140" r="30" class="node-teal" />
    <text x="0" y="-135" text-anchor="middle" class="label" style="fill: var(--teal-dark);">Safari</text>

    <!-- Connectors -->
    <line x1="-60" y1="0" x2="-110" y2="0" class="connector" />
    <line x1="60" y1="0" x2="110" y2="0" class="connector" />
    <line x1="0" y1="-60" x2="0" y2="-110" class="connector" />
  </g>

  <!-- Left Margin Labeled Leader Lines -->
  <line x1="330" y1="250" x2="140" y2="250" class="leader" />
  <text x="10" y="255" class="label">Дълбока интеграция</text>
  
  <line x1="470" y1="390" x2="140" y2="390" class="leader" />
  <text x="10" y="395" class="label">Gemini за macOS</text>

</svg>
