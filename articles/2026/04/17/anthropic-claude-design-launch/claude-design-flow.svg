<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --purple-light: #eef2ff;
      --purple-main: #6366f1;
      --purple-dark: #3730a3;
      --amber-light: #fffbeb;
      --amber-main: #f59e0b;
      --amber-dark: #92400e;
      --gray-scaffold: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f8fafc;
        --purple-light: #1e1b4b;
        --purple-main: #818cf8;
        --purple-dark: #e0e7ff;
        --amber-light: #451a03;
        --amber-main: #fbbf24;
        --amber-dark: #fef3c7;
        --gray-scaffold: #475569;
      }
    }
    text { font-family: 'Inter', sans-serif; fill: var(--text); }
    .header { font-size: 14px; font-weight: 500; }
    .label { font-size: 12px; font-weight: 400; }
    .node-purple { fill: var(--purple-light); stroke: var(--purple-main); stroke-width: 0.5px; }
    .node-amber { fill: var(--amber-light); stroke: var(--amber-main); stroke-width: 0.5px; }
    .connector { stroke: var(--purple-main); stroke-width: 1.5px; fill: none; marker-end: url(#arrowhead); }
    .leader { stroke: var(--gray-scaffold); stroke-width: 0.5px; stroke-dasharray: 4,4; fill: none; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--purple-main)" />
    </marker>
  </defs>

  <rect width="800" height="500" fill="var(--bg)" />

  <!-- Center: Cycle Form (Design Flow) -->
  <g transform="translate(470, 250)">
    <!-- Intent (Amber) -->
    <circle cx="-120" cy="0" r="50" class="node-amber" />
    <text x="-120" y="5" text-anchor="middle" class="header" style="fill: var(--amber-dark);">Идея</text>
    
    <!-- Design (Purple) -->
    <circle cx="120" cy="0" r="50" class="node-purple" />
    <text x="120" y="5" text-anchor="middle" class="header" style="fill: var(--purple-dark);">Дизайн</text>

    <!-- Cycle Connectors -->
    <path d="M -70 -20 Q 0 -60 70 -20" class="connector" />
    <text x="0" y="-55" text-anchor="middle" class="label">Генерация</text>

    <path d="M 70 20 Q 0 60 -70 20" class="connector" />
    <text x="0" y="75" text-anchor="middle" class="label">Редакция</text>
  </g>

  <!-- Left Margin Labeled Leader Lines -->
  <line x1="330" y1="250" x2="140" y2="250" class="leader" />
  <text x="10" y="255" class="label">Интерактивно платно</text>
  
  <line x1="470" y1="160" x2="470" y2="80" class="leader" />
  <line x1="470" y1="80" x2="140" y2="80" class="leader" />
  <text x="10" y="85" class="label">Claude Artifacts</text>

</svg>
