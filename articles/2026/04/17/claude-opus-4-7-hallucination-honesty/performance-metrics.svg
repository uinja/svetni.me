<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --teal-light: #f0fdfa;
      --teal-main: #14b8a6;
      --teal-dark: #0f766e;
      --amber-light: #fffbeb;
      --amber-main: #f59e0b;
      --amber-dark: #92400e;
      --gray-scaffold: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f8fafc;
        --teal-light: #134e4a;
        --teal-main: #2dd4bf;
        --teal-dark: #ccfbf1;
        --amber-light: #451a03;
        --amber-main: #fbbf24;
        --amber-dark: #fef3c7;
        --gray-scaffold: #475569;
      }
    }
    text { font-family: 'Inter', sans-serif; fill: var(--text); }
    .header { font-size: 14px; font-weight: 500; }
    .label { font-size: 12px; font-weight: 400; }
    .node-teal { fill: var(--teal-light); stroke: var(--teal-main); stroke-width: 0.5px; }
    .node-amber { fill: var(--amber-light); stroke: var(--amber-main); stroke-width: 0.5px; }
    .leader { stroke: var(--gray-scaffold); stroke-width: 0.5px; stroke-dasharray: 4,4; fill: none; }
    .bar-bg { fill: var(--gray-scaffold); fill-opacity: 0.1; }
  </style>

  <rect width="800" height="500" fill="var(--bg)" />

  <!-- Center: Weight/Magnitude encoding Form (Metrics) -->
  <g transform="translate(470, 250)">
    <!-- Hallucination Honesty Bar -->
    <text x="-180" y="-60" class="label">Честност на модела</text>
    <rect x="-180" y="-50" width="300" height="20" class="bar-bg" rx="2" />
    <rect x="-180" y="-50" width="280" height="20" class="node-teal" rx="2" />
    <text x="110" y="-35" class="header" style="fill: var(--teal-dark);">93%</text>

    <!-- Calibration Error Bar -->
    <text x="-180" y="40" class="label">Грешка в калибрацията</text>
    <rect x="-180" y="50" width="300" height="20" class="bar-bg" rx="2" />
    <rect x="-180" y="50" width="40" height="20" class="node-amber" rx="2" />
    <text x="-130" y="65" class="header" style="fill: var(--amber-dark);">~4%</text>
  </g>

  <!-- Left Margin Labeled Leader Lines -->
  <line x1="330" y1="200" x2="140" y2="200" class="leader" />
  <text x="10" y="205" class="label">Висока увереност</text>
  
  <line x1="330" y1="300" x2="140" y2="300" class="leader" />
  <text x="10" y="305" class="label">Ниска неопределеност</text>

</svg>
