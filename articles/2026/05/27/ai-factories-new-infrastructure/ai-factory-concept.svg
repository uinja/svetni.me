<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <rect width="800" height="500" rx="16" fill="var(--color-surface)" stroke="var(--color-secondary)" stroke-width="2" />
  
  <!-- Header Title -->
  <text x="400" y="44" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="middle">Икономика на ИИ Фабриката: От енергия към токени</text>
  
  <!-- Left Box (Input: Energy) -->
  <rect x="64" y="120" width="176" height="256" rx="12" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="2" />
  <path d="M 64,160 L 64,132 A 12,12 0 0,1 76,120 L 228,120 A 12,12 0 0,1 240,132 L 240,160 Z" fill="var(--color-primary)" />
  <text x="152" y="140" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="middle">Вход: Енергия</text>
  
  <text x="152" y="192" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="middle">Електричество</text>
  <text x="152" y="216" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="middle">(Мегавати мощност)</text>
  
  <rect x="80" y="248" width="144" height="2" fill="var(--color-secondary)" opacity="0.2" />
  
  <text x="152" y="288" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="middle">Захранване</text>
  <text x="152" y="312" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="middle">(Постоянен поток)</text>
  
  <!-- Center Box (Process: AI Factory) -->
  <rect x="312" y="120" width="176" height="256" rx="12" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="2" />
  <path d="M 312,160 L 312,132 A 12,12 0 0,1 324,120 L 476,120 A 12,12 0 0,1 488,132 L 488,160 Z" fill="var(--color-primary)" />
  <text x="400" y="140" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="middle">ИИ Фабрика</text>
  
  <text x="400" y="184" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="middle">Ко-дизайн на стека</text>
  <text x="400" y="208" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="middle">Blackwell / Vera Rubin</text>
  <text x="400" y="228" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="middle">Течно охлаждане &amp; NVLink</text>
  
  <rect x="328" y="252" width="144" height="2" fill="var(--color-secondary)" opacity="0.2" />
  
  <text x="400" y="288" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="middle">Оркестрация в реално време</text>
  <text x="400" y="312" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="middle">Dynamo &amp; Omniverse DSX</text>
  <text x="400" y="332" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="middle">Дигитални двойници</text>
  
  <!-- Right Box (Output: Tokens) -->
  <rect x="560" y="120" width="176" height="256" rx="12" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="2" />
  <path d="M 560,160 L 560,132 A 12,12 0 0,1 572,120 L 724,120 A 12,12 0 0,1 736,132 L 736,160 Z" fill="var(--color-primary)" />
  <text x="648" y="140" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="middle">Изход: Токени</text>
  
  <text x="648" y="192" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="middle">Токени за секунда</text>
  <text x="648" y="216" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="middle">(Основна единица интелект)</text>
  
  <rect x="576" y="248" width="144" height="2" fill="var(--color-secondary)" opacity="0.2" />
  
  <text x="648" y="288" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="middle">Автономни агенти</text>
  <text x="648" y="312" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="middle">(Синтетични данни &amp; ИИ)</text>
  
  <!-- Left-to-Center Arrow -->
  <line x1="248" y1="248" x2="304" y2="248" stroke="var(--color-primary)" stroke-width="3" />
  <polygon points="296,243 296,253 304,248" fill="var(--color-primary)" />
  <text x="276" y="228" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="middle">Мощност</text>
  
  <!-- Center-to-Right Arrow -->
  <line x1="496" y1="248" x2="552" y2="248" stroke="var(--color-primary)" stroke-width="3" />
  <polygon points="544,243 544,253 552,248" fill="var(--color-primary)" />
  <text x="524" y="228" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="middle">Токени</text>
  
  <!-- Bottom Box (Economics Summary) -->
  <rect x="64" y="392" width="672" height="64" rx="8" fill="var(--color-background)" stroke="var(--color-secondary)" stroke-width="2" />
  <text x="400" y="412" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="middle">Икономическа ефективност: Токени на ват и цена за токен</text>
  <text x="400" y="436" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="middle">NVIDIA Blackwell Ultra осигурява 35х по-ниска цена на токен спрямо Hopper архитектурата.</text>
</svg>
