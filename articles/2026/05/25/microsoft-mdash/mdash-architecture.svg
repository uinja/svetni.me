<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="var(--color-primary)" />
    </marker>
  </defs>

  <g font-family="system-ui, sans-serif">
    <!-- Main Background -->
    <rect width="800" height="500" fill="var(--color-background)" rx="16" />

    <!-- INPUT BLOCK -->
    <rect x="40" y="180" width="140" height="140" rx="12" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2.5" />
    <text x="110" y="235" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="bold" fill="var(--color-on-surface)">Изходен код</text>
    <text x="110" y="255" text-anchor="middle" dominant-baseline="central" font-size="12" fill="var(--color-on-surface)">Windows / Azure</text>
    <text x="110" y="275" text-anchor="middle" dominant-baseline="central" font-size="11" fill="var(--color-on-surface)">Hyper-V &amp; Driver Code</text>

    <!-- MDASH ORCHESTRATION BOX -->
    <rect x="220" y="50" width="360" height="380" rx="16" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="1.5" />
    <text x="400" y="80" text-anchor="middle" dominant-baseline="central" font-size="17" font-weight="bold" fill="var(--color-primary)">MDASH Оркестрация (100+ Агента)</text>

    <!-- Stage 1 -->
    <rect x="250" y="110" width="300" height="70" rx="8" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="2" />
    <text x="400" y="135" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="var(--color-on-surface)">1. Сканиращи агенти</text>
    <text x="400" y="155" text-anchor="middle" dominant-baseline="central" font-size="12" fill="var(--color-on-surface)">Статичен анализ и откриване на аномалии</text>

    <!-- Stage 2 -->
    <rect x="250" y="210" width="300" height="70" rx="8" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="2" />
    <text x="400" y="235" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="var(--color-on-surface)">2. Дебати и валидация</text>
    <text x="400" y="255" text-anchor="middle" dominant-baseline="central" font-size="12" fill="var(--color-on-surface)">Консултиране между агенти и филтриране</text>

    <!-- Stage 3 -->
    <rect x="250" y="310" width="300" height="70" rx="8" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="2" />
    <text x="400" y="335" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="bold" fill="var(--color-on-surface)">3. Доказване на експлоатация</text>
    <text x="400" y="355" text-anchor="middle" dominant-baseline="central" font-size="12" fill="var(--color-on-surface)">Генериране на Proof-of-Concept код (PoC)</text>

    <!-- OUTPUT BLOCK -->
    <rect x="620" y="180" width="140" height="140" rx="12" fill="var(--color-primary)" stroke="var(--color-primary)" stroke-width="2" />
    <text x="690" y="235" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="bold" fill="var(--color-on-primary)">Валидирани</text>
    <text x="690" y="255" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="bold" fill="var(--color-on-primary)">уязвимости</text>
    <text x="690" y="275" text-anchor="middle" dominant-baseline="central" font-size="11" fill="var(--color-on-primary)">с доказан PoC</text>

    <!-- CONNECTING LINES & ARROWS -->
    <!-- Input to Orchestration -->
    <path d="M 180 250 L 214 250" fill="none" stroke="var(--color-primary)" stroke-width="3" marker-end="url(#arrow)" />
    
    <!-- Stage 1 to Stage 2 -->
    <path d="M 400 180 L 400 204" fill="none" stroke="var(--color-primary)" stroke-width="2.5" marker-end="url(#arrow)" />

    <!-- Stage 2 to Stage 3 -->
    <path d="M 400 280 L 400 304" fill="none" stroke="var(--color-primary)" stroke-width="2.5" marker-end="url(#arrow)" />

    <!-- Orchestration to Output -->
    <path d="M 580 250 L 614 250" fill="none" stroke="var(--color-primary)" stroke-width="3" marker-end="url(#arrow)" />
  </g>
</svg>
