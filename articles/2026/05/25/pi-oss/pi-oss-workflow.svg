<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <rect width="800" height="500" fill="var(--color-surface)" rx="16" />
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="var(--color-primary)" />
    </marker>
  </defs>

  <g font-family="system-ui, sans-serif">
    <!-- Title -->
    <text x="400" y="44" font-size="20" font-weight="bold" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="central">Процес за Качествен Контрол в Проекта Pi</text>
    
    <!-- Box 1: GitHub Issue -->
    <rect x="40" y="160" width="200" height="120" rx="8" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="2" />
    <text x="140" y="190" font-size="16" font-weight="bold" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="central">GitHub Issue</text>
    <text x="140" y="220" font-size="12" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Нереалистичен AI Slop</text>
    <text x="140" y="245" font-size="10" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">(Confident but wrong)</text>

    <!-- Box 2: Analyze Command /is -->
    <rect x="292" y="80" width="224" height="120" rx="8" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="2" />
    <text x="404" y="110" font-size="16" font-weight="bold" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="central">Команда /is</text>
    <text x="404" y="140" font-size="12" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Независим анализ</text>
    <text x="404" y="165" font-size="10" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Проверка на кода и пътя</text>
    <text x="404" y="180" font-size="10" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Игнориране на спекулации</text>

    <!-- Box 3: Global Invariants -->
    <rect x="292" y="280" width="224" height="120" rx="8" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="2" />
    <text x="404" y="310" font-size="16" font-weight="bold" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="central">Глобален Фикс</text>
    <text x="404" y="340" font-size="12" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Запазване на инварианти</text>
    <text x="404" y="365" font-size="10" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Предотвратяване на лош статус</text>
    <text x="404" y="380" font-size="10" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Без локално маскиране</text>

    <!-- Box 4: Wrap-up & Push /wr -->
    <rect x="568" y="160" width="200" height="120" rx="8" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="2" />
    <text x="668" y="190" font-size="16" font-weight="bold" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="central">Команда /wr</text>
    <text x="668" y="220" font-size="12" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Wrap-up &amp; Commit</text>
    <text x="668" y="245" font-size="10" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Обновяване на changelog</text>
    <text x="668" y="260" font-size="10" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Push само на променени файлове</text>

    <!-- Connections -->
    <!-- Issue to /is -->
    <path d="M 240 220 L 266 220 L 266 140 L 286 140" fill="none" stroke="var(--color-primary)" stroke-width="2" marker-end="url(#arrow)" />
    
    <!-- /is to Invariant Fix -->
    <path d="M 404 200 L 404 274" fill="none" stroke="var(--color-primary)" stroke-width="2" marker-end="url(#arrow)" />
    
    <!-- Invariant Fix to /wr -->
    <path d="M 516 340 L 542 340 L 542 220 L 562 220" fill="none" stroke="var(--color-primary)" stroke-width="2" marker-end="url(#arrow)" />
    
    <!-- Auto-close Spam Path -->
    <path d="M 140 280 L 140 440 L 668 440 L 668 286" fill="none" stroke="var(--color-primary)" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)" />
    <text x="404" y="424" font-size="11" font-weight="bold" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="central">Автоматично затваряне на спам (80% от външния обем)</text>
  </g>
</svg>
