<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <defs>
    <!-- Arrow marker definition -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="var(--color-primary, #1a30ae)" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="12" fill="var(--color-background, #ffffff)" stroke="var(--color-outline, #f8f9fa)" stroke-width="2" />

  <!-- Diagram Title -->
  <text x="400" y="44" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="var(--color-primary, #1a30ae)">
    MEGALODON: АНАЛИЗ НА d-PPE АТАКАТА
  </text>
  <text x="400" y="76" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="400" fill="var(--color-on-surface, #202124)" opacity="0.8">
    Схема на компрометиране на веригата за доставки чрез GitHub Actions
  </text>

  <!-- STEP 1 -->
  <rect x="70" y="120" width="180" height="90" rx="8" fill="var(--color-surface, #f8f9fa)" stroke="var(--color-outline, #f8f9fa)" stroke-width="2" />
  <text x="160" y="145" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="var(--color-primary, #1a30ae)">
    1. Идентифициране
  </text>
  <text x="160" y="170" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="var(--color-on-surface, #202124)">
    Търсене на хранилища
  </text>
  <text x="160" y="188" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="var(--color-on-surface, #202124)">
    със слаба защита на клона
  </text>

  <!-- STEP 2 -->
  <rect x="310" y="120" width="180" height="90" rx="8" fill="var(--color-surface, #f8f9fa)" stroke="var(--color-outline, #f8f9fa)" stroke-width="2" />
  <text x="400" y="145" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="var(--color-primary, #1a30ae)">
    2. Фалшифициране
  </text>
  <text x="400" y="170" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="var(--color-on-surface, #202124)">
    Директен push на коммит
  </text>
  <text x="400" y="188" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="var(--color-on-surface, #202124)">
    от името на легитимни ботове
  </text>

  <!-- STEP 3 -->
  <rect x="550" y="120" width="180" height="90" rx="8" fill="var(--color-surface, #f8f9fa)" stroke="var(--color-outline, #f8f9fa)" stroke-width="2" />
  <text x="640" y="145" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="var(--color-primary, #1a30ae)">
    3. Активиране
  </text>
  <text x="640" y="170" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="var(--color-on-surface, #202124)">
    Инжектираният CI/CD
  </text>
  <text x="640" y="188" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="var(--color-on-surface, #202124)">
    workflow се стартира
  </text>

  <!-- STEP 4 -->
  <rect x="550" y="310" width="180" height="90" rx="8" fill="var(--color-surface, #f8f9fa)" stroke="var(--color-outline, #f8f9fa)" stroke-width="2" />
  <text x="640" y="335" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="var(--color-primary, #1a30ae)">
    4. Изпълнение
  </text>
  <text x="640" y="360" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="var(--color-on-surface, #202124)">
    Декодиране на Base64
  </text>
  <text x="640" y="378" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="var(--color-on-surface, #202124)">
    bash зловреден код в CI
  </text>

  <!-- STEP 5 -->
  <rect x="310" y="310" width="180" height="90" rx="8" fill="var(--color-surface, #f8f9fa)" stroke="var(--color-outline, #f8f9fa)" stroke-width="2" />
  <text x="400" y="335" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="var(--color-primary, #1a30ae)">
    5. Събиране
  </text>
  <text x="400" y="360" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="var(--color-on-surface, #202124)">
    Кражба на облачни ключове,
  </text>
  <text x="400" y="378" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="var(--color-on-surface, #202124)">
    SSH ключове и OIDC токени
  </text>

  <!-- STEP 6 -->
  <rect x="70" y="310" width="180" height="90" rx="8" fill="var(--color-surface, #f8f9fa)" stroke="var(--color-outline, #f8f9fa)" stroke-width="2" />
  <text x="160" y="335" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="var(--color-primary, #1a30ae)">
    6. Ексфилтрация
  </text>
  <text x="160" y="360" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="var(--color-on-surface, #202124)">
    Компресиране и изпращане
  </text>
  <text x="160" y="378" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="var(--color-on-surface, #202124)">
    към C2: 216.126.225.129
  </text>

  <!-- Connector Lines & Arrows -->
  <!-- 1 -> 2 -->
  <path d="M 250 165 L 302 165" fill="none" stroke="var(--color-primary, #1a30ae)" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- 2 -> 3 -->
  <path d="M 490 165 L 542 165" fill="none" stroke="var(--color-primary, #1a30ae)" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- 3 -> 4 -->
  <path d="M 640 210 L 640 302" fill="none" stroke="var(--color-primary, #1a30ae)" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- 4 -> 5 -->
  <path d="M 550 355 L 498 355" fill="none" stroke="var(--color-primary, #1a30ae)" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- 5 -> 6 -->
  <path d="M 310 355 L 258 355" fill="none" stroke="var(--color-primary, #1a30ae)" stroke-width="2" marker-end="url(#arrow)" />
</svg>
