<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="500" rx="8" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2" />

  <!-- Node 1: Software Code Base -->
  <rect x="40" y="210" width="180" height="80" rx="6" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="2" />
  
  <!-- Node 2: Claude Mythos Preview -->
  <rect x="290" y="210" width="220" height="80" rx="6" fill="var(--color-primary)" stroke="var(--color-primary)" stroke-width="2" />

  <!-- Node 3: Exploit Chaining -->
  <rect x="580" y="110" width="180" height="80" rx="6" fill="var(--color-background)" stroke="var(--color-tertiary)" stroke-width="2" />

  <!-- Node 4: Proof of Concept generation -->
  <rect x="580" y="310" width="180" height="80" rx="6" fill="var(--color-background)" stroke="var(--color-tertiary)" stroke-width="2" />

  <!-- Node 5: Reports / CVEs -->
  <rect x="290" y="390" width="220" height="60" rx="6" fill="var(--color-background)" stroke="var(--color-secondary)" stroke-width="2" />

  <!-- Connectors (Paths & Lines) -->
  <!-- Box 1 to Box 2 -->
  <path d="M 220 250 L 280 250" stroke="var(--color-primary)" stroke-width="2" fill="none" />
  <path d="M 272 245 L 280 250 L 272 255 Z" fill="var(--color-primary)" />

  <!-- Box 2 to Box 3 -->
  <path d="M 400 210 L 400 150 L 570 150" stroke="var(--color-primary)" stroke-width="2" fill="none" />
  <path d="M 562 145 L 570 150 L 562 155 Z" fill="var(--color-primary)" />

  <!-- Box 3 to Box 4 -->
  <path d="M 670 190 L 670 300" stroke="var(--color-tertiary)" stroke-width="2" fill="none" />
  <path d="M 665 292 L 670 300 L 675 292 Z" fill="var(--color-tertiary)" />

  <!-- Box 4 back to Box 2 -->
  <path d="M 580 350 L 480 350 L 480 298" stroke="var(--color-tertiary)" stroke-width="2" stroke-dasharray="4,4" fill="none" />
  <path d="M 475 306 L 480 298 L 485 306 Z" fill="var(--color-tertiary)" />

  <!-- Box 2 to Box 5 -->
  <path d="M 350 290 L 350 380" stroke="var(--color-secondary)" stroke-width="2" fill="none" />
  <path d="M 345 372 L 350 380 L 355 372 Z" fill="var(--color-secondary)" />

  <!-- Labels for Flow -->
  <text x="250" y="240" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" text-anchor="middle" font-weight="500">Код</text>
  <text x="485" y="135" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" text-anchor="middle" font-weight="500">Уязвимости</text>
  <text x="710" y="255" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" text-anchor="middle" font-weight="500">Верига</text>
  <text x="530" y="340" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" text-anchor="middle" font-weight="500">Тест &amp; Поправка</text>
  <text x="310" y="345" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" text-anchor="middle" font-weight="500">Доклад</text>

  <!-- Labels inside nodes (on top of shapes) -->
  <!-- Box 1 Text -->
  <text x="130" y="245" font-family="system-ui, sans-serif" font-size="15" font-weight="500" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Софтуерен код</text>
  <text x="130" y="265" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" opacity="0.7" text-anchor="middle" dominant-baseline="central">(C/C++, Open-source)</text>

  <!-- Box 2 Text -->
  <text x="400" y="245" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="central">Claude Mythos Preview</text>
  <text x="400" y="265" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-primary)" opacity="0.8" text-anchor="middle" dominant-baseline="central">(AI сканиране и анализ)</text>

  <!-- Box 3 Text -->
  <text x="670" y="145" font-family="system-ui, sans-serif" font-size="15" font-weight="500" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Сглобяване на вериги</text>
  <text x="670" y="165" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" opacity="0.7" text-anchor="middle" dominant-baseline="central">(Exploit Chaining)</text>

  <!-- Box 4 Text -->
  <text x="670" y="345" font-family="system-ui, sans-serif" font-size="15" font-weight="500" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Генериране на PoC</text>
  <text x="670" y="365" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" opacity="0.7" text-anchor="middle" dominant-baseline="central">(Доказателство на живо)</text>

  <!-- Box 5 Text -->
  <text x="400" y="415" font-family="system-ui, sans-serif" font-size="15" font-weight="500" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Потвърдени CVEs</text>
  <text x="400" y="432" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-on-surface)" opacity="0.7" text-anchor="middle" dominant-baseline="central">(Координирано разкриване)</text>
</svg>
