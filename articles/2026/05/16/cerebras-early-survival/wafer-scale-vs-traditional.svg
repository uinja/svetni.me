<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />
  
  <!-- Left Side: Traditional Multi-Chip Approach -->
  <text x="180" y="50" font-family="system-ui, sans-serif" font-size="20" font-weight="500" fill="var(--color-on-surface)" text-anchor="middle">Традиционен подход (Мулти-чип)</text>
  
  <!-- Grid of small chips -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="60" height="60" rx="4" fill="var(--color-secondary)" />
    <rect x="80" y="0" width="60" height="60" rx="4" fill="var(--color-secondary)" />
    <rect x="160" y="0" width="60" height="60" rx="4" fill="var(--color-secondary)" />
    <rect x="0" y="80" width="60" height="60" rx="4" fill="var(--color-secondary)" />
    <rect x="80" y="80" width="60" height="60" rx="4" fill="var(--color-secondary)" />
    <rect x="160" y="80" width="60" height="60" rx="4" fill="var(--color-secondary)" />
    <rect x="0" y="160" width="60" height="60" rx="4" fill="var(--color-secondary)" />
    <rect x="80" y="160" width="60" height="60" rx="4" fill="var(--color-secondary)" />
    <rect x="160" y="160" width="60" height="60" rx="4" fill="var(--color-secondary)" />
    
    <!-- Communication bottlenecks (lines between chips) -->
    <path d="M 60 30 L 80 30" stroke="var(--color-tertiary)" stroke-width="2" />
    <path d="M 140 30 L 160 30" stroke="var(--color-tertiary)" stroke-width="2" />
    <path d="M 30 60 L 30 80" stroke="var(--color-tertiary)" stroke-width="2" />
    <path d="M 110 60 L 110 80" stroke="var(--color-tertiary)" stroke-width="2" />
    <text x="110" y="270" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-tertiary)" text-anchor="middle">Забавяне при комуникация</text>
  </g>

  <!-- Divider Line -->
  <line x1="400" y1="80" x2="400" y2="420" stroke="var(--color-on-surface)" stroke-width="1" stroke-dasharray="4 4" />

  <!-- Right Side: Cerebras Wafer-Scale Engine -->
  <text x="620" y="50" font-family="system-ui, sans-serif" font-size="20" font-weight="500" fill="var(--color-on-surface)" text-anchor="middle">Cerebras Wafer-Scale Engine</text>
  
  <!-- One giant chip -->
  <g transform="translate(480, 100)">
    <rect x="0" y="0" width="280" height="280" rx="8" fill="var(--color-primary)" opacity="0.9" />
    <!-- Internal cores pattern -->
    <path d="M 0 40 L 280 40 M 0 80 L 280 80 M 0 120 L 280 120 M 0 160 L 280 160 M 0 200 L 280 200 M 0 240 L 280 240" stroke="var(--color-background)" stroke-width="0.5" opacity="0.3" />
    <path d="M 40 0 L 40 280 M 80 0 L 80 280 M 120 0 L 120 280 M 160 0 L 160 280 M 200 0 L 200 280 M 240 0 L 240 280" stroke="var(--color-background)" stroke-width="0.5" opacity="0.3" />
    
    <text x="140" y="145" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="var(--color-background)" text-anchor="middle">Единствен гигантски чип</text>
    <text x="140" y="170" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-background)" text-anchor="middle">(Цяла силициева пластина)</text>
    
    <text x="140" y="310" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-primary)" text-anchor="middle">Минимално забавяне, висока плътност</text>
  </g>

  <!-- Packaging Challenge annotation -->
  <rect x="100" y="440" width="600" height="40" rx="20" fill="var(--color-tertiary)" opacity="0.2" />
  <text x="400" y="465" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="middle">Основно предизвикателство: Опаковане (Packaging) - охлаждане и захранване</text>
</svg>
