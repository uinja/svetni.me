<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />
  
  <!-- Entities -->
  <!-- Attacker -->
  <rect x="50" y="200" width="150" height="100" rx="8" fill="var(--color-secondary)" opacity="0.8" />
  <text x="125" y="255" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="var(--color-on-surface)" text-anchor="middle">Нападател</text>
  
  <!-- AI Agent (The Deputy) -->
  <rect x="325" y="200" width="150" height="100" rx="8" fill="var(--color-primary)" />
  <text x="400" y="245" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="var(--color-on-surface)" text-anchor="middle">AI Агент</text>
  <text x="400" y="275" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-surface)" text-anchor="middle">(Заместник)</text>
  
  <!-- Sensitive Resource -->
  <rect x="600" y="200" width="150" height="100" rx="8" fill="var(--color-tertiary)" opacity="0.8" />
  <text x="675" y="245" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="var(--color-on-surface)" text-anchor="middle">Ресурс</text>
  <text x="675" y="275" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" text-anchor="middle">(SCADA / OAuth)</text>

  <!-- Flow Arrows -->
  <!-- Attack Request -->
  <path d="M 200 250 L 315 250" fill="none" stroke="var(--color-secondary)" stroke-width="3" />
  <path d="M 305 245 L 320 250 L 305 255" fill="none" stroke="var(--color-secondary)" stroke-width="3" />
  <text x="257" y="235" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-secondary)" text-anchor="middle">Злонамерен промпт</text>
  <text x="257" y="220" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-secondary)" text-anchor="middle">или конфигурация</text>

  <!-- Unauthorized Action -->
  <path d="M 475 250 L 590 250" fill="none" stroke="var(--color-primary)" stroke-width="3" />
  <path d="M 580 245 L 595 250 L 580 255" fill="none" stroke="var(--color-primary)" stroke-width="3" />
  <text x="537" y="235" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-primary)" text-anchor="middle">Действие с правата</text>
  <text x="537" y="220" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-primary)" text-anchor="middle">на потребителя</text>

  <!-- Trust Boundaries -->
  <line x1="300" y1="100" x2="300" y2="400" stroke="var(--color-on-surface)" stroke-width="2" stroke-dasharray="8" opacity="0.3" />
  <text x="290" y="120" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" text-anchor="end" opacity="0.6">Външна среда</text>
  
  <line x1="525" y1="100" x2="525" y2="400" stroke="var(--color-on-surface)" stroke-width="2" stroke-dasharray="8" opacity="0.3" />
  <text x="535" y="120" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" text-anchor="start" opacity="0.6">Доверена зона</text>

  <!-- Title and Description -->
  <text x="400" y="50" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="var(--color-on-surface)" text-anchor="middle">Атака „Объркан заместник“ (Confused Deputy)</text>
  <text x="400" y="450" font-family="system-ui, sans-serif" font-size="16" fill="var(--color-on-surface)" text-anchor="middle" font-style="italic">Агентът изпълнява злонамерени команди, използвайки легитимни права.</text>
</svg>
