ss="legend" transform="translate(216,-22)"><rect width="18" height="18" style="fill: rgb(77, 16, 55); stroke: rgb(77, 16, 55);"/><text x="22" y="14">САЩ</text></g><g class="legend" transform="translate(216,0)"><rect width="18" height="18" style="fill: rgb(63, 82, 88); stroke: rgb(63, 82, 88);"/><text x="22" y="14">Хонконг</text></g><g class="legend" transform="translate(216,22)"><rect width="18" height="18" style="fill: rgb(79, 47, 27); stroke: rgb(79, 47, 27);"/><text x="22" y="14">Други</text></g></g></svg>
