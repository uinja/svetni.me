<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--color-secondary)" />
    </marker>
  </defs>
  
  <!-- Background Card -->
  <rect x="0" y="0" width="800" height="500" fill="var(--color-background)" rx="16" />

  <!-- Title -->
  <text x="400" y="48" text-anchor="middle" font-size="24" font-weight="500" font-family="system-ui, sans-serif" fill="var(--color-primary)">
    Трансформацията на Stack Overflow под влияние на AI
  </text>

  <!-- Left Card: Traditional Model -->
  <rect x="80" y="112" width="280" height="264" rx="12" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2" />
  
  <text x="220" y="148" text-anchor="middle" font-size="16" font-weight="500" font-family="system-ui, sans-serif" fill="var(--color-primary)">
    Традиционен форум (2008 - 2022)
  </text>
  
  <text x="100" y="200" text-anchor="start" font-size="14" font-family="system-ui, sans-serif" fill="var(--color-on-surface)">
    • Потребителски въпроси и отговори
  </text>
  <text x="100" y="232" text-anchor="start" font-size="14" font-family="system-ui, sans-serif" fill="var(--color-on-surface)">
    • Финансиране предимно от реклама
  </text>
  <text x="100" y="264" text-anchor="start" font-size="14" font-family="system-ui, sans-serif" fill="var(--color-on-surface)">
    • Отворен и безплатен публичен достъп
  </text>
  <text x="100" y="296" text-anchor="start" font-size="14" font-family="system-ui, sans-serif" fill="var(--color-on-surface)">
    • Пиков трафик по време на пандемията
  </text>

  <!-- Transition Arrow -->
  <path d="M 372 244 L 424 244" stroke="var(--color-secondary)" stroke-width="4" fill="none" marker-end="url(#arrow)" />
  <text x="400" y="220" text-anchor="middle" font-size="12" font-weight="500" font-family="system-ui, sans-serif" fill="var(--color-secondary)">
    Навлизане на AI
  </text>

  <!-- Right Card: AI Era -->
  <rect x="440" y="112" width="280" height="264" rx="12" fill="var(--color-surface)" stroke="var(--color-tertiary)" stroke-width="2" />
  
  <text x="580" y="148" text-anchor="middle" font-size="16" font-weight="500" font-family="system-ui, sans-serif" fill="var(--color-tertiary)">
    Модел на изкуствения интелект (2023+)
  </text>
  
  <text x="460" y="200" text-anchor="start" font-size="14" font-family="system-ui, sans-serif" fill="var(--color-on-surface)">
    • Монетизация чрез лицензи за LLM
  </text>
  <text x="460" y="232" text-anchor="start" font-size="14" font-family="system-ui, sans-serif" fill="var(--color-on-surface)">
    • Спад при лесните въпроси във форума
  </text>
  <text x="460" y="264" text-anchor="start" font-size="14" font-family="system-ui, sans-serif" fill="var(--color-on-surface)">
    • Успех на Stack Internal за фирми
  </text>
  <text x="460" y="296" text-anchor="start" font-size="14" font-family="system-ui, sans-serif" fill="var(--color-on-surface)">
    • Намалени загуби чрез съкращения
  </text>

  <!-- Footer/Summary -->
  <text x="400" y="420" text-anchor="middle" font-size="14" font-style="italic" font-family="system-ui, sans-serif" fill="var(--color-on-surface)">
    Приходите на Stack Overflow достигат 115 млн. долара чрез монетизиране на архива
  </text>
  <text x="400" y="440" text-anchor="middle" font-size="14" font-style="italic" font-family="system-ui, sans-serif" fill="var(--color-on-surface)">
    от данни, докато трафикът към публичния форум се връща на нивата от 2008 г.
  </text>
</svg>
