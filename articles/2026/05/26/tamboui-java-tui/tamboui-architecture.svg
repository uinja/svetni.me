<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <rect width="800" height="500" rx="16" fill="var(--color-surface)" stroke="var(--color-secondary)" stroke-width="2" />
  
  <!-- Header Title -->
  <text x="400" y="44" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="middle">Архитектурни нива на TamboUI</text>
  
  <!-- Layer 3: High-Level Components -->
  <rect x="150" y="80" width="500" height="72" rx="8" fill="var(--color-primary)" />
  <text x="400" y="104" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="middle">Високо ниво: Компоненти (Buttons, Inputs, Panels)</text>
  <text x="400" y="128" font-family="system-ui, sans-serif" font-size="14" font-weight="400" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="middle">Потребителски интерфейс и управление на събития, вдъхновени от Swing &amp; JavaFX</text>
  
  <!-- Arrow 1 -->
  <line x1="400" y1="152" x2="400" y2="172" stroke="var(--color-primary)" stroke-width="3" />
  <polygon points="395,170 405,170 400,178" fill="var(--color-primary)" />
  
  <!-- Layer 2: Mid-Level Style & Layout -->
  <rect x="150" y="180" width="500" height="72" rx="8" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="2" />
  <text x="400" y="204" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="middle">Средно ниво: Стилизиране и разположение (CSS &amp; Grid)</text>
  <text x="400" y="228" font-family="system-ui, sans-serif" font-size="14" font-weight="400" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="middle">Определяне на стилове с CSS, поддръжка на разположения и обработка на събития</text>
  
  <!-- Arrow 2 -->
  <line x1="400" y1="252" x2="400" y2="272" stroke="var(--color-primary)" stroke-width="3" />
  <polygon points="395,270 405,270 400,278" fill="var(--color-primary)" />
  
  <!-- Layer 1: Low-Level Terminal Drawing -->
  <rect x="150" y="280" width="500" height="72" rx="8" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="2" />
  <text x="400" y="304" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="middle">Ниско ниво: Чертане в терминала (Ratatui вдъхновение)</text>
  <text x="400" y="328" font-family="system-ui, sans-serif" font-size="14" font-weight="400" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="middle">Директно изчертаване на символи, управление на конзолния буфер и курсора</text>
  
  <!-- Arrow 3 -->
  <line x1="400" y1="352" x2="400" y2="372" stroke="var(--color-primary)" stroke-width="3" />
  <polygon points="395,372 405,372 400,380" fill="var(--color-primary)" />
  
  <!-- Layer 0: Execution / Compilation -->
  <rect x="150" y="380" width="500" height="72" rx="8" fill="var(--color-primary)" />
  <text x="400" y="404" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="middle">GraalVM Native Image компилация (~10MB)</text>
  <text x="400" y="428" font-family="system-ui, sans-serif" font-size="14" font-weight="400" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="middle">Незабавно стартиране и минимален паметов отпечатък в конзолата</text>
</svg>
