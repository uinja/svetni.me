<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="#1e293b" />
  
  <!-- Diary Book -->
  <rect x="250" y="100" width="300" height="350" rx="10" fill="#334155" stroke="#475569" stroke-width="4" />
  <rect x="270" y="120" width="260" height="310" fill="#f8fafc" rx="5" />
  
  <!-- Lines in Diary -->
  <line x1="290" y1="160" x2="510" y2="160" stroke="#cbd5e1" stroke-width="2" />
  <line x1="290" y1="200" x2="510" y2="200" stroke="#cbd5e1" stroke-width="2" />
  <line x1="290" y1="240" x2="510" y2="240" stroke="#cbd5e1" stroke-width="2" />
  <line x1="290" y1="280" x2="450" y2="280" stroke="#cbd5e1" stroke-width="2" />
  
  <!-- OpenAI Logo (Simplified) -->
  <circle cx="400" cy="350" r="30" fill="#74aa9c" />
  <text x="400" y="358" font-family="system-ui, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#ffffff">AI</text>
  
  <!-- Gavel -->
  <rect x="550" y="150" width="100" height="40" rx="5" fill="#92400e" transform="rotate(-30 600 170)" />
  <rect x="590" y="170" width="20" height="150" rx="5" fill="#92400e" transform="rotate(-30 600 170)" />
  
  <!-- Labels -->
  <text x="400" y="70" font-family="system-ui, sans-serif" font-size="32" font-weight="700" text-anchor="middle" fill="#f8fafc">СЪДЕБНИ ДНЕВНИЦИ</text>
  <text x="400" y="480" font-family="system-ui, sans-serif" font-size="16" font-weight="400" text-anchor="middle" fill="#94a3b8">Greg Brockman vs. Elon Musk Legal Battle</text>
</svg>
