<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <rect width="800" height="400" fill="#1e293b"/>
  <!-- SAP Circle -->
  <circle cx="250" cy="200" r="80" fill="#008fd3" fill-opacity="0.8"/>
  <text x="250" y="205" font-family="Arial" font-size="24" fill="white" text-anchor="middle" font-weight="bold">SAP</text>
  
  <!-- Prior Labs / European AI Circle -->
  <circle cx="550" cy="200" r="80" fill="#f2b000" fill-opacity="0.8"/>
  <text x="550" y="205" font-family="Arial" font-size="20" fill="#1e293b" text-anchor="middle" font-weight="bold">Prior Labs</text>
  
  <!-- Connection -->
  <path d="M 330 200 L 470 200" stroke="white" stroke-width="4" stroke-dasharray="8,4"/>
  <text x="400" y="180" font-family="Arial" font-size="16" fill="white" text-anchor="middle">$1.16B</text>
  
  <!-- Data Tables representation -->
  <rect x="520" y="240" width="60" height="40" fill="none" stroke="white" stroke-width="2"/>
  <line x1="520" y1="253" x2="580" y2="253" stroke="white" stroke-width="1"/>
  <line x1="520" y1="266" x2="580" y2="266" stroke="white" stroke-width="1"/>
  
  <text x="400" y="350" font-family="Arial" font-size="18" fill="white" text-anchor="middle">Европейски AI суверенитет и структурирани данни</text>
</svg>
