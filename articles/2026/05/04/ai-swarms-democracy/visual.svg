<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <rect width="800" height="500" fill="#ffffff" />
  
  <!-- Human Troll Farm (Traditional) -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="160" height="200" rx="8" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-width="2" />
    <text x="80" y="-20" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="500" fill="#1e293b">Тролска ферма (Хора)</text>
    
    <!-- Human Icons -->
    <circle cx="40" cy="40" r="10" fill="#ef4444" />
    <rect x="30" y="55" width="20" height="15" rx="4" fill="#ef4444" />
    
    <circle cx="120" cy="40" r="10" fill="#ef4444" />
    <rect x="110" y="55" width="20" height="15" rx="4" fill="#ef4444" />
    
    <circle cx="40" cy="110" r="10" fill="#ef4444" />
    <rect x="30" y="125" width="20" height="15" rx="4" fill="#ef4444" />
    
    <circle cx="120" cy="110" r="10" fill="#ef4444" />
    <rect x="110" y="125" width="20" height="15" rx="4" fill="#ef4444" />
  </g>
  
  <!-- Evolution Arrow -->
  <g transform="translate(300, 200)">
    <path d="M 0 0 L 180 0" stroke="#64748b" stroke-width="4" marker-end="url(#arrowhead)" />
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
      </marker>
    </defs>
    <text x="90" y="-20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Еволюция към автоматизация</text>
  </g>
  
  <!-- AI Swarm (Modern) -->
  <g transform="translate(540, 100)">
    <rect x="0" y="0" width="160" height="200" rx="8" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="2" />
    <text x="80" y="-20" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="500" fill="#1e293b">ИИ Рояк (Автономен)</text>
    
    <!-- AI Agent Icons (Hexagons/Diamonds) -->
    <polygon points="40,30 50,40 40,50 30,40" fill="#3b82f6" />
    <polygon points="120,30 130,40 120,50 110,40" fill="#3b82f6" />
    <polygon points="40,80 50,90 40,100 30,90" fill="#3b82f6" />
    <polygon points="120,80 130,90 120,100 110,90" fill="#3b82f6" />
    <polygon points="80,55 90,65 80,75 70,65" fill="#3b82f6" />
    <polygon points="80,115 90,125 80,135 70,125" fill="#3b82f6" />
    
    <!-- Connection Lines -->
    <line x1="40" y1="40" x2="80" y2="65" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2,2" />
    <line x1="120" y1="40" x2="80" y2="65" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2,2" />
    <line x1="80" y1="65" x2="80" y2="125" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2,2" />
  </g>
  
  <!-- Impact / Social Media Feed -->
  <g transform="translate(200, 350)">
    <rect x="0" y="0" width="400" height="100" rx="4" fill="#1e293b" fill-opacity="0.05" stroke="#1e293b" stroke-width="1" />
    <text x="200" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#1e293b">Синтетичен консенсус в социалните мрежи</text>
    <rect x="20" y="50" width="360" height="10" rx="2" fill="#3b82f6" fill-opacity="0.6" />
    <rect x="20" y="70" width="280" height="10" rx="2" fill="#3b82f6" fill-opacity="0.4" />
    <rect x="20" y="90" width="320" height="10" rx="2" fill="#3b82f6" fill-opacity="0.2" />
  </g>
</svg>
