<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff" />
  
  <!-- Grid lines -->
  <line x1="100" y1="400" x2="700" y2="400" stroke="#e2e8f0" stroke-width="1" />
  <line x1="100" y1="300" x2="700" y2="300" stroke="#f1f5f9" stroke-width="1" />
  <line x1="100" y1="200" x2="700" y2="200" stroke="#f1f5f9" stroke-width="1" />
  <line x1="100" y1="100" x2="700" y2="100" stroke="#f1f5f9" stroke-width="1" />

  <!-- Y-Axis Labels -->
  <text x="90" y="405" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="end">0</text>
  <text x="90" y="305" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="end">$10B</text>
  <text x="90" y="205" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="end">$20B</text>
  <text x="90" y="105" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="end">$30B</text>

  <!-- Bars -->
  <!-- Anthropic Month 1 ($14B) -->
  <rect x="200" y="260" width="80" height="140" fill="#3b82f6" opacity="0.6" />
  <text x="240" y="250" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="#1e293b" text-anchor="middle">$14B</text>
  <text x="240" y="425" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Март 2026</text>

  <!-- Anthropic Month 3 ($30B) -->
  <rect x="500" y="100" width="80" height="300" fill="#3b82f6" />
  <text x="540" y="90" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#1e293b" text-anchor="middle">$30B</text>
  <text x="540" y="425" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Май 2026</text>

  <!-- Arrow -->
  <path d="M 285 260 Q 390 150 495 105" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="5,5" />
  <polygon points="495,105 485,110 490,115" fill="#ef4444" />
  
  <text x="390" y="150" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#ef4444" text-anchor="middle">+114% за 2 месеца</text>

  <!-- Title -->
  <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="#1e293b" text-anchor="middle">Приходите на Anthropic (Годишен темп)</text>
</svg>
