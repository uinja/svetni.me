<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, sans-serif">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />
  
  <!-- Central Core: Gemini AI -->
  <circle cx="400" cy="250" r="80" fill="var(--color-primary)" />
  <text x="400" y="250" text-anchor="middle" dominant-baseline="central" fill="white" font-weight="500">Gemini AI</text>
  <text x="400" y="340" text-anchor="middle" font-size="14" fill="var(--color-on-surface)">Централна AI платформа</text>

  <!-- Hardware Makers Section -->
  <rect x="50" y="100" width="220" height="120" rx="8" fill="none" stroke="var(--color-secondary)" stroke-width="2" />
  <text x="160" y="85" text-anchor="middle" font-weight="500" fill="var(--color-on-surface)">Производители (OEM)</text>
  <text x="160" y="145" text-anchor="middle" font-size="12" fill="var(--color-on-surface)">"Gemini Built-in"</text>
  <text x="160" y="175" text-anchor="middle" font-size="12" fill="var(--color-on-surface)">Умни камери и говорители</text>

  <!-- Service Providers Section -->
  <rect x="530" y="100" width="220" height="120" rx="8" fill="none" stroke="var(--color-tertiary)" stroke-width="2" />
  <text x="640" y="85" text-anchor="middle" font-weight="500" fill="var(--color-on-surface)">Доставчици (Carriers/ISPs)</text>
  <text x="640" y="145" text-anchor="middle" font-size="12" fill="var(--color-on-surface)">Пакетни услуги (AT&amp;T)</text>
  <text x="640" y="175" text-anchor="middle" font-size="12" fill="var(--color-on-surface)">Home Premium абонаменти</text>

  <!-- Consumers Section -->
  <rect x="290" y="380" width="220" height="100" rx="8" fill="none" stroke="var(--color-primary)" stroke-width="2" stroke-dasharray="4" />
  <text x="400" y="425" text-anchor="middle" font-size="14" fill="var(--color-on-surface)">Потребителски функции</text>
  <text x="400" y="450" text-anchor="middle" font-size="12" fill="var(--color-on-surface)">Home Brief | Ask Home</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--color-on-surface)" />
    </marker>
  </defs>
  
  <path d="M 330 220 L 250 180" fill="none" stroke="var(--color-on-surface)" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M 470 220 L 550 180" fill="none" stroke="var(--color-on-surface)" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M 400 330 L 400 370" fill="none" stroke="var(--color-on-surface)" stroke-width="2" marker-end="url(#arrowhead)" />

  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="500" fill="var(--color-on-surface)">Екосистемата на Gemini for Home</text>
</svg>
