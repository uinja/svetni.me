<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />
  
  <!-- Agent Layer -->
  <rect x="300" y="40" width="200" height="80" rx="8" fill="var(--color-primary)" stroke="var(--color-on-surface)" stroke-width="2" />
  <text x="400" y="80" font-family="system-ui, sans-serif" font-size="20" font-weight="500" text-anchor="middle" dominant-baseline="central" fill="var(--color-on-primary)">AI Agent (Bridge)</text>
  
  <!-- Willow Harness Layer -->
  <rect x="250" y="160" width="300" height="100" rx="8" fill="var(--color-secondary)" stroke="var(--color-on-surface)" stroke-width="2" />
  <text x="400" y="210" font-family="system-ui, sans-serif" font-size="20" font-weight="500" text-anchor="middle" dominant-baseline="central" fill="var(--color-on-secondary)">Willow Harness</text>
  <text x="400" y="240" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle" fill="var(--color-on-secondary)">(Virtual FS &amp; State Management)</text>
  
  <!-- Storage Layer -->
  <!-- mvSQLite -->
  <rect x="100" y="320" width="250" height="100" rx="8" fill="var(--color-tertiary)" stroke="var(--color-on-surface)" stroke-width="2" />
  <text x="225" y="370" font-family="system-ui, sans-serif" font-size="18" font-weight="500" text-anchor="middle" dominant-baseline="central" fill="var(--color-on-tertiary)">mvSQLite</text>
  <text x="225" y="400" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="var(--color-on-tertiary)">(Time-Travel &amp; Distributed)</text>
  
  <!-- S3 -->
  <rect x="450" y="320" width="250" height="100" rx="8" fill="var(--color-tertiary)" stroke="var(--color-on-surface)" stroke-width="2" />
  <text x="575" y="370" font-family="system-ui, sans-serif" font-size="18" font-weight="500" text-anchor="middle" dominant-baseline="central" fill="var(--color-on-tertiary)">S3 Storage</text>
  <text x="575" y="400" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="var(--color-on-tertiary)">(Large Blobs)</text>
  
  <!-- FoundationDB (Deep Backend) -->
  <path d="M100 440 Q 400 480 700 440" fill="none" stroke="var(--color-on-surface)" stroke-width="2" stroke-dasharray="8,4" />
  <text x="400" y="475" font-family="system-ui, sans-serif" font-size="16" font-weight="500" text-anchor="middle" fill="var(--color-on-surface)">FoundationDB (Distributed KV)</text>
  
  <!-- Connections -->
  <!-- Agent to Willow -->
  <path d="M400 120 L400 160" stroke="var(--color-on-surface)" stroke-width="3" marker-end="url(#arrowhead)" />
  
  <!-- Willow to mvSQLite -->
  <path d="M350 260 L225 320" stroke="var(--color-on-surface)" stroke-width="3" marker-end="url(#arrowhead)" />
  
  <!-- Willow to S3 -->
  <path d="M450 260 L575 320" stroke="var(--color-on-surface)" stroke-width="3" marker-end="url(#arrowhead)" />
  
  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--color-on-surface)" />
    </marker>
  </defs>
  
  <!-- Labels -->
  <text x="400" y="30" font-family="system-ui, sans-serif" font-size="24" font-weight="500" text-anchor="middle" fill="var(--color-on-surface)">Willow Architecture</text>
</svg>
