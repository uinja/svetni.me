<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <rect width="800" height="500" fill="#f8f9fa" rx="16"/>
  
  <!-- Title -->
  <text x="400" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#202124" text-anchor="middle" dominant-baseline="middle">
    Пълният технологичен стек на Mistral AI
  </text>
  <text x="400" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#5f6368" text-anchor="middle" dominant-baseline="middle">
    Преход от доставчик на модели към цялостен корпоративен ИИ партньор
  </text>

  <!-- Vertical Stack Container -->
  <!-- Layer 1: Consultancy & Integration -->
  <rect x="160" y="108" width="480" height="72" rx="8" fill="#1e33af" />
  <text x="400" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">
    Консултации &amp; Корпоративна интеграция
  </text>
  <text x="400" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#e8eaed" text-anchor="middle" dominant-baseline="middle">
    Локално внедряване (On-Premise) • Решения за сигурност и съответствие (KYC)
  </text>

  <!-- Layer 2: Platforms & Agentic Harness -->
  <rect x="160" y="192" width="480" height="72" rx="8" fill="#1b31ae" />
  <text x="400" y="212" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">
    Платформи &amp; Агентни среди (Harness)
  </text>
  <text x="400" y="236" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#e8eaed" text-anchor="middle" dominant-baseline="middle">
    Управление на контекста, устойчивост на агентите и "Vibe for Work"
  </text>

  <!-- Layer 3: Models -->
  <rect x="160" y="276" width="480" height="72" rx="8" fill="#1a30ae" />
  <text x="400" y="296" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">
    Специализирани и отворени модели
  </text>
  <text x="400" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#e8eaed" text-anchor="middle" dominant-baseline="middle">
    Codestral (код), Voxtral (глас), Robostral (роботика), Document AI
  </text>

  <!-- Layer 4: Compute -->
  <rect x="160" y="360" width="480" height="72" rx="8" fill="#202124" />
  <text x="400" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">
    Изчислителна инфраструктура (Compute)
  </text>
  <text x="400" y="404" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#e8eaed" text-anchor="middle" dominant-baseline="middle">
    40MW център за данни в Париж • Бъдещо разширяване в Швеция
  </text>

  <!-- Footer/Sovereignty Badge -->
  <rect x="160" y="448" width="480" height="28" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="400" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#1a30ae" text-anchor="middle" dominant-baseline="middle">
    Ключово предимство: Пълен европейски технологичен суверенитет и контрол над данните
  </text>
</svg>
