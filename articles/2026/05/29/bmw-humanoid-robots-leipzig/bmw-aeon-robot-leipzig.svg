<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <defs>
    <!-- Arrowhead pointing right -->
    <marker id="arrow" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#1a30ae" />
    </marker>
    <!-- Arrowhead pointing up -->
    <marker id="arrow-up" viewBox="0 0 10 10" refX="5" refY="8" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 1 10 L 5 1 L 9 10 z" fill="#1e33af" />
    </marker>
    <!-- Card shadows -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1" flood-color="#202124" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff" />
  
  <!-- Title Headers -->
  <text x="400" y="44" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#202124">Сензорен поток и вземане на решения при робота AEON</text>
  <text x="400" y="72" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#64748b">Архитектура на Физическия ИИ (Physical AI) в заводите на BMW</text>

  <!-- 1. Sensor Input Block -->
  <g filter="url(#shadow)">
    <rect x="80" y="120" width="184" height="260" rx="8" fill="#f8f9fa" stroke="#1a30ae" stroke-width="2" />
  </g>
  <text x="172" y="144" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1a30ae">СЕНЗОРЕН ВХОД</text>
  <text x="172" y="168" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#64748b">22 сензора в реално време</text>
  
  <!-- Sensor Sub-items -->
  <g font-family="system-ui, sans-serif" font-size="11" fill="#202124">
    <!-- Camera/Vision -->
    <rect x="100" y="196" width="144" height="32" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
    <text x="172" y="212" text-anchor="middle" dominant-baseline="middle">3D камери и визия</text>
    
    <!-- LiDAR -->
    <rect x="100" y="240" width="144" height="32" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
    <text x="172" y="256" text-anchor="middle" dominant-baseline="middle">LiDAR сканиране</text>

    <!-- Proximity -->
    <rect x="100" y="284" width="144" height="32" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
    <text x="172" y="300" text-anchor="middle" dominant-baseline="middle">Радарни датчици</text>

    <!-- Force/Tactile -->
    <rect x="100" y="328" width="144" height="32" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
    <text x="172" y="344" text-anchor="middle" dominant-baseline="middle">Сензори за допир/сила</text>
  </g>

  <!-- 2. Physical AI Block -->
  <g filter="url(#shadow)">
    <rect x="308" y="120" width="184" height="260" rx="8" fill="#f8f9fa" stroke="#1b31ae" stroke-width="2" />
  </g>
  <text x="400" y="144" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1b31ae">ФИЗИЧЕСКИ ИИ</text>
  <text x="400" y="168" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#64748b">Интегриран софтуер</text>

  <!-- AI Sub-items -->
  <g font-family="system-ui, sans-serif" font-size="11" fill="#202124">
    <!-- Perception -->
    <rect x="328" y="196" width="144" height="32" rx="4" fill="#1b31ae" fill-opacity="0.08" stroke="#1b31ae" stroke-width="1" />
    <text x="400" y="212" text-anchor="middle" dominant-baseline="middle" font-weight="500" fill="#1b31ae">Разпознаване на обекти</text>
    
    <!-- Motion Planning -->
    <rect x="328" y="240" width="144" height="32" rx="4" fill="#1b31ae" fill-opacity="0.08" stroke="#1b31ae" stroke-width="1" />
    <text x="400" y="256" text-anchor="middle" dominant-baseline="middle" font-weight="500" fill="#1b31ae">Планиране на пътя</text>

    <!-- Real-time Adaptation -->
    <rect x="328" y="284" width="144" height="32" rx="4" fill="#1b31ae" fill-opacity="0.08" stroke="#1b31ae" stroke-width="1" />
    <text x="400" y="300" text-anchor="middle" dominant-baseline="middle" font-weight="500" fill="#1b31ae">Избягване на препятствия</text>

    <!-- Control Systems -->
    <rect x="328" y="328" width="144" height="32" rx="4" fill="#1b31ae" fill-opacity="0.08" stroke="#1b31ae" stroke-width="1" />
    <text x="400" y="344" text-anchor="middle" dominant-baseline="middle" font-weight="500" fill="#1b31ae">Контрол на движението</text>
  </g>

  <!-- 3. Physical Action Block -->
  <g filter="url(#shadow)">
    <rect x="536" y="120" width="184" height="260" rx="8" fill="#f8f9fa" stroke="#1e33af" stroke-width="2" />
  </g>
  <text x="628" y="144" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1e33af">ФИЗИЧЕСКО ДЕЙСТВИЕ</text>
  <text x="628" y="168" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#64748b">Реализация на задачите</text>

  <!-- Action Sub-items -->
  <g font-family="system-ui, sans-serif" font-size="11" fill="#202124">
    <!-- Wheel Drive -->
    <rect x="556" y="196" width="144" height="32" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
    <text x="628" y="212" text-anchor="middle" dominant-baseline="middle">Придвижване с колела</text>
    
    <!-- Quality Control -->
    <rect x="556" y="240" width="144" height="32" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
    <text x="628" y="256" text-anchor="middle" dominant-baseline="middle">Контрол на качеството</text>

    <!-- Battery Assembly -->
    <rect x="556" y="284" width="144" height="32" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
    <text x="628" y="300" text-anchor="middle" dominant-baseline="middle">Сглобяване на батерии</text>

    <!-- Component Manufacturing -->
    <rect x="556" y="328" width="144" height="32" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
    <text x="628" y="344" text-anchor="middle" dominant-baseline="middle">Производство на детайли</text>
  </g>

  <!-- Connectors / Flows -->
  <!-- Sensor -> AI -->
  <path d="M 264 250 L 302 250" fill="none" stroke="#1a30ae" stroke-width="2.5" marker-end="url(#arrow)" />
  <text x="286" y="238" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#1a30ae">ДАННИ</text>

  <!-- AI -> Action -->
  <path d="M 492 250 L 530 250" fill="none" stroke="#1b31ae" stroke-width="2.5" marker-end="url(#arrow)" />
  <text x="511" y="238" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#1b31ae">КОМАНДИ</text>

  <!-- Feedback Loop (Action -> Sensor/Environment) -->
  <path d="M 628 380 L 628 432 L 172 432 L 172 388" fill="none" stroke="#1e33af" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#arrow-up)" />
  <g filter="url(#shadow)">
    <rect x="300" y="416" width="200" height="32" rx="4" fill="#1e33af" />
  </g>
  <text x="400" y="432" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff">ОБРАТНА ВРЪЗКА И МОДИФИКАЦИЯ НА СРЕДАТА</text>
</svg>
