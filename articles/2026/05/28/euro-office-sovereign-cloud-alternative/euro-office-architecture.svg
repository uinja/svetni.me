<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect width="800" height="500" fill="#ffffff" rx="12" stroke="#e4e7eb" stroke-width="2" />

  <!-- Title -->
  <text x="400" y="45" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1a30ae" text-anchor="middle">Архитектура и интеграция на Euro-Office</text>
  <text x="400" y="70" font-family="system-ui, sans-serif" font-size="14" fill="#505259" text-anchor="middle">Суверенна европейска алтернатива на американските облачни платформи</text>

  <!-- Technical Foundation (OnlyOffice AGPL Core) -->
  <rect x="50" y="140" width="220" height="110" rx="8" fill="#f8f9fa" stroke="#1b31ae" stroke-width="2" />
  <text x="160" y="175" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#202124" text-anchor="middle">OnlyOffice Core</text>
  <text x="160" y="195" font-family="system-ui, sans-serif" font-size="13" fill="#1b31ae" text-anchor="middle">Ядро с отворен код (AGPL)</text>
  <text x="160" y="215" font-family="system-ui, sans-serif" font-size="11" fill="#505259" text-anchor="middle">Разработка на Ascensio System</text>

  <!-- Arrow: Fork & UI Customization -->
  <path d="M 270 195 L 320 195" stroke="#1a30ae" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <text x="295" y="185" font-family="system-ui, sans-serif" font-size="11" fill="#1a30ae" text-anchor="middle">Fork / UI</text>

  <!-- Euro-Office 1.0 Editor Component -->
  <rect x="330" y="120" width="240" height="150" rx="8" fill="#1a30ae" />
  <text x="450" y="160" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Euro-Office 1.0</text>
  <text x="450" y="185" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Онлайн редактори в реално време</text>
  <text x="450" y="205" font-family="system-ui, sans-serif" font-size="11" fill="#ffffff" opacity="0.9" text-anchor="middle">(DOCX, XLSX, PPTX, ODF, PDF)</text>
  <text x="450" y="235" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#d0ff4b" text-anchor="middle">Старт: 9 юни 2026 г.</text>

  <!-- Arrow: Native Ecosystem Integration -->
  <path d="M 450 270 L 450 310" stroke="#1a30ae" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <text x="460" y="295" font-family="system-ui, sans-serif" font-size="11" fill="#1a30ae" font-weight="500">Интеграция</text>

  <!-- European Collaboration Platforms -->
  <rect x="330" y="320" width="240" height="130" rx="8" fill="#f8f9fa" stroke="#1b31ae" stroke-width="2" />
  <text x="450" y="350" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#202124" text-anchor="middle">Европейски екосистеми</text>
  <text x="450" y="375" font-family="system-ui, sans-serif" font-size="12" fill="#1b31ae" text-anchor="middle">IONOS (Nextcloud Workspace)</text>
  <text x="450" y="395" font-family="system-ui, sans-serif" font-size="12" fill="#1b31ae" text-anchor="middle">Nextcloud Hub 26 (Spring)</text>
  <text x="450" y="415" font-family="system-ui, sans-serif" font-size="12" fill="#1b31ae" text-anchor="middle">XWiki (Q4) / Office.eu</text>

  <!-- US Dominant Clouds (Replaced/Alternative) -->
  <rect x="590" y="220" width="160" height="120" rx="8" fill="#fff5f5" stroke="#eb0e33" stroke-width="2" stroke-dasharray="4,4" />
  <text x="670" y="250" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#eb0e33" text-anchor="middle">Американски SaaS</text>
  <text x="670" y="275" font-family="system-ui, sans-serif" font-size="12" fill="#505259" text-anchor="middle">Microsoft 365</text>
  <text x="670" y="295" font-family="system-ui, sans-serif" font-size="12" fill="#505259" text-anchor="middle">Google Workspace</text>
  <text x="670" y="320" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#eb0e33" text-anchor="middle">Зависимост &amp; Риск</text>

  <!-- Arrow pointing to US Clouds showing "Replacement" -->
  <path d="M 570 195 L 670 195 L 670 210" stroke="#eb0e33" stroke-width="1.5" stroke-dasharray="2,2" fill="none" marker-end="url(#arrow-red)" />
  <text x="620" y="185" font-family="system-ui, sans-serif" font-size="10" fill="#eb0e33" text-anchor="middle">Заменя</text>

  <!-- Definitions for Markers -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#1a30ae" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#eb0e33" />
    </marker>
  </defs>
</svg>
