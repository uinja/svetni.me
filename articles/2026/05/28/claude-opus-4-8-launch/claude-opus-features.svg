<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <defs>
    <!-- Arrowhead marker definition -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="var(--color-secondary, #625B71)" />
    </marker>
  </defs>

  <style>
    .bg {
      fill: var(--color-background, #FEF7FF);
      stroke: var(--color-outline-variant, #CAC4D0);
      stroke-width: 2;
    }
    .box-center {
      fill: var(--color-primary, #6750A4);
      stroke: var(--color-outline, #79747E);
      stroke-width: 2;
    }
    .box-feature {
      fill: var(--color-surface-container-low, #F7F2FA);
      stroke: var(--color-primary, #6750A4);
      stroke-width: 2;
    }
    .text-base {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .text-center-title {
      font-size: 20px;
      font-weight: 700;
      fill: var(--color-on-primary, #FFFFFF);
    }
    .text-center-subtitle {
      font-size: 14px;
      font-weight: 500;
      fill: var(--color-on-primary, #FFFFFF);
    }
    .text-feature-title {
      font-size: 16px;
      font-weight: 700;
      fill: var(--color-on-surface, #1D1B20);
    }
    .text-feature-desc {
      font-size: 13px;
      font-weight: 500;
      fill: var(--color-secondary, #625B71);
    }
    .arrow-line {
      stroke: var(--color-secondary, #625B71);
      stroke-width: 2;
    }
  </style>

  <!-- Background -->
  <rect class="bg" width="800" height="500" rx="16" />

  <!-- Directional Arrows -->
  <line class="arrow-line" x1="320" y1="200" x2="220" y2="156" marker-end="url(#arrow)" />
  <line class="arrow-line" x1="480" y1="200" x2="580" y2="156" marker-end="url(#arrow)" />
  <line class="arrow-line" x1="320" y1="300" x2="220" y2="344" marker-end="url(#arrow)" />
  <line class="arrow-line" x1="480" y1="300" x2="580" y2="344" marker-end="url(#arrow)" />

  <!-- Center Box (Claude Opus 4.8) -->
  <rect class="box-center" x="292" y="200" width="216" height="100" rx="8" />

  <!-- Feature Box 1 (Top Left) -->
  <rect class="box-feature" x="60" y="60" width="240" height="96" rx="8" />

  <!-- Feature Box 2 (Top Right) -->
  <rect class="box-feature" x="500" y="60" width="240" height="96" rx="8" />

  <!-- Feature Box 3 (Bottom Left) -->
  <rect class="box-feature" x="60" y="344" width="240" height="96" rx="8" />

  <!-- Feature Box 4 (Bottom Right) -->
  <rect class="box-feature" x="500" y="344" width="240" height="96" rx="8" />

  <!-- Text Labels -->
  <!-- Center Text -->
  <text class="text-base text-center-title" x="400" y="238">Claude Opus 4.8</text>
  <text class="text-base text-center-subtitle" x="400" y="268">Флагмански модел</text>

  <!-- Top Left Text -->
  <text class="text-base text-feature-title" x="180" y="92">Динамични процеси</text>
  <text class="text-base text-feature-desc" x="180" y="120">Субагенти в Claude Code</text>

  <!-- Top Right Text -->
  <text class="text-base text-feature-title" x="620" y="92">Производителност</text>
  <text class="text-base text-feature-desc" x="620" y="120">3x по-евтин Fast Mode</text>

  <!-- Bottom Left Text -->
  <text class="text-base text-feature-title" x="180" y="376">Подобряване на съгласуването</text>
  <text class="text-base text-feature-desc" x="180" y="404">Честност близо до Mythos</text>

  <!-- Bottom Right Text -->
  <text class="text-base text-feature-title" x="620" y="376">Контрол на усилията</text>
  <text class="text-base text-feature-desc" x="620" y="404">Оптимизация на време и разходи</text>
</svg>
