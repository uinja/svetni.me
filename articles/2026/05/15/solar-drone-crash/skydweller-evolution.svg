<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />
  
  <!-- Timeline/Process Flow -->
  <!-- Start: Solar Impulse 2 -->
  <rect x="50" y="100" width="200" height="80" rx="8" fill="var(--color-primary)" />
  <text x="150" y="130" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="central">Solar Impulse 2</text>
  <text x="150" y="155" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="central">Пилотиран соларен самолет</text>
  <text x="150" y="170" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="central">72м размах на крилата</text>

  <!-- Arrow 1 -->
  <path d="M 250 140 L 300 140" stroke="var(--color-primary)" stroke-width="2" fill="none" />
  <path d="M 300 140 L 292 136 M 300 140 L 292 144" stroke="var(--color-primary)" stroke-width="2" fill="none" />
  <text x="275" y="130" font-family="system-ui, sans-serif" font-size="10" fill="var(--color-primary)" text-anchor="middle">Трансформация</text>

  <!-- Middle: Skydweller Platform -->
  <rect x="300" y="100" width="200" height="80" rx="8" fill="var(--color-secondary)" />
  <text x="400" y="130" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="var(--color-on-secondary)" text-anchor="middle" dominant-baseline="central">Skydweller Platform</text>
  <text x="400" y="155" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-secondary)" text-anchor="middle" dominant-baseline="central">Безпилотен дрон (HALE)</text>
  <text x="400" y="170" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-secondary)" text-anchor="middle" dominant-baseline="central">800 фунта полезен товар</text>

  <!-- Arrow 2 -->
  <path d="M 400 180 L 400 250" stroke="var(--color-secondary)" stroke-width="2" fill="none" />
  <path d="M 400 250 L 396 242 M 400 250 L 404 242" stroke="var(--color-secondary)" stroke-width="2" fill="none" />
  <text x="410" y="215" font-family="system-ui, sans-serif" font-size="10" fill="var(--color-secondary)" text-anchor="start">Мисия: FLEX 2026</text>

  <!-- Bottom: Record & Crash -->
  <rect x="250" y="250" width="300" height="150" rx="8" stroke="var(--color-tertiary)" stroke-width="2" fill="none" />
  <text x="400" y="275" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="var(--color-tertiary)" text-anchor="middle" dominant-baseline="central">Постижения и Инцидент</text>
  
  <text x="270" y="310" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-surface)" text-anchor="start" dominant-baseline="central">● Световен рекорд: 8 дни и 14 мин</text>
  <text x="270" y="335" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-surface)" text-anchor="start" dominant-baseline="central">● Морско патрулиране край Флорида</text>
  <text x="270" y="360" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-surface)" text-anchor="start" dominant-baseline="central">● Причина: Екстремни въздушни маси</text>
  <text x="270" y="385" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="var(--color-error, #ba1a1a)" text-anchor="start" dominant-baseline="central">● Резултат: Контролирано приводняване</text>

  <!-- Legend/Notes -->
  <text x="400" y="460" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface-variant)" text-anchor="middle" font-style="italic">Графика на еволюцията и последната мисия на Skydweller (Solar Impulse 2)</text>
</svg>
