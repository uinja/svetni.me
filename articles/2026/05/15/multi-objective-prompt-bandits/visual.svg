<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />

  <!-- Grid/Axes -->
  <line x1="100" y1="400" x2="700" y2="400" stroke="var(--color-on-surface)" stroke-width="2" />
  <line x1="100" y1="400" x2="100" y2="100" stroke="var(--color-on-surface)" stroke-width="2" />

  <!-- Axis Labels -->
  <text x="400" y="440" text-anchor="middle" fill="var(--color-on-surface)" font-size="16" font-weight="500">Оптимизация на Метрика А (напр. Точност)</text>
  <text x="60" y="250" text-anchor="middle" transform="rotate(-90 60 250)" fill="var(--color-on-surface)" font-size="16" font-weight="500">Оптимизация на Метрика Б (напр. Латентност)</text>

  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" fill="var(--color-primary)" font-size="24" font-weight="500">Многокритерийна оптимизация на промпти (Pareto Front)</text>

  <!-- Non-optimal Points -->
  <circle cx="200" cy="350" r="8" fill="var(--color-secondary)" opacity="0.4" />
  <circle cx="300" cy="300" r="8" fill="var(--color-secondary)" opacity="0.4" />
  <circle cx="250" cy="250" r="8" fill="var(--color-secondary)" opacity="0.4" />
  <circle cx="450" cy="380" r="8" fill="var(--color-secondary)" opacity="0.4" />
  <circle cx="550" cy="320" r="8" fill="var(--color-secondary)" opacity="0.4" />

  <!-- Pareto Front Points -->
  <path d="M 200 150 Q 400 180 650 380" fill="none" stroke="var(--color-tertiary)" stroke-width="3" stroke-dasharray="8 4" />
  
  <circle cx="200" cy="150" r="10" fill="var(--color-primary)" />
  <circle cx="350" cy="170" r="10" fill="var(--color-primary)" />
  <circle cx="500" cy="240" r="10" fill="var(--color-primary)" />
  <circle cx="650" cy="380" r="10" fill="var(--color-primary)" />

  <!-- Labels for Pareto Points -->
  <text x="210" y="140" fill="var(--color-on-surface)" font-size="14">Висока прецизност</text>
  <text x="660" y="370" fill="var(--color-on-surface)" font-size="14">Ниска латентност</text>

  <!-- Legend -->
  <rect x="580" y="100" width="180" height="80" rx="8" fill="var(--color-background)" stroke="var(--color-on-surface)" stroke-width="1" />
  <circle cx="600" cy="125" r="6" fill="var(--color-primary)" />
  <text x="615" y="130" fill="var(--color-on-surface)" font-size="12">Pareto оптимални промпти</text>
  <circle cx="600" cy="155" r="6" fill="var(--color-secondary)" opacity="0.4" />
  <text x="615" y="160" fill="var(--color-on-surface)" font-size="12">Субоптимални промпти</text>
</svg>
