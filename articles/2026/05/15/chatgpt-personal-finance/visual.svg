<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />

  <!-- Grid lines for tech feel -->
  <path d="M 0 100 H 800 M 0 200 H 800 M 0 300 H 800 M 0 400 H 800 M 100 0 V 500 M 200 0 V 500 M 300 0 V 500 M 400 0 V 500 M 500 0 V 500 M 600 0 V 500 M 700 0 V 500" stroke="var(--color-surface-variant)" stroke-width="0.5" opacity="0.3" />

  <!-- Central Interface Hub -->
  <rect x="250" y="100" width="300" height="300" rx="20" fill="var(--color-primary-container)" stroke="var(--color-primary)" stroke-width="4" />
  <text x="400" y="150" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="var(--color-on-primary-container)" text-anchor="middle">ChatGPT</text>
  <text x="400" y="180" font-family="system-ui, sans-serif" font-size="16" fill="var(--color-on-primary-container)" text-anchor="middle">Personal Finance</text>

  <!-- Connection to Plaid/Banks -->
  <path d="M 550 250 L 650 250" stroke="var(--color-secondary)" stroke-width="4" marker-end="url(#arrowhead)" />
  <rect x="650" y="210" width="120" height="80" rx="10" fill="var(--color-secondary-container)" stroke="var(--color-secondary)" stroke-width="2" />
  <text x="710" y="255" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="var(--color-on-secondary-container)" text-anchor="middle">Plaid / Banks</text>

  <!-- Connection to User Data/Vault -->
  <path d="M 250 250 L 150 250" stroke="var(--color-tertiary)" stroke-width="4" marker-end="url(#arrowhead-tertiary)" />
  <rect x="30" y="210" width="120" height="80" rx="10" fill="var(--color-tertiary-container)" stroke="var(--color-tertiary)" stroke-width="2" />
  <text x="90" y="255" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="var(--color-on-tertiary-container)" text-anchor="middle">Privacy Vault</text>

  <!-- Analysis Output -->
  <rect x="300" y="280" width="200" height="80" rx="10" fill="var(--color-surface)" stroke="var(--color-outline)" stroke-width="1" />
  <rect x="320" y="300" width="160" height="8" rx="4" fill="var(--color-primary)" opacity="0.6" />
  <rect x="320" y="315" width="120" height="8" rx="4" fill="var(--color-primary)" opacity="0.4" />
  <rect x="320" y="330" width="140" height="8" rx="4" fill="var(--color-primary)" opacity="0.5" />

  <!-- Arrowheads -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--color-secondary)" />
    </marker>
    <marker id="arrowhead-tertiary" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="var(--color-tertiary)" />
    </marker>
  </defs>
</svg>