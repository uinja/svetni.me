<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />
  
  <!-- Step 1: Legitimate App -->
  <rect x="50" y="200" width="180" height="100" rx="8" fill="var(--color-primary)" />
  <text x="140" y="240" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="central">Легитимен софтуер</text>
  <text x="140" y="265" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="central">(fmapp.exe)</text>
  
  <!-- Arrow 1 -->
  <path d="M 230 250 L 290 250" stroke="var(--color-on-surface)" stroke-width="2" fill="none" />
  <path d="M 290 250 L 280 245 L 280 255 Z" fill="var(--color-on-surface)" />
  
  <!-- Step 2: Malicious DLL -->
  <rect x="300" y="200" width="180" height="100" rx="8" fill="var(--color-secondary)" />
  <text x="390" y="240" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="var(--color-on-secondary)" text-anchor="middle" dominant-baseline="central">Зловредна DLL</text>
  <text x="390" y="265" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-secondary)" text-anchor="middle" dominant-baseline="central">(fmapp.dll)</text>
  
  <!-- Arrow 2 -->
  <path d="M 480 250 L 540 250" stroke="var(--color-on-surface)" stroke-width="2" fill="none" />
  <path d="M 540 250 L 530 245 L 530 255 Z" fill="var(--color-on-surface)" />
  
  <!-- Step 3: ChromElevator -->
  <rect x="550" y="200" width="200" height="100" rx="8" fill="var(--color-tertiary)" />
  <text x="650" y="240" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="var(--color-on-tertiary)" text-anchor="middle" dominant-baseline="central">ChromElevator</text>
  <text x="650" y="265" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-tertiary)" text-anchor="middle" dominant-baseline="central">(Payload)</text>
  
  <!-- Connections to targets -->
  <path d="M 650 300 L 650 380 L 550 380" stroke="var(--color-on-surface)" stroke-width="2" fill="none" stroke-dasharray="4" />
  <path d="M 550 380 L 560 375 L 560 385 Z" fill="var(--color-on-surface)" />
  <text x="600" y="400" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-surface)" text-anchor="middle">Кражба на данни</text>
  
  <rect x="370" y="350" width="180" height="60" rx="4" fill="var(--color-background)" stroke="var(--color-outline)" />
  <text x="460" y="380" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Браузър Chrome</text>
  
  <!-- Exfiltration -->
  <path d="M 650 200 L 650 120 L 550 120" stroke="var(--color-on-surface)" stroke-width="2" fill="none" stroke-dasharray="4" />
  <path d="M 550 120 L 560 115 L 560 125 Z" fill="var(--color-on-surface)" />
  <text x="600" y="100" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-surface)" text-anchor="middle">Ексфилтрация</text>
  
  <rect x="370" y="90" width="180" height="60" rx="4" fill="var(--color-background)" stroke="var(--color-outline)" />
  <text x="460" y="120" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">sendit.sh</text>

  <!-- Title -->
  <text x="400" y="40" font-family="system-ui, sans-serif" font-size="22" font-weight="500" fill="var(--color-on-surface)" text-anchor="middle">Схема на атаката "DLL Sideloading"</text>
</svg>
