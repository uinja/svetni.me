<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />
  
  <!-- Lattice Structure (Stylized 3D) -->
  <g transform="translate(400, 250)">
    <!-- Bottom layer of atoms -->
    <circle cx="-60" cy="40" r="12" fill="var(--color-secondary)" opacity="0.4" />
    <circle cx="20" cy="40" r="12" fill="var(--color-secondary)" opacity="0.4" />
    <circle cx="100" cy="40" r="12" fill="var(--color-secondary)" opacity="0.4" />
    <circle cx="-100" cy="80" r="12" fill="var(--color-secondary)" opacity="0.4" />
    <circle cx="-20" cy="80" r="12" fill="var(--color-secondary)" opacity="0.4" />
    <circle cx="60" cy="80" r="12" fill="var(--color-secondary)" opacity="0.4" />

    <!-- Middle layer (The target layer) -->
    <circle cx="-80" cy="-20" r="15" fill="var(--color-primary)" opacity="0.6" />
    <circle cx="0" cy="-20" r="15" fill="var(--color-primary)" opacity="0.6" />
    <circle cx="80" cy="-20" r="15" fill="var(--color-primary)" opacity="0.6" />
    
    <!-- The Atom Being Moved -->
    <circle cx="0" cy="-20" r="15" fill="var(--color-tertiary)">
      <animate attributeName="cx" values="0;120" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite" />
    </circle>
    
    <!-- Electron Beam -->
    <path d="M 0 -220 L 0 -35" stroke="var(--color-primary)" stroke-width="4" stroke-dasharray="8 4">
      <animate attributeName="d" values="M 0 -220 L 0 -35; M 120 -220 L 120 -35" dur="3s" repeatCount="indefinite" />
    </path>
    <polygon points="-10,-220 10,-220 0,-240" fill="var(--color-primary)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 120,0" dur="3s" repeatCount="indefinite" />
    </polygon>
  </g>

  <!-- Labels -->
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="500" font-size="24" fill="var(--color-on-surface)">Атомно инженерство в 3D решетка</text>
  
  <text x="220" y="150" text-anchor="end" font-family="system-ui, sans-serif" font-weight="400" font-size="18" fill="var(--color-on-surface)">Електронен лъч</text>
  <path d="M 230 145 L 380 145" stroke="var(--color-on-surface)" stroke-width="1" marker-end="url(#arrow)" />
  
  <text x="580" y="380" text-anchor="start" font-family="system-ui, sans-serif" font-weight="400" font-size="18" fill="var(--color-on-surface)">Преместване на атом</text>
  <path d="M 570 375 L 500 250" stroke="var(--color-on-surface)" stroke-width="1" marker-end="url(#arrow)" />

  <text x="400" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="400" font-size="16" fill="var(--color-on-surface)" opacity="0.7">Манипулация на десетки хиляди атоми в минута</text>

  <!-- Arrow Marker Definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="var(--color-on-surface)" />
    </marker>
  </defs>
</svg>
