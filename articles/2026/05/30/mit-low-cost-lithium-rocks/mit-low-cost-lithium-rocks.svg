<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="100%" height="auto">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <rect width="100%" height="100%" fill="#ffffff" rx="16" />
  
  <!-- Title / Header -->
  <text x="40" y="45" font-family="'Inter', 'Roboto', sans-serif" font-size="20" font-weight="bold" fill="#202124">Нискотемпературен затворен процес за добив на литий (MIT)</text>
  <text x="40" y="70" font-family="'Inter', 'Roboto', sans-serif" font-size="14" fill="#666666">Елиминиране на изпичането при 1000°C и „nose-to-tail“ оползотворяване на суровините</text>

  <!-- Flow Elements -->
  
  <!-- Left Side: Inputs -->
  <g transform="translate(40, 110)">
    <rect width="200" height="90" rx="8" fill="#f8f9fa" stroke="#1a30ae" stroke-width="2" />
    <text x="100" y="30" text-anchor="middle" font-family="'Inter', 'Roboto', sans-serif" font-size="14" font-weight="bold" fill="#202124">Входящи ресурси</text>
    <text x="100" y="52" text-anchor="middle" font-family="'Inter', 'Roboto', sans-serif" font-size="12" fill="#202124">Сподумен (руда)</text>
    <text x="100" y="72" text-anchor="middle" font-family="'Inter', 'Roboto', sans-serif" font-size="12" fill="#1a30ae">+ Амониев флуорид</text>
  </g>

  <!-- Arrow Left to Center -->
  <path d="M 240 155 L 290 155" fill="none" stroke="#1a30ae" stroke-width="2.5" marker-end="url(#arrow)" />

  <!-- Center: Reaction & Leaching -->
  <g transform="translate(300, 110)">
    <rect width="200" height="90" rx="8" fill="#1a30ae" />
    <text x="100" y="32" text-anchor="middle" font-family="'Inter', 'Roboto', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Разтваряне и ецване</text>
    <text x="100" y="55" text-anchor="middle" font-family="'Inter', 'Roboto', sans-serif" font-size="12" fill="#ffffff">на стайна температура</text>
    <text x="100" y="73" text-anchor="middle" font-family="'Inter', 'Roboto', sans-serif" font-size="11" fill="#ffffff" opacity="0.9">(вдъхновено от стъклоецването)</text>
  </g>

  <!-- Split Arrows from Center to Right Outputs -->
  <path d="M 500 155 C 530 155, 530 115, 550 115" fill="none" stroke="#202124" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 500 155 L 550 155" fill="none" stroke="#202124" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 500 155 C 530 155, 530 195, 550 195" fill="none" stroke="#202124" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Right Side: Outputs -->
  <!-- Top Output: Lithium -->
  <g transform="translate(560, 75)">
    <rect width="200" height="50" rx="6" fill="#f8f9fa" stroke="#1e33af" stroke-width="1.5" />
    <text x="10" y="22" font-family="'Inter', 'Roboto', sans-serif" font-size="12" font-weight="bold" fill="#1e33af">Литиев карбонат/хидроксид</text>
    <text x="10" y="38" font-family="'Inter', 'Roboto', sans-serif" font-size="11" fill="#666666">Батериен клас (чистота >99%)</text>
  </g>

  <!-- Middle Output: Alumina -->
  <g transform="translate(560, 130)">
    <rect width="200" height="50" rx="6" fill="#f8f9fa" stroke="#202124" stroke-width="1" />
    <text x="10" y="22" font-family="'Inter', 'Roboto', sans-serif" font-size="12" font-weight="bold" fill="#202124">Алуминиев оксид (Alumina)</text>
    <text x="10" y="38" font-family="'Inter', 'Roboto', sans-serif" font-size="11" fill="#666666">За металургията и метала</text>
  </g>

  <!-- Bottom Output: Silica -->
  <g transform="translate(560, 185)">
    <rect width="200" height="50" rx="6" fill="#f8f9fa" stroke="#202124" stroke-width="1" />
    <text x="10" y="22" font-family="'Inter', 'Roboto', sans-serif" font-size="12" font-weight="bold" fill="#202124">Реактивен силициев диоксид</text>
    <text x="10" y="38" font-family="'Inter', 'Roboto', sans-serif" font-size="11" fill="#666666">За екологичен зелен цимент</text>
  </g>

  <!-- Bottom: Recovery Loop -->
  <path d="M 400 200 L 400 280 C 400 310, 140 310, 140 205" fill="none" stroke="#1a30ae" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)" />
  <rect x="220" y="285" width="220" height="36" rx="6" fill="#f8f9fa" stroke="#1a30ae" stroke-dasharray="4,2" />
  <text x="330" y="307" text-anchor="middle" font-family="'Inter', 'Roboto', sans-serif" font-size="11" font-weight="bold" fill="#1a30ae">Улавяне на NH3 и регенериране на флуорида</text>
  <text x="210" y="265" font-family="'Inter', 'Roboto', sans-serif" font-size="11" fill="#1a30ae">Затворен цикъл (Близо 100% повторно използване)</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#1a30ae" />
    </marker>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#202124" />
    </marker>
  </defs>
</svg>
