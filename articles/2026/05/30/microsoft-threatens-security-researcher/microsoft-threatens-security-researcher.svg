<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 370" width="100%" height="auto">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <rect width="100%" height="100%" fill="#ffffff" rx="16" />
  
  <!-- Title / Header -->
  <text x="40" y="45" font-family="'Inter', 'Roboto', sans-serif" font-size="20" font-weight="bold" fill="#202124">Конфликтът: Разкриване срещу Сплашване</text>
  <text x="40" y="70" font-family="'Inter', 'Roboto', sans-serif" font-size="14" fill="#666666">Агресивната реакция на Microsoft и заплахата за „смразяващ ефект“ в общността</text>

  <!-- Left Column: Security Researcher -->
  <g transform="translate(40, 110)">
    <rect width="320" height="210" rx="8" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1.5" />
    <rect width="320" height="40" rx="8" fill="#202124" />
    <rect width="320" height="20" y="20" fill="#202124" />
    <text x="160" y="25" text-anchor="middle" font-family="'Inter', 'Roboto', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Изследовател (Nightmare Eclipse)</text>
    
    <!-- Actions -->
    <text x="20" y="75" font-family="'Inter', 'Roboto', sans-serif" font-size="12" font-weight="bold" fill="#202124">1. Откриване на Zero-day уязвимости</text>
    <text x="35" y="93" font-family="'Inter', 'Roboto', sans-serif" font-size="11" fill="#666666">Windows Defender &amp; BitLocker</text>
    
    <text x="20" y="125" font-family="'Inter', 'Roboto', sans-serif" font-size="12" font-weight="bold" fill="#202124">2. Публично разкриване в GitHub</text>
    <text x="35" y="143" font-family="'Inter', 'Roboto', sans-serif" font-size="11" fill="#666666">Протест срещу лошо отношение от MSRC</text>
    
    <text x="20" y="175" font-family="'Inter', 'Roboto', sans-serif" font-size="12" font-weight="bold" fill="#202124">3. Липса на координация</text>
    <text x="35" y="193" font-family="'Inter', 'Roboto', sans-serif" font-size="11" fill="#666666">Публикуване на експлойти без изчакване на пач</text>
  </g>

  <!-- Right Column: Microsoft (MSRC & DCU) -->
  <g transform="translate(440, 110)">
    <rect width="320" height="210" rx="8" fill="#f8f9fa" stroke="#1a30ae" stroke-width="2" />
    <rect width="320" height="40" rx="8" fill="#1a30ae" />
    <rect width="320" height="20" y="20" fill="#1a30ae" />
    <text x="160" y="25" text-anchor="middle" font-family="'Inter', 'Roboto', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Корпорация (Microsoft)</text>
    
    <!-- Actions -->
    <text x="20" y="75" font-family="'Inter', 'Roboto', sans-serif" font-size="12" font-weight="bold" fill="#1a30ae">1. Осъждане на публикацията</text>
    <text x="35" y="93" font-family="'Inter', 'Roboto', sans-serif" font-size="11" fill="#666666">Твърдение, че се застрашават крайните потребители</text>
    
    <text x="20" y="125" font-family="'Inter', 'Roboto', sans-serif" font-size="12" font-weight="bold" fill="#1a30ae">2. Намесване на Digital Crimes Unit (DCU)</text>
    <text x="35" y="143" font-family="'Inter', 'Roboto', sans-serif" font-size="11" fill="#666666">Сътрудничество с полицията срещу разкрития</text>
    
    <text x="20" y="175" font-family="'Inter', 'Roboto', sans-serif" font-size="12" font-weight="bold" fill="#1a30ae">3. Смразяващ ефект (Chilling Effect)</text>
    <text x="35" y="193" font-family="'Inter', 'Roboto', sans-serif" font-size="11" fill="#666666">Експертите предупреждават за риск от мълчание</text>
  </g>

  <!-- Red Clash indicator / Warning block in the middle -->
  <g transform="translate(372, 195)">
    <circle cx="28" cy="28" r="24" fill="#ffffff" stroke="#b00020" stroke-width="2.5" />
    <!-- Exclamation mark -->
    <path d="M 28 17 L 28 32 M 28 39 L 28 41" stroke="#b00020" stroke-width="4.5" stroke-linecap="round" />
  </g>
</svg>
