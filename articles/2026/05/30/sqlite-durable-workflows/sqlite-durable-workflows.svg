<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <defs>
    <!-- Arrowhead -->
    <marker id="arrow" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#1e33af" />
    </marker>
    <!-- Drop Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1" flood-color="#202124" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff" />

  <!-- Headers -->
  <text x="400" y="44" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#202124">Архитектура за устойчиви работни процеси със SQLite</text>
  <text x="400" y="72" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#64748b">Опростена устойчивост за ИИ агенти: Obelisk + SQLite + Litestream</text>

  <!-- 1. Compute Box (Disposable Workers) -->
  <g transform="translate(60, 160)" filter="url(#shadow)">
    <rect width="200" height="180" rx="8" fill="#f8f9fa" stroke="#1a30ae" stroke-width="2" />
    <text x="100" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1a30ae">Obelisk сървър</text>
    <text x="100" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">(Евтини изчисления)</text>
    
    <!-- Sub elements -->
    <rect x="20" y="80" width="160" height="32" rx="4" fill="#ffffff" stroke="#e2e8f0" />
    <text x="100" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#202124">ИИ агенти / Сървлет</text>
    
    <rect x="20" y="125" width="160" height="32" rx="4" fill="#ffffff" stroke="#e2e8f0" />
    <text x="100" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#202124">Рестартиращи се процеси</text>
  </g>

  <!-- Connector: Compute -> DB (Fast IPC / No Network Hop) -->
  <path d="M 260 250 L 300 250" fill="none" stroke="#1e33af" stroke-width="2" marker-end="url(#arrow)" />
  <text x="280" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1a30ae">Локално</text>

  <!-- 2. Local DB Box (SQLite) -->
  <g transform="translate(300, 160)" filter="url(#shadow)">
    <rect width="200" height="180" rx="8" fill="#f8f9fa" stroke="#1b31ae" stroke-width="2" />
    <text x="100" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1b31ae">SQLite база данни</text>
    <text x="100" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">(Локален файл със състояние)</text>
    
    <!-- Sub elements -->
    <rect x="20" y="80" width="160" height="32" rx="4" fill="#1b31ae" fill-opacity="0.08" stroke="#1b31ae" stroke-width="1" />
    <text x="100" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1b31ae">Лог на изпълнението</text>
    
    <rect x="20" y="125" width="160" height="32" rx="4" fill="#1b31ae" fill-opacity="0.08" stroke="#1b31ae" stroke-width="1" />
    <text x="100" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1b31ae">История на преиграване</text>
  </g>

  <!-- Connector: DB -> Cloud (Asynchronous replication) -->
  <path d="M 500 250 L 540 250" fill="none" stroke="#1e33af" stroke-width="2" marker-end="url(#arrow)" />
  <text x="520" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1e33af">Litestream</text>

  <!-- 3. Cloud Storage Box (S3 Backup) -->
  <g transform="translate(540, 160)" filter="url(#shadow)">
    <rect width="200" height="180" rx="8" fill="#f8f9fa" stroke="#1e33af" stroke-width="2" />
    <text x="100" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e33af">Обектно хранилище</text>
    <text x="100" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">(S3 / Cloud Backup)</text>
    
    <!-- Sub elements -->
    <rect x="20" y="80" width="160" height="32" rx="4" fill="#ffffff" stroke="#e2e8f0" />
    <text x="100" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#202124">Архиви за възстановяване</text>
    
    <rect x="20" y="125" width="160" height="32" rx="4" fill="#ffffff" stroke="#e2e8f0" />
    <text x="100" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#202124">Външен достъп и анализ</text>
  </g>

  <!-- Footnote -->
  <rect x="60" y="400" width="680" height="40" rx="6" fill="#f1f5f9" />
  <text x="400" y="420" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Всеки ИИ агент работи с малка изолирана база данни, репликирана асинхронно.</text>
</svg>
