<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="100%" height="auto">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <rect width="100%" height="100%" fill="#ffffff" rx="16" />

  <!-- Title / Header -->
  <text x="40" y="45" font-family="'Inter', 'Roboto', sans-serif" font-size="20" font-weight="bold" fill="#202124">Еволюцията на техническото интервю</text>
  <text x="40" y="70" font-family="'Inter', 'Roboto', sans-serif" font-size="14" fill="#666666">Сравнение между традиционния „театър“ и новия реален модел „Огън на открито“</text>

  <!-- Left Box: Traditional Model -->
  <g transform="translate(40, 100)">
    <rect width="330" height="220" rx="8" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1.5" />
    <rect width="330" height="40" rx="8" fill="#e0e0e0" />
    <!-- Round top corners of header background -->
    <rect width="330" height="20" y="20" fill="#e0e0e0" />
    
    <text x="165" y="25" text-anchor="middle" font-family="'Inter', 'Roboto', sans-serif" font-size="14" font-weight="bold" fill="#202124">Традиционен модел (Театър)</text>
    
    <!-- Bullet points -->
    <circle cx="30" cy="75" r="4" fill="#666666" />
    <text x="45" y="79" font-family="'Inter', 'Roboto', sans-serif" font-size="13" fill="#202124" font-weight="bold">LeetCode пъзели &amp; бяла дъска</text>
    <text x="45" y="96" font-family="'Inter', 'Roboto', sans-serif" font-size="11" fill="#666666">Решаване на абстрактни алгоритми под стрес</text>
    
    <circle cx="30" cy="130" r="4" fill="#666666" />
    <text x="45" y="134" font-family="'Inter', 'Roboto', sans-serif" font-size="13" fill="#202124" font-weight="bold">Симулация на умения</text>
    <text x="45" y="151" font-family="'Inter', 'Roboto', sans-serif" font-size="11" fill="#666666">Лошо съответствие с ежедневните задачи</text>
    
    <circle cx="30" cy="185" r="4" fill="#666666" />
    <text x="45" y="189" font-family="'Inter', 'Roboto', sans-serif" font-size="13" fill="#202124" font-weight="bold">Нисък полезен сигнал</text>
    <text x="45" y="206" font-family="'Inter', 'Roboto', sans-serif" font-size="11" fill="#666666">Оценката е субективна и податлива на късмет</text>
  </g>

  <!-- Right Box: Campfire Model -->
  <g transform="translate(430, 100)">
    <rect width="330" height="220" rx="8" fill="#f8f9fa" stroke="#1a30ae" stroke-width="2" />
    <rect width="330" height="40" rx="8" fill="#1a30ae" />
    <!-- Round top corners of header background -->
    <rect width="330" height="20" y="20" fill="#1a30ae" />
    
    <text x="165" y="25" text-anchor="middle" font-family="'Inter', 'Roboto', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Модел „Огън на открито“ (Campfire)</text>
    
    <!-- Bullet points -->
    <circle cx="30" cy="75" r="4" fill="#1a30ae" />
    <text x="45" y="79" font-family="'Inter', 'Roboto', sans-serif" font-size="13" fill="#202124" font-weight="bold">Реална съвместна работа</text>
    <text x="45" y="96" font-family="'Inter', 'Roboto', sans-serif" font-size="11" fill="#666666">Писане на код в съществуващия проект</text>
    
    <circle cx="30" cy="130" r="4" fill="#1a30ae" />
    <text x="45" y="134" font-family="'Inter', 'Roboto', sans-serif" font-size="13" fill="#202124" font-weight="bold">Платен пробен период</text>
    <text x="45" y="151" font-family="'Inter', 'Roboto', sans-serif" font-size="11" fill="#666666">Няколко дни съвместна работа по реални билети</text>
    
    <circle cx="30" cy="185" r="4" fill="#1a30ae" />
    <text x="45" y="189" font-family="'Inter', 'Roboto', sans-serif" font-size="13" fill="#202124" font-weight="bold">Истинска продуктивност</text>
    <text x="45" y="206" font-family="'Inter', 'Roboto', sans-serif" font-size="11" fill="#666666">Кандидатът генерира стойност; 100% реален сигнал</text>
  </g>

  <!-- VS label in the middle -->
  <circle cx="400" cy="210" r="22" fill="#ffffff" stroke="#1a30ae" stroke-width="2" />
  <text x="400" y="216" text-anchor="middle" font-family="'Inter', 'Roboto', sans-serif" font-size="16" font-weight="bold" fill="#1a30ae">VS</text>
</svg>
