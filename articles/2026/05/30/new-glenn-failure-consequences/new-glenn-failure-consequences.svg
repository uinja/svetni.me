<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <defs>
    <!-- Arrowhead -->
    <marker id="arrow" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#1a30ae" />
    </marker>
    <!-- Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1" flood-color="#202124" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff" />

  <!-- Titles -->
  <text x="400" y="44" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#202124">Последици от аварията на New Glenn</text>
  <text x="400" y="72" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#64748b">Верижно въздействие върху американската космическа индустрия и програмата Artemis</text>

  <!-- Root Event -->
  <g transform="translate(290, 100)" filter="url(#shadow)">
    <rect width="220" height="60" rx="8" fill="#f8f9fa" stroke="#cf2e2e" stroke-width="2" />
    <text x="110" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#cf2e2e">ЕКСПЛОЗИЯ НА NEW GLENN</text>
    <text x="110" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Статично изпитание (LC-36A)</text>
  </g>

  <!-- Level 1 Connectors -->
  <path d="M 290 130 L 150 130 L 150 190" fill="none" stroke="#1a30ae" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 400 160 L 400 190" fill="none" stroke="#1a30ae" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 510 130 L 650 130 L 650 190" fill="none" stroke="#1a30ae" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Node Left: Launch Pad damage -->
  <g transform="translate(40, 200)" filter="url(#shadow)">
    <rect width="220" height="80" rx="6" fill="#f8f9fa" stroke="#1a30ae" stroke-width="1.5" />
    <text x="110" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1a30ae">Стартова инфраструктура</text>
    <text x="110" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#202124">Тежки щети по рампа LC-36A</text>
    <text x="110" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#cf2e2e">Закъснение от 12 до 15 месеца</text>
  </g>

  <!-- Node Middle: BE-4 Engine / ULA Vulcan -->
  <g transform="translate(290, 200)" filter="url(#shadow)">
    <rect width="220" height="80" rx="6" fill="#f8f9fa" stroke="#1b31ae" stroke-width="1.5" />
    <text x="110" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1b31ae">Двигател BE-4 и ULA</text>
    <text x="110" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#202124">Възможен дефект в двигателя BE-4</text>
    <text x="110" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Допълнително спиране на ракета Vulcan</text>
  </g>

  <!-- Node Right: Blue Moon Lander -->
  <g transform="translate(540, 200)" filter="url(#shadow)">
    <rect width="220" height="80" rx="6" fill="#f8f9fa" stroke="#1e33af" stroke-width="1.5" />
    <text x="110" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e33af">Лунна програма на NASA</text>
    <text x="110" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#202124">Апаратът Blue Moon е блокиран</text>
    <text x="110" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#cf2e2e">Забавяне за мисии Artemis III / IV</text>
  </g>

  <!-- Level 2 Connectors -->
  <path d="M 150 280 L 150 340" fill="none" stroke="#1a30ae" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 400 280 L 400 340" fill="none" stroke="#1a30ae" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 650 280 L 650 340" fill="none" stroke="#1a30ae" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Node Bottom Left: SpaceX Monopoly -->
  <g transform="translate(40, 350)" filter="url(#shadow)">
    <rect width="220" height="60" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" />
    <text x="110" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#475569">Монопол на SpaceX</text>
    <text x="110" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#202124">Falcon 9 / Heavy са единствена опция</text>
  </g>

  <!-- Node Bottom Middle: Launch crisis -->
  <g transform="translate(290, 350)" filter="url(#shadow)">
    <rect width="220" height="60" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" />
    <text x="110" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#475569">Криза при средно/тежки товари</text>
    <text x="110" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#202124">Блокиране на спътници и военни товари</text>
  </g>

  <!-- Node Bottom Right: Dependency on Starship -->
  <g transform="translate(540, 350)" filter="url(#shadow)">
    <rect width="220" height="60" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" />
    <text x="110" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#475569">Зависимост от Starship</text>
    <text x="110" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#202124">NASA разчита единствено на SpaceX</text>
  </g>
</svg>
