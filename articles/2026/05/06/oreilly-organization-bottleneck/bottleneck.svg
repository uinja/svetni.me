    <rect x="350" y="180" width="250" height="40" fill="#333333"/>
    <polygon points="600,160 650,200 600,240" fill="#333333"/>
    <text x="400" y="320" font-family="sans-serif" font-size="24" fill="#333333" text-anchor="middle">Organizational Bottlenecks</text>
