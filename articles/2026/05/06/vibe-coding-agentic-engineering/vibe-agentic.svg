<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
    <rect width="800" height="400" fill="#0f172a"/>
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#f472b6;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
        </linearGradient>
    </defs>
    <path d="M100 200 Q 250 100 400 200 T 700 200" fill="none" stroke="url(#grad1)" stroke-width="4" stroke-dasharray="10 5">
        <animate attributeName="stroke-dashoffset" from="100" to="0" dur="5s" repeatCount="indefinite" />
    </path>
    <circle cx="100" cy="200" r="10" fill="#f472b6"/>
    <circle cx="700" cy="200" r="10" fill="#60a5fa"/>
    <text x="150" y="150" font-family="sans-serif" font-size="20" fill="#f472b6">Vibe Coding</text>
    <text x="550" y="150" font-family="sans-serif" font-size="20" fill="#60a5fa">Agentic Engineering</text>
    <text x="400" y="350" font-family="sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">The Convergence of AI Workflows</text>
</svg>