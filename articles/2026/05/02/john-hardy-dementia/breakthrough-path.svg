<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="500" fill="var(--color-on-surface)">Пътят към пробив в лечението на Алцхаймер</text>

  <!-- Science Node -->
  <circle cx="200" cy="200" r="80" fill="var(--color-secondary)" opacity="0.1" stroke="var(--color-primary)" stroke-width="3" />
  <text x="200" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="var(--color-primary)">Наука</text>
  <text x="200" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-primary)">Генетика &amp; Амилоид</text>

  <!-- Society Node -->
  <circle cx="600" cy="200" r="80" fill="var(--color-secondary)" opacity="0.1" stroke="var(--color-tertiary)" stroke-width="3" />
  <text x="600" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="var(--color-tertiary)">Общество</text>
  <text x="600" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-tertiary)">Политика &amp; Грижа</text>

  <!-- Breakthrough (Overlap) -->
  <path d="M 330 200 Q 400 100 470 200 Q 400 300 330 200 Z" fill="var(--color-surface)" stroke="var(--color-tertiary)" stroke-width="2" stroke-dasharray="4" />
  <text x="400" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="var(--color-tertiary)">ПРОБИВ</text>

  <!-- Connection line -->
  <line x1="280" y1="200" x2="520" y2="200" stroke="var(--color-secondary)" stroke-width="2" stroke-dasharray="5" />

  <!-- Quote/Insights Section -->
  <rect x="100" y="320" width="600" height="120" fill="var(--color-surface)" stroke="var(--color-secondary)" rx="8" />
  <text x="400" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-style="italic" fill="var(--color-on-surface)">„Пробивът изисква повече от просто наука.“</text>
  <text x="400" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="var(--color-on-surface)" opacity="0.8">— Сър Джон Харди, WIRED Health 2026</text>
  
  <text x="400" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" opacity="0.7">Фокус: Ранна диагностика и персонализирана терапия</text>
</svg>