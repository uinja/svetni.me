<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="var(--color-on-surface)">Концепцията „Таван на намеренията“</text>
  <text x="400" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="var(--color-tertiary)" opacity="0.8">Защо ИИ пропуска логическите грешки в дизайна</text>

  <!-- AI Analysis Section (The Code) -->
  <g transform="translate(100, 120)">
    <rect width="600" height="130" fill="var(--color-surface)" stroke="var(--color-secondary)" stroke-width="2" rx="12" />
    <text x="20" y="30" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-tertiary)">ОБЛАСТ НА ИИ (СИНТАКСИС)</text>
    
    <!-- Code block -->
    <rect x="20" y="45" width="560" height="70" fill="var(--color-background)" rx="6" opacity="0.5" />
    <text x="40" y="70" font-family="monospace" font-size="14" fill="var(--color-on-surface)">if (user.is_authenticated()) {</text>
    <text x="60" y="90" font-family="monospace" font-size="14" fill="var(--color-on-surface)">  database.delete(record_id);</text>
    <text x="40" y="110" font-family="monospace" font-size="14" fill="var(--color-on-surface)">}</text>
    
    <!-- Scan line effect -->
    <line x1="20" y1="75" x2="580" y2="75" stroke="var(--color-secondary)" stroke-width="1" stroke-dasharray="4,2" opacity="0.6" />
    
    <!-- Verdict -->
    <rect x="420" y="55" width="150" height="30" rx="15" fill="var(--color-tertiary)" />
    <text x="495" y="70" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="var(--color-background)">СИНТАКСИС: OK</text>
  </g>

  <!-- THE CEILING -->
  <g transform="translate(0, 275)">
    <rect width="800" height="40" fill="var(--color-primary)" opacity="0.2" />
    <line x1="50" y1="20" x2="750" y2="20" stroke="var(--color-tertiary)" stroke-width="4" stroke-dasharray="15,10" />
    <text x="400" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="var(--color-tertiary)">ТАВАН НА НАМЕРЕНИЯТА (INTENT CEILING)</text>
  </g>

  <!-- Human Intent Section (The "Why") -->
  <g transform="translate(100, 335)">
    <rect width="600" height="130" fill="var(--color-surface)" stroke="var(--color-tertiary)" stroke-width="2" stroke-dasharray="8,4" rx="12" />
    <text x="20" y="30" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-tertiary)">ЧОВЕШКО НАМЕРЕНИЕ (КОНТЕКСТ)</text>
    
    <text x="40" y="70" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="var(--color-on-surface)">„Само администратори трябва да могат да“</text>
    <text x="40" y="100" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="var(--color-on-surface)">„изтриват тези записи в базата.“</text>
    
    <!-- Warning -->
    <circle cx="530" cy="85" r="25" fill="var(--color-tertiary)" />
    <text x="530" y="85" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="var(--color-background)">!</text>
    <text x="530" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="var(--color-tertiary)">ГРЕШКА В ДИЗАЙНА</text>
  </g>

  <!-- Connection / Gap Arrow (Repaired) -->
  <path d="M 400 335 L 400 315" stroke="var(--color-tertiary)" stroke-width="3" fill="none" marker-end="url(#arrow-head)" />
  <text x="410" y="325" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="var(--color-tertiary)">ЛИПСВАЩА ВРЪЗКА</text>

  <defs>
    <marker id="arrow-head" markerWidth="10" markerHeight="10" refX="9" refY="5" orientation="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="var(--color-tertiary)" />
    </marker>
  </defs>
</svg>