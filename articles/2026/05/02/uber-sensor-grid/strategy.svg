<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="500" fill="var(--color-on-surface)">Uber: От превозвач към Сензорна мрежа</text>
  
  <!-- Uber Platform -->
  <rect x="300" y="100" width="200" height="80" fill="var(--color-secondary)" rx="8" />
  <text x="400" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="var(--color-background)">Uber Cloud</text>
  <text x="400" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-background)">AV Labs Layer</text>

  <!-- Millions of Drivers -->
  <g transform="translate(100, 250)">
    <rect x="0" y="0" width="180" height="120" fill="var(--color-surface)" stroke="var(--color-secondary)" stroke-width="2" rx="8" />
    <text x="90" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="var(--color-on-surface)">Милиони шофьори</text>
    <!-- Car icons simplified -->
    <rect x="30" y="50" width="30" height="15" fill="var(--color-secondary)" opacity="0.6" rx="2" />
    <rect x="75" y="50" width="30" height="15" fill="var(--color-secondary)" opacity="0.6" rx="2" />
    <rect x="120" y="50" width="30" height="15" fill="var(--color-secondary)" opacity="0.6" rx="2" />
    <rect x="50" y="80" width="30" height="15" fill="var(--color-primary)" rx="2" />
    <text x="90" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-primary)">Сензори (Data Feed)</text>
  </g>

  <!-- AV Partners -->
  <g transform="translate(520, 250)">
    <rect x="0" y="0" width="180" height="120" fill="var(--color-surface)" stroke="var(--color-tertiary)" stroke-width="2" rx="8" />
    <text x="90" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="var(--color-on-surface)">AV Партньори (25+)</text>
    <text x="90" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-surface)" opacity="0.6">Обучение на модели</text>
    <text x="90" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-surface)" opacity="0.6">Shadow Mode тестване</text>
  </g>

  <!-- Arrows -->
  <!-- From Drivers to Uber -->
  <path d="M 190 250 Q 190 140 300 140" stroke="var(--color-primary)" stroke-width="3" fill="none" marker-end="url(#arrow-primary)" />
  <text x="210" y="190" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-primary)">Реални данни</text>

  <!-- From Uber to Partners -->
  <path d="M 500 140 Q 610 140 610 250" stroke="var(--color-tertiary)" stroke-width="3" fill="none" marker-end="url(#arrow-tertiary)" />
  <text x="560" y="190" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-tertiary)">Query &amp; Training</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orientation="auto">
      <path d="M0,0 L0,10 L10,5 Z" fill="var(--color-primary)" />
    </marker>
    <marker id="arrow-tertiary" markerWidth="10" markerHeight="10" refX="9" refY="5" orientation="auto">
      <path d="M0,0 L0,10 L10,5 Z" fill="var(--color-tertiary)" />
    </marker>
  </defs>
</svg>