<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="500" fill="var(--color-on-surface)">Методология за тестване на ИИ в ZDNET</text>

  <!-- Step 1 -->
  <rect x="50" y="100" width="160" height="120" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2" rx="8" />
  <text x="130" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="var(--color-primary)">1. Критерии</text>
  <text x="130" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" opacity="0.7">Дефиниране на</text>
  <text x="130" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" opacity="0.7">обективни метрики</text>

  <!-- Step 2 -->
  <rect x="230" y="100" width="160" height="120" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2" rx="8" />
  <text x="310" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="var(--color-primary)">2. Подбор</text>
  <text x="310" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" opacity="0.7">Избор на 5-10</text>
  <text x="310" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" opacity="0.7">кандидата за тест</text>

  <!-- Step 3 -->
  <rect x="410" y="100" width="160" height="120" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2" rx="8" />
  <text x="490" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="var(--color-primary)">3. Експеримент</text>
  <text x="490" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="var(--color-tertiary)">Hands-on!</text>
  <text x="490" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" opacity="0.7">Реална употреба</text>

  <!-- Step 4 -->
  <rect x="590" y="100" width="160" height="120" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2" rx="8" />
  <text x="670" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="var(--color-primary)">4. Резултати</text>
  <text x="670" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" opacity="0.7">Публикация и</text>
  <text x="670" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" opacity="0.7">циклично ре-тестване</text>

  <!-- Connecting Arrows -->
  <path d="M 210 160 L 230 160" stroke="var(--color-secondary)" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <path d="M 390 160 L 410 160" stroke="var(--color-secondary)" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <path d="M 570 160 L 590 160" stroke="var(--color-secondary)" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Core Principles Box -->
  <rect x="150" y="280" width="500" height="150" fill="var(--color-background)" stroke="var(--color-tertiary)" stroke-width="2" rx="12" />
  <text x="400" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="var(--color-tertiary)">Основни принципи</text>
  
  <circle cx="200" cy="360" r="10" fill="var(--color-tertiary)" />
  <text x="220" y="365" font-family="system-ui, sans-serif" font-size="16" fill="var(--color-on-surface)">Без влияние от доставчици (No vendor influence)</text>
  
  <circle cx="200" cy="400" r="10" fill="var(--color-tertiary)" />
  <text x="220" y="405" font-family="system-ui, sans-serif" font-size="16" fill="var(--color-on-surface)">Опит от „първа ръка“ (Living with products)</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orientation="auto">
      <path d="M0,0 L0,10 L10,5 Z" fill="var(--color-secondary)" />
    </marker>
  </defs>
</svg>