<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="500" fill="var(--color-on-surface)">Agentforce Operations: Решаване на „чупливите“ работни процеси</text>

  <!-- Problem Section (Legacy) -->
  <rect x="50" y="100" width="220" height="300" fill="var(--color-surface)" stroke="var(--color-tertiary)" stroke-width="2" rx="8" />
  <text x="160" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="var(--color-tertiary)">Проблемът</text>
  <text x="160" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-surface)" opacity="0.7">Традиционни процеси</text>
  
  <rect x="70" y="180" width="180" height="35" fill="var(--color-secondary)" opacity="0.1" rx="4" />
  <text x="160" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)">Неявни решения</text>
  
  <rect x="70" y="230" width="180" height="35" fill="var(--color-secondary)" opacity="0.1" rx="4" />
  <text x="160" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)">Човешка преценка (Gaps)</text>
  
  <rect x="70" y="280" width="180" height="35" fill="var(--color-secondary)" opacity="0.1" rx="4" />
  <text x="160" y="302" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)">Лошо дефинирани стъпки</text>
  
  <text x="160" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-tertiary)">💥 Счупване при ИИ</text>

  <!-- Solution Layer (Agentforce Ops) -->
  <rect x="290" y="100" width="220" height="300" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="3" rx="8" />
  <text x="400" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="var(--color-primary)">Agentforce Operations</text>
  
  <rect x="310" y="180" width="180" height="40" fill="var(--color-secondary)" opacity="0.1" rx="4" />
  <text x="400" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="var(--color-primary)">Детерминирана структура</text>
  
  <rect x="310" y="240" width="180" height="40" fill="var(--color-secondary)" opacity="0.1" rx="4" />
  <text x="400" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="var(--color-primary)">Session Tracing (Наблюдение)</text>
  
  <rect x="310" y="300" width="180" height="40" fill="var(--color-secondary)" opacity="0.1" rx="4" />
  <text x="400" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="var(--color-primary)">Governance &amp; Checks</text>

  <!-- Execution Section (Agents) -->
  <rect x="530" y="100" width="220" height="300" fill="var(--color-surface)" stroke="var(--color-tertiary)" stroke-width="2" rx="8" />
  <text x="640" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="var(--color-tertiary)">Изпълнение</text>
  
  <circle cx="640" cy="220" r="40" fill="var(--color-secondary)" opacity="0.1" stroke="var(--color-tertiary)" stroke-width="2" />
  <text x="640" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="var(--color-tertiary)">Специализирани</text>
  <text x="640" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="var(--color-tertiary)">Агенти</text>
  
  <text x="640" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-surface)" opacity="0.7">Ясни цели и задачи</text>

  <!-- Arrows -->
  <path d="M 270 250 L 290 250" stroke="var(--color-secondary)" stroke-width="2" fill="none" marker-end="url(#arrow-head)" />
  <path d="M 510 250 L 530 250" stroke="var(--color-secondary)" stroke-width="2" fill="none" marker-end="url(#arrow-head)" />

  <defs>
    <marker id="arrow-head" markerWidth="10" markerHeight="10" refX="9" refY="5" orientation="auto">
      <path d="M0,0 L0,10 L10,5 Z" fill="var(--color-secondary)" />
    </marker>
  </defs>
</svg>