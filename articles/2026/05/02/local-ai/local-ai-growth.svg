<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="500" fill="var(--color-on-surface)">Защо локалният ИИ (Local AI) расте?</text>

  <!-- Central Concept: Local AI -->
  <rect x="300" y="200" width="200" height="100" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="3" rx="12" />
  <text x="400" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="var(--color-primary)">Локален ИИ</text>

  <!-- Factor 1: Economy -->
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="60" fill="var(--color-secondary)" opacity="0.1" stroke="var(--color-primary)" stroke-width="2" />
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="var(--color-primary)">Икономика</text>
    <text x="0" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" opacity="0.7">(Облакът е скъп)</text>
  </g>

  <!-- Factor 2: Privacy -->
  <g transform="translate(700, 100)">
    <circle cx="0" cy="0" r="60" fill="var(--color-secondary)" opacity="0.1" stroke="var(--color-tertiary)" stroke-width="2" />
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="var(--color-tertiary)">Сигурност</text>
    <text x="0" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" opacity="0.7">(GDPR / Регулации)</text>
  </g>

  <!-- Factor 3: Open Weights -->
  <g transform="translate(100, 400)">
    <circle cx="0" cy="0" r="60" fill="var(--color-secondary)" opacity="0.1" stroke="var(--color-secondary)" stroke-width="2" />
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="var(--color-on-surface)">Отворени тегла</text>
    <text x="0" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" opacity="0.7">(Gemma, DeepSeek)</text>
  </g>

  <!-- Factor 4: Speed -->
  <g transform="translate(700, 400)">
    <circle cx="0" cy="0" r="60" fill="var(--color-secondary)" opacity="0.1" stroke="var(--color-primary)" stroke-width="2" />
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="var(--color-primary)">Скорост</text>
    <text x="0" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" opacity="0.7">(0 латентност)</text>
  </g>

  <!-- Connecting Lines -->
  <line x1="160" y1="140" x2="300" y2="210" stroke="var(--color-secondary)" stroke-width="2" stroke-dasharray="4" />
  <line x1="640" y1="140" x2="500" y2="210" stroke="var(--color-secondary)" stroke-width="2" stroke-dasharray="4" />
  <line x1="160" y1="360" x2="300" y2="290" stroke="var(--color-secondary)" stroke-width="2" stroke-dasharray="4" />
  <line x1="640" y1="360" x2="500" y2="290" stroke="var(--color-secondary)" stroke-width="2" stroke-dasharray="4" />

</svg>