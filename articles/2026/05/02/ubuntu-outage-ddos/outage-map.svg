<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="500" fill="var(--color-on-surface)">DDoS атака срещу Ubuntu Infrastructure</text>

  <!-- Attacker Group -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="200" height="150" fill="var(--color-surface)" stroke="var(--color-secondary)" stroke-width="2" rx="8" />
    <text x="100" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="var(--color-secondary)">Атакуваща група</text>
    <text x="100" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-surface)" opacity="0.7">„Beam“ Stressor</text>
    <text x="100" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-secondary)">Sustained DDoS</text>
  </g>

  <!-- Targeted Infrastructure -->
  <g transform="translate(450, 100)">
    <rect x="0" y="0" width="300" height="300" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2" rx="8" />
    <text x="150" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="var(--color-primary)">Ubuntu / Canonical Servers</text>
    
    <!-- Service list (Down) -->
    <rect x="20" y="60" width="260" height="30" fill="var(--color-secondary)" opacity="0.1" rx="4" />
    <text x="35" y="80" font-family="monospace" font-size="12" fill="var(--color-secondary)">security.ubuntu.com [OFFLINE]</text>
    
    <rect x="20" y="100" width="260" height="30" fill="var(--color-secondary)" opacity="0.1" rx="4" />
    <text x="35" y="120" font-family="monospace" font-size="12" fill="var(--color-secondary)">archive.ubuntu.com [OFFLINE]</text>
    
    <rect x="20" y="140" width="260" height="30" fill="var(--color-secondary)" opacity="0.1" rx="4" />
    <text x="35" y="160" font-family="monospace" font-size="12" fill="var(--color-secondary)">canonical.com [OFFLINE]</text>

    <!-- Mirror (Working) -->
    <rect x="20" y="220" width="260" height="40" fill="var(--color-tertiary)" opacity="0.1" rx="4" />
    <text x="150" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-tertiary)">✅ Mirrors: ACTIVE</text>
  </g>

  <!-- Attack Arrows -->
  <path d="M 250 225 L 440 225" stroke="var(--color-secondary)" stroke-width="4" stroke-dasharray="10,5" fill="none" marker-end="url(#arrow-secondary)" />
  <path d="M 250 225 L 440 150" stroke="var(--color-secondary)" stroke-width="2" stroke-dasharray="5,5" fill="none" />
  <path d="M 250 225 L 440 300" stroke="var(--color-secondary)" stroke-width="2" stroke-dasharray="5,5" fill="none" />

  <defs>
    <marker id="arrow-secondary" markerWidth="10" markerHeight="10" refX="9" refY="5" orientation="auto">
      <path d="M0,0 L0,10 L10,5 Z" fill="var(--color-secondary)" />
    </marker>
  </defs>
</svg>