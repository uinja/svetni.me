<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />
  
  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="500" fill="var(--color-on-surface)">Колапсът на AI Scaffolding слоя</text>
  
  <!-- Old Stack -->
  <g transform="translate(100, 120)">
    <rect x="0" y="0" width="250" height="280" fill="var(--color-surface)" stroke="var(--color-secondary)" stroke-width="2" rx="8" />
    <text x="125" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="var(--color-on-surface)" opacity="0.7">Преди (2024-2025)</text>
    
    <rect x="20" y="60" width="210" height="30" fill="var(--color-secondary)" opacity="0.1" rx="4" />
    <text x="125" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)">Query Engines</text>
    
    <rect x="20" y="100" width="210" height="30" fill="var(--color-secondary)" opacity="0.1" rx="4" />
    <text x="125" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)">Retrieval Pipelines</text>
    
    <rect x="20" y="140" width="210" height="30" fill="var(--color-secondary)" opacity="0.1" rx="4" />
    <text x="125" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)">Custom Orchestration</text>
    
    <text x="125" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-tertiary)">СЛОЖНОСТ</text>
  </g>

  <!-- New Stack -->
  <g transform="translate(450, 120)">
    <rect x="0" y="0" width="250" height="280" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2" rx="8" />
    <text x="125" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="var(--color-primary)">Сега (2026+)</text>
    
    <!-- The Model core -->
    <circle cx="125" cy="120" r="50" fill="var(--color-secondary)" opacity="0.1" stroke="var(--color-primary)" stroke-width="2" />
    <text x="125" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-primary)">Reasoning</text>
    <text x="125" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-primary)">Model</text>

    <!-- Connectors -->
    <rect x="20" y="190" width="210" height="40" fill="var(--color-surface)" stroke="var(--color-primary)" rx="4" stroke-dasharray="4" />
    <text x="125" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-primary)">MCP / Agent Skills</text>

    <text x="125" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-tertiary)">КОНТЕКСТ (The Moat)</text>
  </g>

  <!-- Transition Arrow -->
  <path d="M 360 260 L 440 260" stroke="var(--color-secondary)" stroke-width="3" fill="none" marker-end="url(#arrow-primary)" />
  
  <defs>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orientation="auto">
      <path d="M0,0 L0,10 L10,5 Z" fill="var(--color-primary)" />
    </marker>
  </defs>
</svg>