<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="500" fill="var(--color-on-surface)">Новият мобилен дизайн на Netflix: „Clips“</text>

  <!-- Mobile Phone Mockup -->
  <rect x="300" y="100" width="200" height="350" rx="20" fill="var(--color-on-surface)" />
  <rect x="310" y="110" width="180" height="330" rx="10" fill="var(--color-surface)" />
  
  <!-- Navigation Bar (Top) -->
  <rect x="310" y="110" width="180" height="30" fill="var(--color-on-surface)" opacity="0.8" />
  <text x="320" y="130" font-family="system-ui, sans-serif" font-size="10" fill="var(--color-background)">Shows</text>
  <text x="360" y="130" font-family="system-ui, sans-serif" font-size="10" fill="var(--color-background)">Movies</text>
  <text x="400" y="130" font-family="system-ui, sans-serif" font-size="10" fill="var(--color-primary)" font-weight="700">Clips</text>
  
  <!-- Clips Feed Item -->
  <rect x="320" y="150" width="160" height="240" rx="4" fill="var(--color-background)" />
  <path d="M 380 240 L 420 270 L 380 300 Z" fill="var(--color-on-surface)" opacity="0.6" /> <!-- Play Icon -->
  
  <!-- "Add to My List" Button -->
  <rect x="330" y="400" width="140" height="25" rx="12.5" fill="var(--color-primary)" />
  <text x="400" y="417" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="var(--color-background)">Add to My List</text>

  <!-- Features List (Right) -->
  <g transform="translate(530, 150)">
    <circle cx="20" cy="20" r="10" fill="var(--color-primary)" />
    <text x="40" y="25" font-family="system-ui, sans-serif" font-size="16" fill="var(--color-on-surface)">Вертикален фийд (Clips)</text>
    
    <circle cx="20" cy="60" r="10" fill="var(--color-primary)" />
    <text x="40" y="65" font-family="system-ui, sans-serif" font-size="16" fill="var(--color-on-surface)">Персонализирано откриване</text>
    
    <circle cx="20" cy="100" r="10" fill="var(--color-primary)" />
    <text x="40" y="105" font-family="system-ui, sans-serif" font-size="16" fill="var(--color-on-surface)">Бързо добавяне в списъка</text>
    
    <circle cx="20" cy="140" r="10" fill="var(--color-primary)" />
    <text x="40" y="145" font-family="system-ui, sans-serif" font-size="16" fill="var(--color-on-surface)">Лесно споделяне</text>
  </g>

  <!-- Scrolling Symbol (Left) -->
  <path d="M 250 200 Q 200 250 250 300" stroke="var(--color-secondary)" stroke-width="4" fill="none" stroke-dasharray="10,5" />
  <polygon points="245,295 250,305 255,295" fill="var(--color-secondary)" />
  <text x="180" y="255" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-surface)" opacity="0.7" text-anchor="middle">Scroll</text>

</svg>