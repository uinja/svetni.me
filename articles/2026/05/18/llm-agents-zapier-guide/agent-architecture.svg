<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orientation="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--color-primary)" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />
  
  <!-- Central Agent Box -->
  <rect x="300" y="200" width="200" height="100" rx="8" fill="var(--color-primary)" stroke="var(--color-on-surface)" stroke-width="2" />
  <text x="400" y="250" text-anchor="middle" dominant-baseline="central" fill="var(--color-on-primary)" font-weight="500" font-size="24">LLM Агент</text>
  
  <!-- Three Pillars -->
  <!-- Planning -->
  <rect x="300" y="40" width="200" height="80" rx="8" fill="var(--color-secondary)" stroke="var(--color-on-surface)" stroke-width="2" />
  <text x="400" y="80" text-anchor="middle" dominant-baseline="central" fill="var(--color-on-secondary)" font-weight="500" font-size="20">Планиране</text>
  <text x="400" y="105" text-anchor="middle" dominant-baseline="central" fill="var(--color-on-secondary)" font-size="14">(Декомпозиция, Рефлексия)</text>
  
  <!-- Memory -->
  <rect x="40" y="200" width="180" height="100" rx="8" fill="var(--color-tertiary)" stroke="var(--color-on-surface)" stroke-width="2" />
  <text x="130" y="240" text-anchor="middle" dominant-baseline="central" fill="var(--color-on-tertiary)" font-weight="500" font-size="20">Памет</text>
  <text x="130" y="270" text-anchor="middle" dominant-baseline="central" fill="var(--color-on-tertiary)" font-size="14">(Краткосрочна, Дългосрочна)</text>
  
  <!-- Tools -->
  <rect x="580" y="200" width="180" height="100" rx="8" fill="var(--color-tertiary)" stroke="var(--color-on-surface)" stroke-width="2" />
  <text x="670" y="240" text-anchor="middle" dominant-baseline="central" fill="var(--color-on-tertiary)" font-weight="500" font-size="20">Инструменти</text>
  <text x="670" y="270" text-anchor="middle" dominant-baseline="central" fill="var(--color-on-tertiary)" font-size="14">(API, Браузър, Код)</text>
  
  <!-- Arrows -->
  <!-- Planning to Agent -->
  <line x1="400" y1="120" x2="400" y2="190" stroke="var(--color-primary)" stroke-width="3" marker-end="url(#arrowhead)" />
  
  <!-- Memory to Agent (Bidirectional) -->
  <line x1="220" y1="250" x2="290" y2="250" stroke="var(--color-primary)" stroke-width="3" marker-end="url(#arrowhead)" />
  <line x1="300" y1="270" x2="230" y2="270" stroke="var(--color-primary)" stroke-width="3" marker-end="url(#arrowhead)" />
  
  <!-- Tools to Agent (Bidirectional) -->
  <line x1="580" y1="250" x2="510" y2="250" stroke="var(--color-primary)" stroke-width="3" marker-end="url(#arrowhead)" />
  <line x1="500" y1="270" x2="570" y2="270" stroke="var(--color-primary)" stroke-width="3" marker-end="url(#arrowhead)" />

</svg>
