<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <rect width="800" height="500" fill="var(--color-background)" />
  
  <!-- Left Side: Expertise -->
  <rect x="50" y="350" width="120" height="100" rx="8" fill="var(--color-primary)" />
  <text x="110" y="405" font-family="system-ui, sans-serif" font-size="20" font-weight="500" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="central">Основи</text>
  
  <rect x="220" y="150" width="120" height="300" rx="8" fill="var(--color-primary)" />
  <text x="280" y="300" font-family="system-ui, sans-serif" font-size="20" font-weight="500" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="central">Експертиза</text>

  <!-- Multiplier (AI) -->
  <circle cx="420" cy="300" r="50" fill="var(--color-secondary)" />
  <text x="420" y="295" font-family="system-ui, sans-serif" font-size="40" font-weight="bold" fill="var(--color-on-secondary)" text-anchor="middle" dominant-baseline="central">AI</text>
  <text x="420" y="325" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-secondary)" text-anchor="middle" dominant-baseline="central">Мултипликатор</text>

  <!-- Right Side: Output -->
  <rect x="520" y="320" width="120" height="130" rx="8" fill="var(--color-tertiary)" opacity="0.5" />
  <text x="580" y="385" font-family="system-ui, sans-serif" font-size="18" fill="var(--color-on-tertiary)" text-anchor="middle" dominant-baseline="central">MVP / Бъгове</text>
  
  <rect x="650" y="50" width="120" height="400" rx="8" fill="var(--color-tertiary)" />
  <text x="710" y="250" font-family="system-ui, sans-serif" font-size="20" font-weight="500" fill="var(--color-on-tertiary)" text-anchor="middle" dominant-baseline="central" transform="rotate(-90, 710, 250)">Висока продуктивност</text>

  <!-- Labels -->
  <text x="110" y="475" font-family="system-ui, sans-serif" font-size="16" fill="var(--color-on-surface)" text-anchor="middle">Технически умения</text>
  <text x="280" y="475" font-family="system-ui, sans-serif" font-size="16" fill="var(--color-on-surface)" text-anchor="middle">Дълбоки познания</text>
  <text x="645" y="475" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="var(--color-primary)" text-anchor="middle">Резултат с AI</text>

  <!-- Title -->
  <text x="400" y="40" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="var(--color-primary)" text-anchor="middle">Изкуственият интелект като множител</text>
</svg>
