<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="400" fill="#ffffff" />
  
  <!-- Legacy Side (Human-Centric) -->
  <rect x="50" y="100" width="250" height="200" rx="10" fill="#f8f9fa" stroke="#202124" stroke-width="2" />
  <text x="175" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#202124">Human-Centric (Legacy)</text>
  
  <!-- Table representation -->
  <line x1="70" y1="140" x2="280" y2="140" stroke="#202124" stroke-width="2" />
  <line x1="70" y1="180" x2="280" y2="180" stroke="#202124" stroke-width="1" stroke-dasharray="4" />
  <line x1="70" y1="220" x2="280" y2="220" stroke="#202124" stroke-width="1" stroke-dasharray="4" />
  <line x1="70" y1="260" x2="280" y2="260" stroke="#202124" stroke-width="1" stroke-dasharray="4" />
  <line x1="140" y1="110" x2="140" y2="290" stroke="#202124" stroke-width="1" />
  <line x1="210" y1="110" x2="210" y2="290" stroke="#202124" stroke-width="1" />
  
  <text x="175" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a30ae">Tables / UIs / High Latency</text>

  <!-- Transformation Arrow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a30ae" />
    </marker>
  </defs>
  <line x1="320" y1="200" x2="460" y2="200" stroke="#1a30ae" stroke-width="4" marker-end="url(#arrowhead)" />
  <text x="395" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a30ae">MCP / Data Fabric</text>

  <!-- Agent-Ready Side (Modern) -->
  <rect x="500" y="100" width="250" height="200" rx="10" fill="#f8f9fa" stroke="#1a30ae" stroke-width="2" />
  <text x="625" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#202124">Agent-Ready (Modern)</text>
  
  <!-- Knowledge Graph representation -->
  <circle cx="580" y="150" r="10" fill="#1a30ae" />
  <circle cx="670" y="160" r="10" fill="#1a30ae" />
  <circle cx="610" y="240" r="10" fill="#1a30ae" />
  <circle cx="550" y="220" r="10" fill="#1a30ae" />
  <circle cx="690" y="230" r="10" fill="#1a30ae" />
  
  <line x1="580" y1="150" x2="670" y2="160" stroke="#1a30ae" stroke-width="2" />
  <line x1="580" y1="150" x2="610" y2="240" stroke="#1a30ae" stroke-width="2" />
  <line x1="580" y1="150" x2="550" y2="220" stroke="#1a30ae" stroke-width="2" />
  <line x1="670" y1="160" x2="610" y2="240" stroke="#1a30ae" stroke-width="2" />
  <line x1="610" y1="240" x2="690" y2="230" stroke="#1a30ae" stroke-width="2" />
  <line x1="670" y1="160" x2="690" y2="230" stroke="#1a30ae" stroke-width="2" />

  <text x="625" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a30ae">Knowledge Graphs / APIs / Sub-second</text>
</svg>
