<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="var(--color-on-surface)">Поддръжка на Отворен Стандарт: Родна срещу Преводна</text>

  <!-- Left Column: Translation-based -->
  <rect x="40" y="70" width="330" height="360" fill="var(--color-surface)" stroke="var(--color-tertiary)" stroke-width="2" rx="8" />
  <text x="205" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-tertiary)">ПРЕВОДЕН МОДЕЛ (НЕСУВЕРЕН)</text>
  
  <!-- Box L1 -->
  <rect x="65" y="130" width="280" height="60" fill="var(--color-background)" stroke="var(--color-on-surface)" stroke-width="1" stroke-opacity="0.3" rx="6" />
  <text x="205" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="var(--color-on-surface)">Проприетарно ядро (напр. OOXML / .docx)</text>
  <text x="205" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="var(--color-on-surface)" opacity="0.6">Документът живее в чужд формат вътрешно</text>

  <!-- Box L2 -->
  <rect x="65" y="230" width="280" height="60" fill="var(--color-background)" stroke="var(--color-tertiary)" stroke-width="1.5" rx="6" />
  <text x="205" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="var(--color-tertiary)">Преводачески слой (Куртоазен импорт/експорт)</text>
  <text x="205" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="var(--color-on-surface)" opacity="0.6">Риск от загуба на форматиране и метаданни</text>

  <!-- Box L3 -->
  <rect x="65" y="330" width="280" height="60" fill="var(--color-background)" stroke="var(--color-on-surface)" stroke-width="1" stroke-opacity="0.3" rx="6" />
  <text x="205" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="var(--color-on-surface)">Външен ODF файл (.odt)</text>
  <text x="205" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="var(--color-on-surface)" opacity="0.6">Чете се само като компромис за съвместимост</text>

  <!-- Right Column: Native -->
  <rect x="430" y="70" width="330" height="360" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2" rx="8" />
  <text x="595" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-primary)">РОДЕН (NATIVE) МОДЕЛ (СУВЕРЕН)</text>
  
  <!-- Box R1 -->
  <rect x="455" y="130" width="280" height="60" fill="var(--color-background)" stroke="var(--color-on-surface)" stroke-width="1" stroke-opacity="0.3" rx="6" />
  <text x="595" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="var(--color-on-surface)">Отворено ODF ядро (родна архитектура)</text>
  <text x="595" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="var(--color-on-surface)" opacity="0.6">Документът се обработва според отворения стандарт</text>

  <!-- Box R2 -->
  <rect x="455" y="230" width="280" height="60" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="1.5" rx="6" />
  <text x="595" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="var(--color-primary)">Директно записване без превод</text>
  <text x="595" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="var(--color-on-surface)" opacity="0.6">Пълна съвместимост без изкривяване на данни</text>

  <!-- Box R3 -->
  <rect x="455" y="330" width="280" height="60" fill="var(--color-background)" stroke="var(--color-on-surface)" stroke-width="1" stroke-opacity="0.3" rx="6" />
  <text x="595" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="var(--color-on-surface)">Роден ODF файл (.odt)</text>
  <text x="595" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="var(--color-on-surface)" opacity="0.6">Създаден, съхраняван и четен в родната си среда</text>

  <!-- Arrows (Left Column) -->
  <path d="M 205 190 L 205 230" stroke="var(--color-tertiary)" stroke-width="1.5" fill="none" marker-end="url(#arrow-head)" />
  <path d="M 205 290 L 205 330" stroke="var(--color-tertiary)" stroke-width="1.5" fill="none" marker-end="url(#arrow-head)" />

  <!-- Arrows (Right Column) -->
  <path d="M 595 190 L 595 230" stroke="var(--color-primary)" stroke-width="1.5" fill="none" marker-end="url(#arrow-head)" />
  <path d="M 595 290 L 595 330" stroke="var(--color-primary)" stroke-width="1.5" fill="none" marker-end="url(#arrow-head)" />

  <!-- Under-text (Left) -->
  <text x="205" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="var(--color-tertiary)">Загуба на детайли | Технологична зависимост</text>

  <!-- Under-text (Right) -->
  <text x="595" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="var(--color-primary)">100% точност | Технологична независимост</text>

  <defs>
    <marker id="arrow-head" markerWidth="6" markerHeight="6" refX="5" refY="3" orientation="auto">
      <path d="M0,0 L0,6 L6,3 Z" fill="var(--color-on-surface)" />
    </marker>
  </defs>
</svg>
