<svg width="100%" height="100%" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <defs>
    <!-- Arrow Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a30ae" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff" rx="15" />

  <!-- Title/Header of the diagram -->
  <text x="400" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#202124" text-anchor="middle">
    Архитектура и поток на работа с Google Colab CLI
  </text>

  <!-- 1. Local Environment Column -->
  <rect x="40" y="70" width="220" height="380" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1.5" rx="12" />
  <text x="150" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1a30ae" text-anchor="middle">
    Локална среда (Local)
  </text>

  <!-- Developer Node -->
  <rect x="60" y="120" width="180" height="70" fill="#ffffff" stroke="#1a30ae" stroke-width="1.5" rx="8" />
  <text x="150" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#202124" text-anchor="middle">
    Разработчик
  </text>
  <text x="150" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#707070" text-anchor="middle">
    Терминал / Скриптове
  </text>

  <!-- AI Agent Node -->
  <rect x="60" y="220" width="180" height="70" fill="#ffffff" stroke="#1a30ae" stroke-width="1.5" rx="8" />
  <text x="150" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#202124" text-anchor="middle">
    AI Агент
  </text>
  <text x="150" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#707070" text-anchor="middle">
    Antigravity / Claude Code
  </text>

  <!-- Local Files / CLI Config -->
  <rect x="60" y="320" width="180" height="70" fill="#ffffff" stroke="#1a30ae" stroke-width="1.5" rx="8" />
  <text x="150" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#202124" text-anchor="middle">
    Локални файлове
  </text>
  <text x="150" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#707070" text-anchor="middle">
    ~/.config/colab-cli
  </text>

  <!-- 2. CLI Interface Column -->
  <rect x="290" y="70" width="220" height="380" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1.5" rx="12" />
  <text x="400" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1a30ae" text-anchor="middle">
    Google Colab CLI
  </text>

  <!-- Command categories -->
  <g>
    <!-- Provision & Lifecycle -->
    <rect x="305" y="115" width="190" height="45" fill="#1a30ae" rx="6" />
    <text x="400" y="133" font-family="monospace" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">
      colab new / stop / status
    </text>
    <text x="400" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#ffffff" fill-opacity="0.8" text-anchor="middle">
      Управление на сесиите
    </text>

    <!-- Execution -->
    <rect x="305" y="175" width="190" height="45" fill="#1a30ae" rx="6" />
    <text x="400" y="193" font-family="monospace" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">
      colab run / exec / repl
    </text>
    <text x="400" y="208" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#ffffff" fill-opacity="0.8" text-anchor="middle">
      Изпълнение на код
    </text>

    <!-- File Ops -->
    <rect x="305" y="235" width="190" height="45" fill="#1a30ae" rx="6" />
    <text x="400" y="253" font-family="monospace" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">
      colab upload / download
    </text>
    <text x="400" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#ffffff" fill-opacity="0.8" text-anchor="middle">
      Трансфер на файлове
    </text>

    <!-- Utilities -->
    <rect x="305" y="295" width="190" height="45" fill="#1a30ae" rx="6" />
    <text x="400" y="313" font-family="monospace" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">
      colab auth / drivemount
    </text>
    <text x="400" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#ffffff" fill-opacity="0.8" text-anchor="middle">
      Упълномощаване &amp; Диск
    </text>

    <!-- Keep Alive Daemon -->
    <rect x="305" y="355" width="190" height="45" fill="#ffffff" stroke="#1a30ae" stroke-width="1" rx="6" />
    <text x="400" y="373" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a30ae" text-anchor="middle">
      Keep-Alive Daemon
    </text>
    <text x="400" y="388" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#707070" text-anchor="middle">
      Поддържане на сесията активна
    </text>
  </g>

  <!-- 3. Remote Runtime Column -->
  <rect x="540" y="70" width="220" height="380" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1.5" rx="12" />
  <text x="650" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1a30ae" text-anchor="middle">
    Отдалечена Colab среда
  </text>

  <!-- Jupyter Kernel Node -->
  <rect x="560" y="120" width="180" height="70" fill="#ffffff" stroke="#1a30ae" stroke-width="1.5" rx="8" />
  <text x="650" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#202124" text-anchor="middle">
    Jupyter Kernel
  </text>
  <text x="650" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#707070" text-anchor="middle">
    Изпълнение на Python
  </text>

  <!-- GPU / TPU Node -->
  <rect x="560" y="220" width="180" height="70" fill="#ffffff" stroke="#1a30ae" stroke-width="1.5" rx="8" />
  <text x="650" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#202124" text-anchor="middle">
    GPU / TPU Ускорители
  </text>
  <text x="650" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#707070" text-anchor="middle">
    T4, L4, A100, TPU v5e/v6e
  </text>

  <!-- Cloud Storage Node -->
  <rect x="560" y="320" width="180" height="70" fill="#ffffff" stroke="#1a30ae" stroke-width="1.5" rx="8" />
  <text x="650" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#202124" text-anchor="middle">
    Google Drive / GCP
  </text>
  <text x="650" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#707070" text-anchor="middle">
    /content/drive
  </text>

  <!-- Connections -->
  <!-- Local Dev to CLI -->
  <path d="M 240 155 L 305 137.5" stroke="#1a30ae" stroke-width="1.5" stroke-dasharray="3,3" fill="none" marker-end="url(#arrow)" />
  <path d="M 240 255 L 305 197.5" stroke="#1a30ae" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />
  <path d="M 240 355 L 305 257.5" stroke="#1a30ae" stroke-width="1.5" stroke-dasharray="3,3" fill="none" marker-end="url(#arrow)" />

  <!-- CLI to Remote VM -->
  <path d="M 495 137.5 L 560 155" stroke="#1a30ae" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />
  <path d="M 495 197.5 L 560 155" stroke="#1a30ae" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />
  <path d="M 495 257.5 L 560 355" stroke="#1a30ae" stroke-width="1.5" stroke-dasharray="3,3" fill="none" marker-end="url(#arrow)" />
  <path d="M 495 317.5 L 560 355" stroke="#1a30ae" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />

  <!-- Inside Remote Connections -->
  <path d="M 650 190 L 650 220" stroke="#707070" stroke-width="1" stroke-dasharray="2,2" fill="none" />
  <path d="M 650 290 L 650 320" stroke="#707070" stroke-width="1" stroke-dasharray="2,2" fill="none" />
</svg>
