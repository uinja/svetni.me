<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f8f9fa;
      --border: #e2e8f0;
      --text: #1a202c;
      --text-muted: #718096;
      --primary: #1a30ae;
      --accent: #1b31ae;
      --success: #2f855a;
      --highlight: #fac832;
      --shadow: rgba(0, 0, 0, 0.05);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #191d28;
        --surface: #222838;
        --border: #2e3748;
        --text: #e5e0d6;
        --text-muted: #9ca3af;
        --primary: #9ec2ff;
        --accent: #60a5fa;
        --success: #48bb78;
        --highlight: #ffd56a;
        --shadow: rgba(0, 0, 0, 0.3);
      }
    }
    rect, circle, path {
      transition: fill 0.3s, stroke 0.3s;
    }
    text {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: fill 0.3s;
    }
    .pill {
      font-size: 11px;
      font-weight: 600;
    }
  </style>
  
  <defs>
    <!-- Shadow Filter -->
    <filter id="box-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    
    <!-- Arrow Markers -->
    <marker id="arrow-right" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="var(--text)"/>
    </marker>
    <marker id="arrow-left" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="var(--primary)"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="var(--bg)" rx="16"/>

  <!-- Title & Subtitle -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="800" fill="var(--text)">Qwen-AgentWorld: Двупосочен Агентен Цикъл</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="var(--text-muted)">Взаимодействие между вземащия решения Агент и Световния модел (Симулатор на среди)</text>

  <!-- Left Column: Agent Model Box -->
  <g filter="url(#box-shadow)">
    <rect x="60" y="90" width="260" height="260" rx="16" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
  </g>
  <text x="190" y="125" text-anchor="middle" font-size="16" font-weight="700" fill="var(--text)">АГЕНТЕН МОДЕЛ</text>
  <text x="190" y="143" text-anchor="middle" font-size="11" fill="var(--text-muted)">Решения и Изпълнение (Policy)</text>
  
  <!-- Agent Model Inner Parts -->
  <rect x="80" y="170" width="220" height="50" rx="8" fill="var(--bg)" stroke="var(--border)" stroke-width="1"/>
  <text x="190" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="var(--text)">Планиране (Planning)</text>
  
  <rect x="80" y="235" width="220" height="50" rx="8" fill="var(--bg)" stroke="var(--border)" stroke-width="1"/>
  <text x="190" y="265" text-anchor="middle" font-size="13" font-weight="600" fill="var(--text)">Генериране на действия</text>
  
  <text x="190" y="325" text-anchor="middle" font-size="10.5" fill="var(--text-muted)">Базов агент (напр. Qwen-2.5-Instruct)</text>

  <!-- Connection Arrows -->
  <!-- Top Arrow (Action) -->
  <path d="M 320 180 L 470 180" stroke="var(--text)" stroke-width="2.5" fill="none" stroke-dasharray="1, 0" marker-end="url(#arrow-right)"/>
  <text x="395" y="168" text-anchor="middle" font-size="11.5" font-weight="700" fill="var(--text)">Действие (Action) a_t</text>

  <!-- Bottom Arrow (Observation/Reward) -->
  <path d="M 480 270 L 330 270" stroke="var(--primary)" stroke-width="2.5" fill="none" marker-end="url(#arrow-left)"/>
  <text x="405" y="295" text-anchor="middle" font-size="11.5" font-weight="700" fill="var(--primary)">Наблюдение o_t+1 + Награда r_t+1</text>

  <!-- Right Column: World Model Box (Qwen-AgentWorld) -->
  <g filter="url(#box-shadow)">
    <rect x="480" y="90" width="260" height="260" rx="16" fill="var(--surface)" stroke="var(--primary)" stroke-width="2"/>
  </g>
  <text x="610" y="125" text-anchor="middle" font-size="16" font-weight="700" fill="var(--primary)">Qwen-AgentWorld</text>
  <text x="610" y="143" text-anchor="middle" font-size="11" fill="var(--text-muted)">Езиков световен модел (Simulator)</text>

  <!-- CoT Reasoning Block -->
  <rect x="500" y="170" width="220" height="45" rx="8" fill="var(--bg)" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="610" y="197" text-anchor="middle" font-size="12" font-weight="700" fill="var(--accent)">Дълъг мисловен процес (CoT)</text>

  <!-- 7 Simulated Domains Grid -->
  <!-- Col 1 -->
  <rect x="505" y="230" width="65" height="22" rx="4" fill="var(--bg)" stroke="var(--border)" stroke-width="1"/>
  <text x="537.5" y="245" text-anchor="middle" fill="var(--text)" class="pill">MCP</text>

  <rect x="505" y="260" width="65" height="22" rx="4" fill="var(--bg)" stroke="var(--border)" stroke-width="1"/>
  <text x="537.5" y="275" text-anchor="middle" fill="var(--text)" class="pill">SWE</text>

  <rect x="505" y="290" width="65" height="22" rx="4" fill="var(--bg)" stroke="var(--border)" stroke-width="1"/>
  <text x="537.5" y="305" text-anchor="middle" fill="var(--text)" class="pill">OS</text>

  <!-- Col 2 -->
  <rect x="577.5" y="230" width="65" height="22" rx="4" fill="var(--bg)" stroke="var(--border)" stroke-width="1"/>
  <text x="610" y="245" text-anchor="middle" fill="var(--text)" class="pill">Search</text>

  <rect x="577.5" y="260" width="65" height="22" rx="4" fill="var(--bg)" stroke="var(--border)" stroke-width="1"/>
  <text x="610" y="275" text-anchor="middle" fill="var(--text)" class="pill">Android</text>

  <!-- Col 3 -->
  <rect x="650" y="230" width="65" height="22" rx="4" fill="var(--bg)" stroke="var(--border)" stroke-width="1"/>
  <text x="682.5" y="245" text-anchor="middle" fill="var(--text)" class="pill">Terminal</text>

  <rect x="650" y="260" width="65" height="22" rx="4" fill="var(--bg)" stroke="var(--border)" stroke-width="1"/>
  <text x="682.5" y="275" text-anchor="middle" fill="var(--text)" class="pill">Web</text>

  <!-- Training Pipeline Footer -->
  <line x1="150" y1="395" x2="650" y2="395" stroke="var(--border)" stroke-width="2"/>
  
  <circle cx="150" cy="395" r="6" fill="var(--accent)"/>
  <text x="150" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="var(--text)">1. CPT</text>
  <text x="150" y="428" text-anchor="middle" font-size="9" fill="var(--text-muted)">Знание за състоянията</text>

  <circle cx="400" cy="395" r="6" fill="var(--accent)"/>
  <text x="400" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="var(--text)">2. SFT</text>
  <text x="400" y="428" text-anchor="middle" font-size="9" fill="var(--text-muted)">Активиране на предвиждане</text>

  <circle cx="650" cy="395" r="6" fill="var(--success)"/>
  <text x="650" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="var(--text)">3. RL (Награди)</text>
  <text x="650" y="428" text-anchor="middle" font-size="9" fill="var(--text-muted)">Повишаване на верността</text>
</svg>
