<svg width="100%" height="100%" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <style>
    .node-rect {
      fill: var(--color-surface);
      stroke: var(--color-primary);
      stroke-width: 2;
      rx: 8;
      ry: 8;
    }
    .node-text {
      fill: var(--color-on-surface);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-anchor: middle;
    }
    .node-title {
      font-weight: bold;
      fill: var(--color-primary);
    }
    .arrow-line {
      stroke: var(--color-secondary);
      stroke-width: 2;
      fill: none;
      marker-end: url(#arrow);
    }
    .highlight-rect {
      fill: #e8f5e9;
      stroke: #2e7d32;
      stroke-width: 2;
      rx: 8;
      ry: 8;
    }
    .highlight-text {
      fill: #1b5e20;
    }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="var(--color-secondary)" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="var(--color-background)" />

  <!-- Flowchart Elements -->
  
  <!-- Step 1: Input -->
  <g transform="translate(40, 50)">
    <rect class="node-rect" width="220" height="60" />
    <text x="110" y="27" class="node-text node-title">Входен текст</text>
    <text x="110" y="45" class="node-text">(Сурови текстови токени)</text>
  </g>

  <!-- Step 2: Chunking -->
  <g transform="translate(40, 150)">
    <rect class="node-rect" width="220" height="60" />
    <text x="110" y="27" class="node-text node-title">Разделяне на прозорци</text>
    <text x="110" y="45" class="node-text">Прозорец W = 1024 токена</text>
  </g>

  <!-- Step 3: Encoder -->
  <g transform="translate(40, 250)">
    <rect class="node-rect" width="220" height="60" />
    <text x="110" y="27" class="node-text node-title">0.6B Енкодер</text>
    <text x="110" y="45" class="node-text">Qwen3-Embedding-0.6B (Causal)</text>
  </g>

  <!-- Step 4: Hidden States -->
  <g transform="translate(40, 350)">
    <rect class="node-rect" width="220" height="60" />
    <text x="110" y="27" class="node-text node-title">Скрити състояния</text>
    <text x="110" y="45" class="node-text">Вектори на състоянията на токените</text>
  </g>

  <!-- Step 5: Pooling -->
  <g transform="translate(350, 350)">
    <rect class="node-rect" width="220" height="60" />
    <text x="110" y="27" class="node-text node-title">Групиране (Pooling)</text>
    <text x="110" y="45" class="node-text">Mean / Concat Pooling</text>
  </g>

  <!-- Step 6: Soft Tokens (Highlight) -->
  <g transform="translate(350, 250)">
    <rect class="highlight-rect" width="220" height="60" />
    <text x="110" y="27" class="node-text node-title highlight-text">Меки токени (Soft Tokens)</text>
    <text x="110" y="45" class="node-text highlight-text">Компресиран латентен контекст (1:16)</text>
  </g>

  <!-- Step 7: MLP Adapter -->
  <g transform="translate(350, 150)">
    <rect class="node-rect" width="220" height="60" />
    <text x="110" y="27" class="node-text node-title">MLP Адаптер</text>
    <text x="110" y="45" class="node-text">Проекция на скритата размерност</text>
  </g>

  <!-- Step 8: Decoder -->
  <g transform="translate(350, 50)">
    <rect class="node-rect" width="220" height="60" />
    <text x="110" y="27" class="node-text node-title">4B Декодер</text>
    <text x="110" y="45" class="node-text">Qwen3-4B-Instruct-2507</text>
  </g>

  <!-- Instructions (Side Input) -->
  <g transform="translate(620, 50)">
    <rect class="node-rect" width="150" height="60" stroke-dasharray="4" />
    <text x="75" y="27" class="node-text node-title">Инструкции</text>
    <text x="75" y="45" class="node-text">(Некомпресирани)</text>
  </g>

  <!-- Connections -->
  <!-- Step 1 -> Step 2 -->
  <path d="M 150 110 L 150 140" class="arrow-line" />
  
  <!-- Step 2 -> Step 3 -->
  <path d="M 150 210 L 150 240" class="arrow-line" />

  <!-- Step 3 -> Step 4 -->
  <path d="M 150 310 L 150 340" class="arrow-line" />

  <!-- Step 4 -> Step 5 -->
  <path d="M 260 380 L 340 380" class="arrow-line" />

  <!-- Step 5 -> Step 6 -->
  <path d="M 460 350 L 460 320" class="arrow-line" />

  <!-- Step 6 -> Step 7 -->
  <path d="M 460 250 L 460 220" class="arrow-line" />

  <!-- Step 7 -> Step 8 -->
  <path d="M 460 150 L 460 120" class="arrow-line" />

  <!-- Instructions -> Decoder -->
  <path d="M 620 80 L 580 80" class="arrow-line" />
</svg>
