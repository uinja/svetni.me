<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15" />
    </filter>
    
    <!-- Marker for Arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#49454F" />
    </marker>
  </defs>

  <!-- Background Canvas -->
  <rect width="800" height="500" rx="16" fill="#F8F9FA" stroke="#E6EAF4" stroke-width="2" />

  <!-- Diagram Title -->
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F">Хибридна Агентна Архитектура (Worker-Advisor)</text>
  <text x="400" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#625B71" font-weight="400">Harvey &amp; Fireworks AI: Оптимизация на качество и разходи</text>

  <!-- Section Divider Lines (Optional, but looks nice) -->
  <line x1="50" y1="85" x2="750" y2="85" stroke="#E6EAF4" stroke-width="1" />

  <!-- ==================== NODES ==================== -->

  <!-- Node 1: Input (User Request) -->
  <g filter="url(#shadow)">
    <rect x="50" y="210" width="160" height="80" rx="8" fill="#E8DEF8" stroke="#6750A4" stroke-width="2" />
    <text x="130" y="240" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#21005D">Входна задача</text>
    <text x="130" y="262" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="12" fill="#21005D">Правен казус / запитване</text>
  </g>

  <!-- Node 2: Worker (GLM 5.1) -->
  <g filter="url(#shadow)">
    <rect x="300" y="200" width="200" height="100" rx="8" fill="#D0BCFF" stroke="#6750A4" stroke-width="2" />
    <text x="400" y="230" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#21005D">Работен модел (Worker)</text>
    <text x="400" y="252" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6750A4">GLM 5.1 (Отворен)</text>
    <text x="400" y="274" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="11" fill="#21005D">Обработва основния обем от задачи</text>
  </g>

  <!-- Node 3: Advisor (Claude Opus 4.7) -->
  <g filter="url(#shadow)">
    <rect x="300" y="100" width="200" height="70" rx="8" fill="#FCE8E6" stroke="#BA1A1A" stroke-width="2" />
    <text x="400" y="125" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#410002">Съветник (Advisor)</text>
    <text x="400" y="145" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#BA1A1A">Claude Opus 4.7 (Frontier)</text>
  </g>

  <!-- Node 4: Legal Tools & Database -->
  <g filter="url(#shadow)">
    <rect x="300" y="330" width="200" height="70" rx="8" fill="#C2E7FF" stroke="#004A77" stroke-width="2" />
    <text x="400" y="355" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#001D35">Външни Инструменти</text>
    <text x="400" y="375" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="12" fill="#003355">Правна база данни / Търсене</text>
  </g>

  <!-- Node 5: Output (Final Response) -->
  <g filter="url(#shadow)">
    <rect x="590" y="210" width="160" height="80" rx="8" fill="#E2F3E9" stroke="#146C36" stroke-width="2" />
    <text x="670" y="240" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A3318">Краен отговор</text>
    <text x="670" y="262" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="12" fill="#0A3318">Високо качество (18/100)</text>
  </g>

  <!-- ==================== FLOW ARROWS ==================== -->

  <!-- Flow 1: Input to Worker -->
  <line x1="210" y1="250" x2="292" y2="250" stroke="#49454F" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Flow 2: Worker to Advisor (Escalation) -->
  <path d="M 390 200 L 390 178" stroke="#BA1A1A" stroke-width="2" marker-end="url(#arrow)" />
  <text x="340" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#BA1A1A">Консултация</text>

  <!-- Flow 3: Advisor to Worker (Guidance) -->
  <path d="M 410 170 L 410 192" stroke="#146C36" stroke-width="2" marker-end="url(#arrow)" />
  <text x="460" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#146C36">Решение / Насоки</text>

  <!-- Flow 4: Worker to Legal Tools (Query) -->
  <path d="M 390 300 L 390 322" stroke="#49454F" stroke-width="1.5" marker-end="url(#arrow)" />
  
  <!-- Flow 5: Legal Tools to Worker (Context) -->
  <path d="M 410 330 L 410 308" stroke="#49454F" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Flow 6: Worker to Output -->
  <line x1="500" y1="250" x2="582" y2="250" stroke="#49454F" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Cost & Performance Badge -->
  <g filter="url(#shadow)">
    <rect x="250" y="420" width="300" height="50" rx="25" fill="#ECEFF1" stroke="#CFD8DC" stroke-width="1.5" />
    <text x="400" y="445" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#37474F">
      Ефективност: 2.6х по-ниска цена ($368 vs $954)
    </text>
  </g>
</svg>
