<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Definitions for filters and markers -->
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#202124" flood-opacity="0.08"/>
    </filter>
    <!-- Arrow Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a30ae" />
    </marker>
  </defs>

  <style>
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 20px; font-weight: 700; fill: #202124; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #606060; }
    .card-title { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 700; }
    .card-text { font-family: system-ui, -apple-system, sans-serif; font-size: 11.5px; fill: #202124; line-height: 1.5; }
    .card-text-primary { font-family: system-ui, -apple-system, sans-serif; font-size: 11.5px; fill: #ffffff; line-height: 1.5; }
    .rec-title { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a30ae; }
    .rec-item-title { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 600; fill: #202124; }
    .rec-item-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 10.5px; fill: #606060; }
  </style>

  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff" />
  
  <!-- Header -->
  <text x="40" y="50" class="title">Meta vs. NSO Group: Сигурност и правни мерки</text>
  <text x="40" y="72" class="subtitle">Спиране на шпионски кампании в WhatsApp и завеждане на иск за неуважение към съда</text>

  <!-- Flow Steps -->
  
  <!-- Step 1: Campaign -->
  <g filter="url(#shadow)">
    <rect x="40" y="110" width="210" height="150" rx="12" fill="#f8f9fa" stroke="#1a30ae" stroke-width="1.5" />
    <path d="M 40 122 A 12 12 0 0 1 52 110 L 238 110 A 12 12 0 0 1 250 122 L 250 145 L 40 145 Z" fill="#1e33af" />
    <text x="55" y="132" fill="#ffffff" class="card-title">1. Шпионска кампания</text>
    
    <!-- Warning Icon -->
    <path d="M 55 170 L 65 152 L 75 170 Z M 65 160 L 65 165" stroke="#d93025" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" fill="none" />
    <circle cx="65" cy="167" r="1" fill="#d93025" />
    
    <text x="55" y="195" class="card-text" font-weight="600">Опити за спеър-фишинг:</text>
    <text x="55" y="210" class="card-text">• Изпращане на злонамерени</text>
    <text x="65" y="223" class="card-text">линкове (1-click phishing)</text>
    <text x="55" y="238" class="card-text">• Създаване на тестови профили</text>
  </g>

  <!-- Connector 1 -> 2 -->
  <line x1="265" y1="185" x2="280" y2="185" stroke="#1a30ae" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 2: Defense -->
  <g filter="url(#shadow)">
    <rect x="295" y="110" width="210" height="150" rx="12" fill="#f8f9fa" stroke="#1a30ae" stroke-width="1.5" />
    <path d="M 295 122 A 12 12 0 0 1 307 110 L 493 110 A 12 12 0 0 1 505 122 L 505 145 L 295 145 Z" fill="#1e33af" />
    <text x="310" y="132" fill="#ffffff" class="card-title">2. Защита на WhatsApp</text>
    
    <!-- Shield Icon -->
    <path d="M 315 155 L 322 152 L 329 155 L 329 162 C 329 168 322 172 322 172 C 322 172 315 168 315 162 Z" fill="none" stroke="#1b31ae" stroke-width="2" />
    
    <text x="310" y="195" class="card-text" font-weight="600">Неутрализиране на заплахата:</text>
    <text x="310" y="210" class="card-text">• Блокирани злонамерени линкове</text>
    <text x="310" y="223" class="card-text">• Премахнати тестови акаунти</text>
    <text x="310" y="238" class="card-text">• Споделени заплахи (домейни)</text>
  </g>

  <!-- Connector 2 -> 3 -->
  <line x1="520" y1="185" x2="535" y2="185" stroke="#1a30ae" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 3: Action -->
  <g filter="url(#shadow)">
    <rect x="550" y="110" width="210" height="150" rx="12" fill="#1a30ae" stroke="#1a30ae" stroke-width="1.5" />
    <path d="M 550 122 A 12 12 0 0 1 562 110 L 748 110 A 12 12 0 0 1 760 122 L 760 145 L 550 145 Z" fill="#1e33af" />
    <text x="565" y="132" fill="#ffffff" class="card-title">3. Правен отговор</text>
    
    <!-- Gavel/Court Icon -->
    <path d="M 570 168 L 585 153 M 573 156 L 579 162 M 581 153 L 584 156" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
    <path d="M 567 170 L 577 170" stroke="#ffffff" stroke-width="2" />
    
    <text x="565" y="195" class="card-text-primary" font-weight="600">Иск за неуважение към съда:</text>
    <text x="565" y="210" class="card-text-primary">• Нарушаване на забраната от 2025 г.</text>
    <text x="565" y="223" class="card-text-primary">• Искане на санкции от САЩ</text>
    <text x="565" y="238" class="card-text-primary">• Защита на суверенитета на кода</text>
  </g>

  <!-- User Security Recommendations Box -->
  <g filter="url(#shadow)">
    <rect x="40" y="295" width="720" height="165" rx="12" fill="#f8f9fa" stroke="#1e33af" stroke-width="1.5" stroke-dasharray="5 4" />
    <text x="60" y="325" class="rec-title">ПРЕПОРЪКИ ЗА КИБЕРСИГУРНОСТ НА ПОТРЕБИТЕЛИТЕ</text>
    
    <!-- Rec 1 -->
    <g transform="translate(60, 345)">
      <!-- Check/Shield Icon -->
      <circle cx="15" cy="15" r="12" fill="#1a30ae" opacity="0.1" />
      <path d="M 10 15 L 14 19 L 20 11" fill="none" stroke="#1a30ae" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <text x="35" y="13" class="rec-item-title">Редовно обновяване</text>
      <text x="35" y="27" class="rec-item-desc">Актуализирайте приложението</text>
      <text x="35" y="40" class="rec-item-desc">и OS на вашето устройство</text>
    </g>
    
    <!-- Rec 2 -->
    <g transform="translate(235, 345)">
      <circle cx="15" cy="15" r="12" fill="#1a30ae" opacity="0.1" />
      <path d="M 10 15 L 14 19 L 20 11" fill="none" stroke="#1a30ae" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <text x="35" y="13" class="rec-item-title">Двуфакторна защита (2FA)</text>
      <text x="35" y="27" class="rec-item-desc">Включете 2-стъпковото</text>
      <text x="35" y="40" class="rec-item-desc">потвърждаване в профила</text>
    </g>

    <!-- Rec 3 -->
    <g transform="translate(420, 345)">
      <circle cx="15" cy="15" r="12" fill="#1a30ae" opacity="0.1" />
      <path d="M 10 15 L 14 19 L 20 11" fill="none" stroke="#1a30ae" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <text x="35" y="13" class="rec-item-title">Спиране на визуализации</text>
      <text x="35" y="27" class="rec-item-desc">Изключете Link Previews в</text>
      <text x="35" y="40" class="rec-item-desc">настройките на WhatsApp</text>
    </g>

    <!-- Rec 4 -->
    <g transform="translate(600, 345)">
      <circle cx="15" cy="15" r="12" fill="#1a30ae" opacity="0.1" />
      <path d="M 10 15 L 14 19 L 20 11" fill="none" stroke="#1a30ae" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <text x="35" y="13" class="rec-item-title">Лични данни за контакти</text>
      <text x="35" y="27" class="rec-item-desc">Скрийте профилната снимка</text>
      <text x="35" y="40" class="rec-item-desc">и статуса си от непознати</text>
    </g>
  </g>
</svg>
