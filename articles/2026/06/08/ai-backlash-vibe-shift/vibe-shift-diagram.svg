<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 8 5 L 0 8 z" fill="var(--color-primary, #1a30ae)" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="var(--color-surface, #f8f9fa)" rx="16" />

  <!-- Main Title -->
  <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="var(--color-primary, #1a30ae)" text-anchor="middle" dominant-baseline="central">Хронология на големия обрат в ИИ (2025 - 2026)</text>

  <!-- Arrow 1 -> 2 -->
  <line x1="352" y1="128" x2="440" y2="128" stroke="var(--color-primary, #1a30ae)" stroke-width="4" marker-end="url(#arrow)" />

  <!-- Arrow 2 -> 3 -->
  <line x1="580" y1="168" x2="580" y2="200" stroke="var(--color-primary, #1a30ae)" stroke-width="4" marker-end="url(#arrow)" />

  <!-- Arrow 3 -> 4 -->
  <line x1="448" y1="248" x2="360" y2="248" stroke="var(--color-primary, #1a30ae)" stroke-width="4" marker-end="url(#arrow)" />

  <!-- Arrow 4 -> 5 -->
  <line x1="220" y1="288" x2="220" y2="320" stroke="var(--color-primary, #1a30ae)" stroke-width="4" marker-end="url(#arrow)" />

  <!-- Arrow 5 -> 6 -->
  <line x1="352" y1="368" x2="440" y2="368" stroke="var(--color-primary, #1a30ae)" stroke-width="4" marker-end="url(#arrow)" />

  <!-- Box 1 -->
  <rect x="88" y="88" width="264" height="80" rx="8" fill="var(--color-background, #ffffff)" stroke="var(--color-primary, #1a30ae)" stroke-width="2" />
  <text x="220" y="112" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="var(--color-on-surface, #202124)" text-anchor="middle" dominant-baseline="central">1. ЕРА НА TOKENMAXXING (2025)</text>
  <text x="220" y="144" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-on-surface, #202124)" text-anchor="middle" dominant-baseline="central">Безконтролно пилеене на токени за агенти</text>

  <!-- Box 2 -->
  <rect x="448" y="88" width="264" height="80" rx="8" fill="var(--color-background, #ffffff)" stroke="var(--color-primary, #1a30ae)" stroke-width="2" />
  <text x="580" y="112" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="var(--color-on-surface, #202124)" text-anchor="middle" dominant-baseline="central">2. БЮДЖЕТЕН СБЛЪСЪК (НАЧ. 2026)</text>
  <text x="580" y="144" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-on-surface, #202124)" text-anchor="middle" dominant-baseline="central">Превишени ИИ бюджети (Uber, $500M щети)</text>

  <!-- Box 3 -->
  <rect x="448" y="208" width="264" height="80" rx="8" fill="var(--color-background, #ffffff)" stroke="var(--color-primary, #1a30ae)" stroke-width="2" />
  <text x="580" y="232" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="var(--color-on-surface, #202124)" text-anchor="middle" dominant-baseline="central">3. КОРПОРАТИВНО ОГРАНИЧАВАНЕ</text>
  <text x="580" y="264" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-on-surface, #202124)" text-anchor="middle" dominant-baseline="central">Спиране на ИИ класации; ограничаване</text>

  <!-- Box 4 -->
  <rect x="88" y="208" width="264" height="80" rx="8" fill="var(--color-background, #ffffff)" stroke="var(--color-primary, #1a30ae)" stroke-width="2" />
  <text x="220" y="232" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="var(--color-on-surface, #202124)" text-anchor="middle" dominant-baseline="central">4. НОВИ ЦЕНОВИ МОДЕЛИ</text>
  <text x="220" y="264" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-on-surface, #202124)" text-anchor="middle" dominant-baseline="central">Преход към таксуване "на токен" (GitHub)</text>

  <!-- Box 5 -->
  <rect x="88" y="328" width="264" height="80" rx="8" fill="var(--color-background, #ffffff)" stroke="var(--color-primary, #1a30ae)" stroke-width="2" />
  <text x="220" y="352" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="var(--color-on-surface, #202124)" text-anchor="middle" dominant-baseline="central">5. ГОЛЕМИЯТ ОБРАТ (VIBE SHIFT)</text>
  <text x="220" y="384" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-on-surface, #202124)" text-anchor="middle" dominant-baseline="central">Наемане на хора за контрол и качество</text>

  <!-- Box 6 -->
  <rect x="448" y="328" width="264" height="80" rx="8" fill="var(--color-background, #ffffff)" stroke="var(--color-primary, #1a30ae)" stroke-width="2" />
  <text x="580" y="352" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="var(--color-on-surface, #202124)" text-anchor="middle" dominant-baseline="central">6. ТЪРСЕНЕ НА РЕАЛНИ ПРИХОДИ</text>
  <text x="580" y="384" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-on-surface, #202124)" text-anchor="middle" dominant-baseline="central">Край на хайпа; изискване за ROI от бизнеса</text>
</svg>
