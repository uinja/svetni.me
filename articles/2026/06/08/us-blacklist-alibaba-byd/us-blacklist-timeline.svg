<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <style>
    :root {
      --color-background: #ffffff;
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-on-surface: #202124;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-background: #191d28;
        --color-primary: #9ec2ff;
        --color-secondary: #ffd56a;
        --color-tertiary: #ff6e68;
        --color-on-surface: #e5e0d6;
      }
    }
  </style>

  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />

  <!-- Title & Subtitle -->
  <text x="400" y="48" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="var(--color-primary)">Времева линия на ограниченията по Член 1260H</text>
  <text x="400" y="80" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-surface)">Въвеждане на санкциите от Министерството на отбраната на САЩ (DOD)</text>

  <!-- Main Timeline Axis -->
  <line x1="80" y1="260" x2="720" y2="260" stroke="var(--color-secondary)" stroke-width="4" />
  <polygon points="720,260 704,252 704,268" fill="var(--color-secondary)" />

  <!-- Connectors (Dashed Lines) -->
  <line x1="180" y1="220" x2="180" y2="260" stroke="var(--color-tertiary)" stroke-width="2" stroke-dasharray="4 4" />
  <line x1="400" y1="260" x2="400" y2="292" stroke="var(--color-primary)" stroke-width="2" stroke-dasharray="4 4" />
  <line x1="620" y1="220" x2="620" y2="260" stroke="var(--color-secondary)" stroke-width="2" stroke-dasharray="4 4" />

  <!-- Card 1: 8 юни 2026 г. (Above Timeline) -->
  <rect x="80" y="112" width="200" height="108" rx="8" fill="var(--color-surface)" stroke="var(--color-tertiary)" stroke-width="2" />
  <text x="180" y="132" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-tertiary)">8 юни 2026 г.</text>
  <text x="180" y="160" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)">Актуализация на списъка</text>
  <text x="180" y="180" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)">Общо 188 китайски дружества</text>
  <text x="180" y="200" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="var(--color-primary)">Добавени: Alibaba, BYD, Baidu...</text>

  <!-- Card 2: 30 юни 2026 г. (Below Timeline) -->
  <rect x="300" y="292" width="200" height="108" rx="8" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2" />
  <text x="400" y="312" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-primary)">30 юни 2026 г.</text>
  <text x="400" y="340" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)">Преки договори с DOD</text>
  <text x="400" y="360" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)">Забрана за нови контракти</text>
  <text x="400" y="380" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="var(--color-secondary)">Ограничения за лобиране</text>

  <!-- Card 3: 30 юни 2027 г. (Above Timeline) -->
  <rect x="520" y="112" width="200" height="108" rx="8" fill="var(--color-surface)" stroke="var(--color-secondary)" stroke-width="2" />
  <text x="620" y="132" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-secondary)">30 юни 2027 г.</text>
  <text x="620" y="160" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)">Верига на доставки</text>
  <text x="620" y="180" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)">Забрана за компоненти</text>
  <text x="620" y="200" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="var(--color-tertiary)">Пълна индиректна забрана</text>

  <!-- Timeline Nodes (Circles) -->
  <circle cx="180" cy="260" r="10" fill="var(--color-tertiary)" stroke="var(--color-background)" stroke-width="3" />
  <circle cx="400" cy="260" r="10" fill="var(--color-primary)" stroke="var(--color-background)" stroke-width="3" />
  <circle cx="620" cy="260" r="10" fill="var(--color-secondary)" stroke="var(--color-background)" stroke-width="3" />
</svg>
