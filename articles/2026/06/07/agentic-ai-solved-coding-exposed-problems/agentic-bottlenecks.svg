<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="var(--color-primary)"/>
    </marker>
    <marker id="arrow-sec" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="var(--color-secondary)"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="var(--color-on-surface)">
    Новите тесни участъци при внедряване на Agentic AI
  </text>

  <!-- Flow Line Baseline -->
  <path d="M 105 260 L 730 260" stroke="var(--color-surface)" stroke-width="4" stroke-dasharray="4 4"/>

  <!-- 1. Requirements Node -->
  <rect x="30" y="220" width="150" height="80" rx="8" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2"/>
  <text x="105" y="248" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="var(--color-on-surface)">Дефиниране на</text>
  <text x="105" y="272" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="var(--color-on-surface)">изисквания</text>

  <!-- Arrow A -> B -->
  <line x1="180" y1="260" x2="222" y2="260" stroke="var(--color-primary)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2. AI Agent Node -->
  <rect x="230" y="220" width="150" height="80" rx="8" fill="var(--color-primary)" stroke="var(--color-primary)" stroke-width="2"/>
  <text x="305" y="248" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="var(--color-on-primary)">AI Агент</text>
  <text x="305" y="272" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="var(--color-on-primary)">(Бързо кодиране)</text>

  <!-- Arrow B -> C (representing massive code flood) -->
  <line x1="380" y1="260" x2="422" y2="260" stroke="var(--color-primary)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Multiple small lines mimicking code packets flooding -->
  <path d="M 390 245 L 410 245 M 390 250 L 405 250 M 390 255 L 412 255" stroke="var(--color-tertiary)" stroke-width="1.5"/>
  <path d="M 390 265 L 412 265 M 390 270 L 405 270 M 390 275 L 410 275" stroke="var(--color-tertiary)" stroke-width="1.5"/>

  <!-- 3. Bottleneck Node (Human Review & Integration) -->
  <rect x="430" y="200" width="200" height="120" rx="8" fill="var(--color-surface)" stroke="var(--color-tertiary)" stroke-width="3"/>
  <text x="530" y="230" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="var(--color-on-surface)">Човешки преглед &amp;</text>
  <text x="530" y="260" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="var(--color-on-surface)">Системна интеграция</text>
  <text x="530" y="290" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="var(--color-tertiary)">[ТЕСЕН УЧАСТЪК]</text>

  <!-- Arrow C -> D -->
  <line x1="630" y1="260" x2="672" y2="260" stroke="var(--color-primary)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4. Product Value Node -->
  <rect x="680" y="220" width="100" height="80" rx="8" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2"/>
  <text x="730" y="248" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="var(--color-on-surface)">Бизнес</text>
  <text x="730" y="272" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="var(--color-on-surface)">стойност</text>

  <!-- 5. Legacy Systems (Connecting to Bottleneck Node) -->
  <rect x="450" y="70" width="160" height="60" rx="8" fill="var(--color-surface)" stroke="var(--color-secondary)" stroke-width="2"/>
  <text x="530" y="90" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="var(--color-on-surface)">Сложни legacy</text>
  <text x="530" y="110" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="var(--color-on-surface)">системи</text>
  
  <!-- Arrow Legacy -> C -->
  <line x1="530" y1="130" x2="530" y2="192" stroke="var(--color-secondary)" stroke-width="2" marker-end="url(#arrow-sec)"/>

  <!-- 6. Financial Controls / Spend Risk (Connecting to AI Agent Node) -->
  <rect x="225" y="70" width="160" height="60" rx="8" fill="var(--color-surface)" stroke="var(--color-secondary)" stroke-width="2"/>
  <text x="305" y="90" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="var(--color-on-surface)">Финансов контрол</text>
  <text x="305" y="110" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="var(--color-secondary)">(Риск от runaway разходи)</text>

  <!-- Arrow Financial -> B -->
  <line x1="305" y1="130" x2="305" y2="212" stroke="var(--color-secondary)" stroke-width="2" marker-end="url(#arrow-sec)"/>

  <!-- Explanatory note or Legend -->
  <text x="400" y="440" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-style="italic" fill="var(--color-on-surface)">
    В софтуерното инженерство писането на код никога не е било истинското ограничение.
  </text>
  <text x="400" y="460" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-style="italic" fill="var(--color-on-surface)">
    AI агентите генерират огромни количества код, но изострят тесните участъци около изискванията, прегледа и системната интеграция.
  </text>
</svg>
