<svg width="100%" height="100%" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" rx="8" />

  <!-- Title -->
  <text x="400" y="45" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="central">Еволюция на ИИ стратегията на Microsoft</text>

  <!-- Left Side: OpenAI Dependency -->
  <g id="phase-1">
    <!-- Header Box -->
    <rect x="60" y="90" width="280" height="35" fill="var(--color-surface)" stroke="var(--color-secondary)" stroke-width="1.5" rx="4" />
    <text x="200" y="107" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Фаза 1: Зависимост от партньора (2023–2025)</text>

    <!-- Microsoft Cloud Box -->
    <rect x="90" y="150" width="220" height="60" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2" rx="6" />
    <text x="200" y="170" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Microsoft Azure</text>
    <text x="200" y="190" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" opacity="0.8" text-anchor="middle" dominant-baseline="central">Облачна инфраструктура</text>

    <!-- OpenAI Box -->
    <rect x="90" y="270" width="220" height="60" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2" rx="6" />
    <text x="200" y="290" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">OpenAI GPT-4 / o1</text>
    <text x="200" y="310" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" opacity="0.8" text-anchor="middle" dominant-baseline="central">Ексклузивен лиценз за модели</text>

    <!-- Bidirectional Flow Arrows -->
    <!-- Down Arrow (Compute support) -->
    <path d="M 170 210 L 170 270" fill="none" stroke="var(--color-secondary)" stroke-width="2" />
    <polygon points="170,270 165,260 175,260" fill="var(--color-secondary)" />
    <text x="140" y="240" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Изчислителна мощ</text>

    <!-- Up Arrow (Model integration) -->
    <path d="M 230 270 L 230 210" fill="none" stroke="var(--color-secondary)" stroke-width="2" />
    <polygon points="230,210 225,220 235,220" fill="var(--color-secondary)" />
    <text x="265" y="240" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">ИИ за Copilot</text>
  </g>

  <!-- Middle: Renegotiation / Pivot (October 2025) -->
  <g id="pivot">
    <!-- Connection Arrow -->
    <path d="M 340 230 L 460 230" fill="none" stroke="var(--color-tertiary)" stroke-width="3" stroke-dasharray="5,5" />
    <polygon points="460,230 450,224 450,236" fill="var(--color-tertiary)" />
    
    <rect x="330" y="195" width="140" height="70" fill="var(--color-surface)" stroke="var(--color-tertiary)" stroke-width="1" rx="4" />
    <text x="400" y="215" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="var(--color-tertiary)" text-anchor="middle" dominant-baseline="central">Октомври 2025 г.</text>
    <text x="400" y="235" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Предоговаряне</text>
    <text x="400" y="250" font-family="system-ui, sans-serif" font-size="10" fill="var(--color-on-surface)" opacity="0.8" text-anchor="middle" dominant-baseline="central">на договора</text>
  </g>

  <!-- Right Side: Strategic Autonomy -->
  <g id="phase-2">
    <!-- Header Box -->
    <rect x="460" y="90" width="280" height="35" fill="var(--color-surface)" stroke="var(--color-secondary)" stroke-width="1.5" rx="4" />
    <text x="600" y="107" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Фаза 2: Собствена сувереност (2026+)</text>

    <!-- Microsoft AI Division Box -->
    <rect x="490" y="150" width="220" height="60" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2" rx="6" />
    <text x="600" y="170" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Microsoft AI</text>
    <text x="600" y="190" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" opacity="0.8" text-anchor="middle" dominant-baseline="central">Подразделение (М. Сюлейман)</text>

    <!-- In-house Models Box (Flagship colored) -->
    <rect x="490" y="270" width="220" height="60" fill="var(--color-primary)" stroke="var(--color-primary)" stroke-width="2" rx="6" />
    <text x="600" y="290" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="central">MAI серия (MAI-Thinking-1)</text>
    <text x="600" y="310" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-on-primary)" opacity="0.9" text-anchor="middle" dominant-baseline="central">Вътрешно разработени базови модели</text>

    <!-- Down Arrow (Development) -->
    <path d="M 600 210 L 600 270" fill="none" stroke="var(--color-secondary)" stroke-width="2" />
    <polygon points="600,270 595,260 605,260" fill="var(--color-secondary)" />
    <text x="600" y="240" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central"></text>

    <!-- Ultimate Target Box -->
    <rect x="490" y="390" width="220" height="50" fill="var(--color-surface)" stroke="var(--color-tertiary)" stroke-width="2" rx="6" />
    <text x="600" y="415" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-tertiary)" text-anchor="middle" dominant-baseline="central">Хуманистична суперинтелигентност</text>

    <!-- Down Arrow (To ASI) -->
    <path d="M 600 330 L 600 390" fill="none" stroke="var(--color-tertiary)" stroke-width="2" />
    <polygon points="600,390 595,380 605,380" fill="var(--color-tertiary)" />
  </g>
</svg>
