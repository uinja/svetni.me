<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  
  <!-- Background -->
  <rect width="800" height="500" rx="12" fill="var(--color-surface)" stroke="#e0e0e0" stroke-width="2"/>
  
  <!-- Header Title -->
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="var(--color-on-surface)">
    Архитектура на Service Topology в Netflix
  </text>
  
  <!-- Markers for Arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7f8c8d" />
    </marker>
  </defs>

  <!-- Left: Data Sources Column -->
  <!-- Header for Column -->
  <text x="140" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#7f8c8d">ДАТА ИЗТОЧНИЦИ</text>

  <!-- Card 1: eBPF Network Logs -->
  <rect x="40" y="90" width="200" height="85" rx="8" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="2"/>
  <text x="140" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="var(--color-primary)">eBPF Flow Logs</text>
  <text x="140" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)">Мрежов поток (Ядро)</text>
  <text x="140" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f8c8d">Пълна видимост без код</text>

  <!-- Card 2: IPC Metrics -->
  <rect x="40" y="195" width="200" height="85" rx="8" fill="var(--color-background)" stroke="var(--color-secondary)" stroke-width="2"/>
  <text x="140" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="var(--color-secondary)">IPC Метрики</text>
  <text x="140" y="243" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)">Апликационно ниво</text>
  <text x="140" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f8c8d">Ендпойнти и протоколи</text>

  <!-- Card 3: Distributed Traces -->
  <rect x="40" y="300" width="200" height="85" rx="8" fill="var(--color-background)" stroke="var(--color-tertiary)" stroke-width="2"/>
  <text x="140" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="var(--color-tertiary)">Distributed Traces</text>
  <text x="140" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)">Път на заявката (Trace)</text>
  <text x="140" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f8c8d">Разклонения и жизнени цикли</text>

  <!-- Connector Lines Left-to-Center -->
  <line x1="240" y1="132" x2="295" y2="132" stroke="#bdc3c7" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="240" y1="237" x2="295" y2="237" stroke="#bdc3c7" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="240" y1="342" x2="295" y2="342" stroke="#bdc3c7" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Middle: Aggregation Pipeline -->
  <rect x="300" y="90" width="200" height="295" rx="8" fill="var(--color-background)" stroke="#bdc3c7" stroke-width="2"/>
  <text x="400" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-on-surface)">Конвейер за данни</text>
  
  <!-- Step 1 in Pipeline -->
  <rect x="315" y="135" width="170" height="50" rx="4" fill="#f1f2f6" stroke="#bdc3c7" stroke-width="1"/>
  <text x="400" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="var(--color-on-surface)">1. Инжектиране и филтриране</text>
  <text x="400" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f8c8d">Сливане на трите потока данни</text>

  <!-- Step 2 in Pipeline -->
  <rect x="315" y="205" width="170" height="65" rx="4" fill="#f1f2f6" stroke="#bdc3c7" stroke-width="1"/>
  <text x="400" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="var(--color-on-surface)">2. Междинно резолване</text>
  <text x="400" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#2c3e50">Сливане на LB / NAT / проксита</text>
  <text x="400" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#27ae60" font-weight="600">-> Директни логически ребра</text>

  <!-- Step 3 in Pipeline -->
  <rect x="315" y="290" width="170" height="50" rx="4" fill="#f1f2f6" stroke="#bdc3c7" stroke-width="1"/>
  <text x="400" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="var(--color-on-surface)">3. Персистиране</text>
  <text x="400" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f8c8d">Съхранение в графова БД</text>

  <!-- Connector Line Center-to-Right -->
  <line x1="500" y1="237" x2="555" y2="237" stroke="#bdc3c7" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Right: Unified Graph Visual -->
  <rect x="560" y="90" width="200" height="295" rx="8" fill="var(--color-background)" stroke="#bdc3c7" stroke-width="2"/>
  <text x="660" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-on-surface)">Реално време (Graph)</text>

  <!-- Graph Nodes -->
  <!-- Gateway Node -->
  <circle cx="660" cy="160" r="22" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="2"/>
  <text x="660" y="164" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#2d3436">Zuul API</text>

  <!-- Service A Node -->
  <circle cx="610" cy="250" r="22" fill="#fab1a0" stroke="#e17055" stroke-width="2"/>
  <text x="610" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#2d3436">Услуга А</text>

  <!-- Service B Node -->
  <circle cx="710" cy="250" r="22" fill="#fab1a0" stroke="#e17055" stroke-width="2"/>
  <text x="710" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#2d3436">Услуга Б</text>

  <!-- Database Node -->
  <rect x="630" y="320" width="60" height="35" rx="4" fill="#a29bfe" stroke="#6c5ce7" stroke-width="2"/>
  <text x="660" y="342" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#2d3436">База данни</text>

  <!-- Graph Connections -->
  <line x1="645" y1="178" x2="625" y2="230" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="675" y1="178" x2="695" y2="230" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="610" y1="272" x2="640" y2="320" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="710" y1="272" x2="680" y2="320" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Footer explanation -->
  <rect x="40" y="410" width="720" height="50" rx="6" fill="#e8f3e8" stroke="var(--color-primary)" stroke-width="1" stroke-dasharray="4"/>
  <text x="400" y="432" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="var(--color-primary)">
    Полза: Бърза оценка на радиуса на срив (Blast Radius) и намаляване на средното време за отстраняване на повреди (MTTR).
  </text>
  <text x="400" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f8c8d">
    Системата автоматично елиминира мрежовия шум (балансьори на натоварването и проксита) за чист изглед.
  </text>
</svg>
