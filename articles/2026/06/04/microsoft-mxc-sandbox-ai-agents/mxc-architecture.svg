<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#1a30ae" />
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#1e33af" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />

  <!-- Diagram Title -->
  <text x="400" y="35" font-size="20" font-weight="bold" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="central">Архитектура на Microsoft Execution Containers (MXC)</text>

  <!-- Top Level: AI Agent Box -->
  <rect x="100" y="70" width="430" height="60" rx="8" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2" />
  <text x="315" y="90" font-size="15" font-weight="bold" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="central">ИИ Агент / Приложение (AI Agent)</text>
  <text x="315" y="112" font-size="11" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">GitHub Copilot, OpenAI Coding Agents, NVIDIA OpenShell</text>

  <!-- Arrow 1: Agent to Policies -->
  <line x1="315" y1="130" x2="315" y2="162" stroke="var(--color-primary)" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Layer 2: Security Policies Box -->
  <rect x="100" y="170" width="430" height="60" rx="8" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2" />
  <text x="315" y="190" font-size="15" font-weight="bold" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="central">Политики за сигурност (Security Policies)</text>
  <text x="315" y="212" font-size="11" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Ограничения за достъп до файлове, мрежа, clipboard, креденциали</text>

  <!-- Arrow 2: Policies to Composable Sandbox -->
  <line x1="315" y1="230" x2="315" y2="262" stroke="var(--color-primary)" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Right Side: Governance & Auditing Box -->
  <rect x="560" y="70" width="190" height="160" rx="8" fill="var(--color-surface)" stroke="var(--color-tertiary)" stroke-width="2" />
  <text x="655" y="95" font-size="14" font-weight="bold" fill="var(--color-tertiary)" text-anchor="middle" dominant-baseline="central">Управление и одит</text>
  <text x="655" y="125" font-size="11" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Identity: Entra ID</text>
  <text x="655" y="150" font-size="11" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Policy: Microsoft Intune</text>
  <text x="655" y="175" font-size="11" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Runtime: Microsoft Defender</text>
  <text x="655" y="200" font-size="11" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Management: Agent 365</text>

  <!-- Dash Arrows from Governance to Policies and Sandbox -->
  <path d="M 560 170 L 540 170" stroke="var(--color-tertiary)" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow-dash)" />
  <path d="M 655 230 L 655 262" stroke="var(--color-tertiary)" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow-dash)" />

  <!-- Layer 3: Composable Sandbox Spectrum -->
  <rect x="50" y="270" width="700" height="130" rx="12" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2" stroke-dasharray="6,4" />
  <text x="400" y="288" font-size="13" font-weight="bold" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="central">Microsoft Execution Containers (MXC) — Спектър на изолиране</text>

  <!-- Sub-box 1: Process Isolation -->
  <rect x="70" y="310" width="150" height="80" rx="6" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="1" />
  <text x="145" y="330" font-size="12" font-weight="bold" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="central">Процесна изолация</text>
  <text x="145" y="350" font-size="10" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Lightweight Process</text>
  <text x="145" y="372" font-size="9" fill="gray" text-anchor="middle" dominant-baseline="central">GitHub Copilot CLI</text>

  <!-- Sub-box 2: Session Isolation -->
  <rect x="240" y="310" width="150" height="80" rx="6" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="1" />
  <text x="315" y="330" font-size="12" font-weight="bold" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="central">Сесийна изолация</text>
  <text x="315" y="350" font-size="10" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Desktop / Input / Clipboard</text>
  <text x="315" y="372" font-size="9" fill="gray" text-anchor="middle" dominant-baseline="central">Interactive Agents</text>

  <!-- Sub-box 3: Micro-VM / WSL -->
  <rect x="410" y="310" width="150" height="80" rx="6" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="1" />
  <text x="485" y="330" font-size="12" font-weight="bold" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="central">Micro-VM &amp; WSL</text>
  <text x="485" y="350" font-size="10" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Linux &amp; Strong VM borders</text>
  <text x="485" y="372" font-size="9" fill="gray" text-anchor="middle" dominant-baseline="central">OpenClaw / Linux Agents</text>

  <!-- Sub-box 4: Cloud PC Isolation -->
  <rect x="580" y="310" width="150" height="80" rx="6" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="1" />
  <text x="655" y="330" font-size="12" font-weight="bold" fill="var(--color-primary)" text-anchor="middle" dominant-baseline="central">Windows 365</text>
  <text x="655" y="350" font-size="10" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Cloud-hosted environment</text>
  <text x="655" y="372" font-size="9" fill="gray" text-anchor="middle" dominant-baseline="central">Windows 365 for Agents</text>

  <!-- Arrow 3: Sandbox to Kernel -->
  <line x1="400" y1="400" x2="400" y2="432" stroke="var(--color-primary)" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Bottom Level: OS Kernel Enforcement -->
  <rect x="150" y="440" width="500" height="40" rx="8" fill="var(--color-primary)" stroke="var(--color-primary)" stroke-width="2" />
  <text x="400" y="460" font-size="13" font-weight="bold" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="central">Ядро на ОС (OS Kernel Level Enforcement — Windows &amp; WSL Kernel)</text>

</svg>
