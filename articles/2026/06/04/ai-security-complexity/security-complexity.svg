<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Definitions for markers and styling -->
  <defs>
    <!-- Arrowheads -->
    <marker id="arrow-neutral" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="var(--color-primary)" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#d32f2f" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#388e3c" />
    </marker>
  </defs>

  <style>
    .title { font-family: system-ui, sans-serif; font-size: 22px; font-weight: 600; fill: var(--color-on-surface); }
    .subtitle { font-family: system-ui, sans-serif; font-size: 14px; font-style: italic; fill: var(--color-on-surface); opacity: 0.8; }
    .lane-title { font-family: system-ui, sans-serif; font-size: 15px; font-weight: bold; }
    .box-text { font-family: system-ui, sans-serif; font-size: 14px; fill: var(--color-on-surface); }
    .quote-text { font-family: system-ui, sans-serif; font-size: 15px; font-style: italic; fill: var(--color-on-surface); }
    .box-rect { stroke-width: 2; fill: var(--color-surface); rx: 8; ry: 8; }
  </style>

  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />

  <!-- Main Title -->
  <text x="400" y="44" text-anchor="middle" dominant-baseline="central" class="title">Сигурност срещу Сложност в Ерата на ИИ</text>
  <text x="400" y="76" text-anchor="middle" dominant-baseline="central" class="subtitle">Сравнение на подходите според анализа на Snowflake за VentureBeat</text>

  <!-- ================= LANE 1: COMPLEXITY ================= -->
  <!-- Lane Title -->
  <text x="32" y="104" text-anchor="start" dominant-baseline="central" class="lane-title" fill="#d32f2f">ПЪТ НА СЛОЖНОСТТА (Допълнително добавени контроли)</text>
  
  <!-- Boxes -->
  <!-- U1: Потребител -->
  <rect x="32" y="124" width="144" height="72" class="box-rect" stroke="var(--color-primary)" />
  <text x="104" y="160" text-anchor="middle" dominant-baseline="central" class="box-text">Потребител / Агент</text>

  <!-- U2: Сложни контроли -->
  <rect x="228" y="124" width="144" height="72" class="box-rect" stroke="var(--color-tertiary)" />
  <text x="300" y="160" text-anchor="middle" dominant-baseline="central" class="box-text">
    <tspan x="300" dy="-8">Троми контроли</tspan>
    <tspan x="300" dy="18">и бариери</tspan>
  </text>

  <!-- U3: Заобикаляне -->
  <rect x="428" y="124" width="144" height="72" class="box-rect" stroke="#f57c00" />
  <text x="500" y="160" text-anchor="middle" dominant-baseline="central" class="box-text">
    <tspan x="500" dy="-8">Търсене на</tspan>
    <tspan x="500" dy="18">заобикаляне</tspan>
  </text>

  <!-- U4: Пробив -->
  <rect x="624" y="124" width="144" height="72" class="box-rect" stroke="#d32f2f" fill="#ffebee" />
  <text x="696" y="160" text-anchor="middle" dominant-baseline="central" class="box-text" font-weight="bold">
    <tspan x="696" dy="-8">Уязвимост</tspan>
    <tspan x="696" dy="18">и пробив</tspan>
  </text>

  <!-- Connectors -->
  <path d="M 176 160 L 220 160" stroke="#d32f2f" stroke-width="2" fill="none" marker-end="url(#arrow-red)" />
  <path d="M 372 160 L 420 160" stroke="#d32f2f" stroke-width="2" fill="none" marker-end="url(#arrow-red)" />
  <path d="M 572 160 L 616 160" stroke="#d32f2f" stroke-width="2" fill="none" marker-end="url(#arrow-red)" />

  <!-- ================= LANE 2: SIMPLICITY ================= -->
  <!-- Lane Title -->
  <text x="32" y="304" text-anchor="start" dominant-baseline="central" class="lane-title" fill="#388e3c">ПЪТ НА ПРОСТОТАТА (Вградена и интуитивна защита)</text>

  <!-- Boxes -->
  <!-- L1: Потребител -->
  <rect x="32" y="324" width="144" height="72" class="box-rect" stroke="var(--color-primary)" />
  <text x="104" y="360" text-anchor="middle" dominant-baseline="central" class="box-text">Потребител / Агент</text>

  <!-- L2: Невидима защита -->
  <rect x="228" y="324" width="144" height="72" class="box-rect" stroke="var(--color-primary)" />
  <text x="300" y="360" text-anchor="middle" dominant-baseline="central" class="box-text">
    <tspan x="300" dy="-8">Вградена защита</tspan>
    <tspan x="300" dy="18">по подразбиране</tspan>
  </text>

  <!-- L3: Лесен достъп -->
  <rect x="428" y="324" width="144" height="72" class="box-rect" stroke="var(--color-primary)" />
  <text x="500" y="360" text-anchor="middle" dominant-baseline="central" class="box-text">
    <tspan x="500" dy="-8">Интуитивен и</tspan>
    <tspan x="500" dy="18">лесен процес</tspan>
  </text>

  <!-- L4: Сигурност -->
  <rect x="624" y="324" width="144" height="72" class="box-rect" stroke="#388e3c" fill="#e8f5e9" />
  <text x="696" y="360" text-anchor="middle" dominant-baseline="central" class="box-text" font-weight="bold">
    <tspan x="696" dy="-8">Успешна и</tspan>
    <tspan x="696" dy="18">сигурна среда</tspan>
  </text>

  <!-- Connectors -->
  <path d="M 176 360 L 220 360" stroke="#388e3c" stroke-width="2" fill="none" marker-end="url(#arrow-green)" />
  <path d="M 372 360 L 420 360" stroke="#388e3c" stroke-width="2" fill="none" marker-end="url(#arrow-green)" />
  <path d="M 572 360 L 616 360" stroke="#388e3c" stroke-width="2" fill="none" marker-end="url(#arrow-green)" />

  <!-- Quote/Summary at Bottom -->
  <rect x="32" y="428" width="736" height="48" fill="var(--color-surface)" stroke="var(--color-tertiary)" stroke-width="1" rx="4" ry="4" />
  <text x="400" y="452" text-anchor="middle" dominant-baseline="central" class="quote-text">„Най-сигурният път трябва да бъде най-лесният път за крайния потребител.“</text>
</svg>
