<svg width="100%" height="100%" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="var(--color-primary)">СРАВНЕНИЕ НА АИ АРХИТЕКТУРИТЕ</text>

  <!-- Left Column: Traditional AI (LLM) -->
  <g id="traditional-column">
    <!-- Border container -->
    <rect x="50" y="80" width="320" height="380" rx="12" ry="12" fill="var(--color-surface)" stroke="var(--color-secondary)" stroke-width="2" />
    
    <!-- Subtitle -->
    <text x="210" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="var(--color-on-surface)">Традиционен AI (LLM)</text>

    <!-- Block 1: Training -->
    <rect x="70" y="140" width="280" height="70" rx="8" ry="8" fill="var(--color-background)" stroke="var(--color-on-surface)" stroke-opacity="0.1" />
    <text x="210" y="170" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-surface)">Статично обучение</text>
    <text x="210" y="190" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" fill-opacity="0.7">Пре-трениране върху терабайти данни</text>

    <!-- Block 2: Infrastructure -->
    <rect x="70" y="230" width="280" height="70" rx="8" ry="8" fill="var(--color-background)" stroke="var(--color-on-surface)" stroke-opacity="0.1" />
    <text x="210" y="260" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-surface)">Масивна инфраструктура</text>
    <text x="210" y="280" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" fill-opacity="0.7">Хиляди GPU чипове и гигаватни центрове</text>

    <!-- Block 3: Power -->
    <rect x="70" y="320" width="280" height="70" rx="8" ry="8" fill="var(--color-background)" stroke="var(--color-on-surface)" stroke-opacity="0.1" />
    <text x="210" y="350" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-surface)">Енергоемък процес</text>
    <text x="210" y="370" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" fill-opacity="0.7">> 600W на чип (мегавати общо за клъстер)</text>
  </g>

  <!-- Right Column: Neuro AI (Flourish) -->
  <g id="neuro-column">
    <!-- Border container -->
    <rect x="430" y="80" width="320" height="380" rx="12" ry="12" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="3" />
    
    <!-- Subtitle -->
    <text x="590" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="var(--color-primary)">Невро-AI (Flourish)</text>

    <!-- Block 1: Training -->
    <rect x="450" y="140" width="280" height="70" rx="8" ry="8" fill="var(--color-primary)" />
    <text x="590" y="170" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="var(--color-on-primary)">Непрекъснато самообучение</text>
    <text x="590" y="190" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-primary)">Динамично адаптиране в реално време</text>

    <!-- Block 2: Infrastructure -->
    <rect x="450" y="230" width="280" height="70" rx="8" ry="8" fill="var(--color-primary)" />
    <text x="590" y="260" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="var(--color-on-primary)">Cortex AI архитектура</text>
    <text x="590" y="280" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-primary)">Моделирана по биологични кортикални колони</text>

    <!-- Block 3: Power -->
    <rect x="450" y="320" width="280" height="70" rx="8" ry="8" fill="var(--color-primary)" />
    <text x="590" y="350" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="var(--color-on-primary)">Минимален енергиен отпечатък</text>
    <text x="590" y="370" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-primary)">Цел: под 50W (мозъкът консумира ~20W)</text>
  </g>
</svg>
