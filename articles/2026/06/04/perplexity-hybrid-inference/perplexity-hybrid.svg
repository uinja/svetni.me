<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-surface)" rx="16"/>
  
  <!-- Title -->
  <text x="400" y="52" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="var(--color-on-surface)" text-anchor="middle">Хибридно локално-облачно AI оркестриране</text>
  <text x="400" y="80" font-family="system-ui, sans-serif" font-size="14" fill="var(--color-on-surface)" opacity="0.7" text-anchor="middle">Динамично насочване на задачите в реално време (Perplexity)</text>
  
  <!-- User Input Block -->
  <rect x="48" y="220" width="128" height="64" rx="8" fill="var(--color-primary)" />
  <text x="112" y="252" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="middle">Потребителска задача</text>
  
  <!-- Orchestration Engine (Center) -->
  <rect x="272" y="188" width="180" height="128" rx="12" fill="var(--color-secondary)" stroke="var(--color-tertiary)" stroke-width="2" />
  <text x="362" y="224" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="middle">Оркестратор</text>
  <text x="362" y="248" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="middle">(Personal Computer)</text>
  <text x="362" y="272" font-family="system-ui, sans-serif" font-size="10" fill="var(--color-on-primary)" opacity="0.8" text-anchor="middle" dominant-baseline="middle">Разпознава нива на сигурност</text>

  <!-- Local Device (Top Branch) -->
  <rect x="552" y="128" width="200" height="88" rx="8" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="2" />
  <text x="652" y="152" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="middle">Локално устройство (PC)</text>
  <text x="652" y="172" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-on-surface)" opacity="0.8" text-anchor="middle" dominant-baseline="middle">Intel Ultra 3 / NVIDIA Spark</text>
  <text x="652" y="192" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-primary)" font-weight="500" text-anchor="middle" dominant-baseline="middle">Конфиденциални данни</text>

  <!-- Frontier Cloud (Bottom Branch) -->
  <rect x="552" y="284" width="200" height="88" rx="8" fill="var(--color-background)" stroke="var(--color-tertiary)" stroke-width="2" />
  <text x="652" y="308" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="middle">Облачна инфраструктура</text>
  <text x="652" y="328" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-on-surface)" opacity="0.8" text-anchor="middle" dominant-baseline="middle">Фронтиер модели (GPT, Claude)</text>
  <text x="652" y="348" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-tertiary)" font-weight="500" text-anchor="middle" dominant-baseline="middle">Тежки логически задачи</text>

  <!-- Arrows / Flows -->
  <!-- User to Orchestrator -->
  <path d="M 176 252 L 268 252" stroke="var(--color-on-surface)" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  
  <!-- Orchestrator to Local -->
  <path d="M 452 220 Q 500 172 548 172" stroke="var(--color-primary)" stroke-width="2" fill="none" marker-end="url(#arrow-primary)" />
  <text x="496" y="164" font-family="system-ui, sans-serif" font-size="10" fill="var(--color-primary)" font-weight="500" text-anchor="middle" dominant-baseline="middle">Локална обработка</text>

  <!-- Orchestrator to Cloud -->
  <path d="M 452 284 Q 500 328 548 328" stroke="var(--color-tertiary)" stroke-width="2" fill="none" marker-end="url(#arrow-tertiary)" />
  <text x="496" y="344" font-family="system-ui, sans-serif" font-size="10" fill="var(--color-tertiary)" font-weight="500" text-anchor="middle" dominant-baseline="middle">Изпращане към облак</text>
  
  <!-- Markers for arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="var(--color-on-surface)" />
    </marker>
    <marker id="arrow-primary" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="var(--color-primary)" />
    </marker>
    <marker id="arrow-tertiary" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="var(--color-tertiary)" />
    </marker>
  </defs>
</svg>
