<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%" filterUnits="userSpaceOnUse">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="0" dy="4" />
      <feComponentTransfer><feFuncA type="linear" slope="0.08" /></feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="grad-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a30ae" />
      <stop offset="100%" stop-color="#3f51b5" />
    </linearGradient>
    <linearGradient id="grad-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0" />
      <stop offset="100%" stop-color="#e91e63" />
    </linearGradient>
    <linearGradient id="grad-neutral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa" />
      <stop offset="100%" stop-color="#e8eaed" />
    </linearGradient>
    
    <!-- Marker for Arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#1a30ae" />
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#5f6368" />
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#e91e63" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="650" rx="16" fill="var(--color-background, #ffffff)" />

  <!-- Outer Borders/Containers for Lanes -->
  <!-- 1. Online Serving Lane -->
  <rect x="20" y="50" width="960" height="260" rx="12" fill="none" stroke="var(--color-primary, #1a30ae)" stroke-width="1.5" stroke-dasharray="6,6" />
  <rect x="30" y="40" width="220" height="25" rx="4" fill="var(--color-primary, #1a30ae)" />
  <text x="40" y="57" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold">ОНЛАЙН КАНАЛ (Serving Lane)</text>
  
  <!-- 2. Offline Loop -->
  <rect x="20" y="340" width="960" height="280" rx="12" fill="none" stroke="#5f6368" stroke-width="1.5" stroke-dasharray="6,6" />
  <rect x="30" y="330" width="220" height="25" rx="4" fill="#5f6368" />
  <text x="40" y="347" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold">ОФЛАЙН ЦИКЪЛ (Offline Loop)</text>

  <!-- ==================== ONLINE LANE ELEMENTS ==================== -->
  
  <!-- Input Node -->
  <g transform="translate(45, 130)" filter="url(#shadow)">
    <rect width="110" height="70" rx="8" fill="#f8f9fa" stroke="#dadce0" stroke-width="1.5" />
    <text x="55" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#202124">Актив &amp;</text>
    <text x="55" y="48" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#202124">Контекст</text>
    <!-- Code, lineage, ownership -->
    <text x="55" y="62" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#5f6368">(код, връзки, собственик)</text>
  </g>

  <!-- Evidence brief assembly -->
  <g transform="translate(195, 120)" filter="url(#shadow)">
    <rect width="150" height="90" rx="8" fill="#ffffff" stroke="var(--color-primary, #1a30ae)" stroke-width="2" />
    <text x="75" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="var(--color-primary, #1a30ae)">Evidence Brief</text>
    <text x="75" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#202124">Подготовка</text>
    <rect x="15" y="55" width="120" height="22" rx="4" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1" />
    <text x="75" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1a73e8">Маскирани лични данни</text>
  </g>

  <!-- Deterministic Rules Engine (Lane A) -->
  <g transform="translate(425, 75)" filter="url(#shadow)">
    <rect width="200" height="70" rx="8" fill="var(--color-surface, #f8f9fa)" stroke="var(--color-primary, #1a30ae)" stroke-width="2" />
    <text x="100" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="var(--color-primary, #1a30ae)">Детерминистични правила</text>
    <text x="100" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#202124">Бърз филтър (~85% трафик)</text>
    <text x="100" y="60" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e8e3e" font-weight="bold">&lt; 10 ms латентност</text>
  </g>

  <!-- LLM Fallback (Lane B) -->
  <g transform="translate(425, 185)" filter="url(#shadow)">
    <rect width="200" height="70" rx="8" fill="#fdf2f8" stroke="#db2777" stroke-width="2" />
    <text x="100" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#db2777">LLM Резервен филтър</text>
    <text x="100" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#202124">За нови/сложни активи (~15%)</text>
    <text x="100" y="60" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#d01880" font-weight="bold">Секунди латентност</text>
  </g>

  <!-- Output Node -->
  <g transform="translate(725, 130)" filter="url(#shadow)">
    <rect width="180" height="70" rx="8" fill="#ffffff" stroke="var(--color-primary, #1a30ae)" stroke-width="2" />
    <text x="90" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#202124">Класификационен изход</text>
    <text x="90" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5f6368">категория, надеждност,</text>
    <text x="90" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5f6368">следа (trace), версия</text>
  </g>

  <!-- Connections (Online Lane) -->
  <!-- Input to Evidence Brief -->
  <path d="M 155 165 L 195 165" fill="none" stroke="var(--color-primary, #1a30ae)" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Evidence Brief to split -->
  <path d="M 345 165 L 385 165" fill="none" stroke="var(--color-primary, #1a30ae)" stroke-width="2" />
  
  <!-- Split to Rules Engine -->
  <path d="M 385 165 L 385 110 L 425 110" fill="none" stroke="var(--color-primary, #1a30ae)" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Split to LLM Fallback (dashed fallback arrow) -->
  <path d="M 385 165 L 385 220 L 425 220" fill="none" stroke="#db2777" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-accent)" />
  <text x="355" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#db2777" font-weight="bold">Несъвпадение</text>

  <!-- Rules Engine to Output -->
  <path d="M 625 110 L 685 110 L 685 150 L 725 150" fill="none" stroke="var(--color-primary, #1a30ae)" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- LLM Fallback to Output -->
  <path d="M 625 220 L 685 220 L 685 180 L 725 180" fill="none" stroke="#db2777" stroke-width="2" marker-end="url(#arrow-accent)" />

  <!-- ==================== OFFLINE LOOP ELEMENTS ==================== -->
  
  <!-- Nightly Audit & Sampling -->
  <g transform="translate(735, 390)" filter="url(#shadow)">
    <rect width="160" height="70" rx="8" fill="var(--color-surface, #f8f9fa)" stroke="#5f6368" stroke-width="2" />
    <text x="80" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#202124">Среднощен одит</text>
    <text x="80" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5f6368">Извличане на извадки</text>
    <text x="80" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5f6368">от реални решения</text>
  </g>

  <!-- Ground-Truth Reference Loop (Reviewed labels) -->
  <g transform="translate(540, 390)" filter="url(#shadow)">
    <rect width="160" height="70" rx="8" fill="#e6f4ea" stroke="#137333" stroke-width="2" />
    <text x="80" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#137333">Reference Loop</text>
    <text x="80" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#202124">Еталонна база данни</text>
    <text x="80" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#137333" font-weight="bold">Етикетирани от хора</text>
  </g>

  <!-- Multi-Panel Judge (V1, V2, V3) -->
  <g transform="translate(520, 500)" filter="url(#shadow)">
    <rect width="200" height="90" rx="8" fill="#ffffff" stroke="#e91e63" stroke-width="2" />
    <text x="100" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#e91e63">Мултипанелен съдия</text>
    <!-- Three Panels -->
    <rect x="15" y="32" width="170" height="15" rx="3" fill="#fce7f3" />
    <text x="100" y="43" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#db2777" font-weight="bold">3 независими гледни точки (LLM)</text>
    <text x="100" y="65" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#202124">Мнозинствен вот &amp; оценка</text>
    <text x="100" y="78" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#5f6368">през Коефициент на Капа (κ)</text>
  </g>

  <!-- Tuning Controller -->
  <g transform="translate(315, 500)" filter="url(#shadow)">
    <rect width="170" height="90" rx="8" fill="#f8f9fa" stroke="#1a73e8" stroke-width="2" />
    <text x="85" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a73e8">Tuning Controller</text>
    <!-- States -->
    <text x="85" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#202124">Контрол на качеството</text>
    <rect x="20" y="52" width="130" height="28" rx="4" fill="#e8f0fe" stroke="#1a73e8" stroke-dasharray="2,2" />
    <text x="85" y="69" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1a73e8">Maintaining / Pausing</text>
  </g>

  <!-- Rule Distillation -->
  <g transform="translate(110, 500)" filter="url(#shadow)">
    <rect width="170" height="90" rx="8" fill="#ffffff" stroke="var(--color-primary, #1a30ae)" stroke-width="2" />
    <text x="85" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="var(--color-primary, #1a30ae)">Дестилация на правила</text>
    <text x="85" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#202124">Преобразуване на LLM</text>
    <text x="85" y="56" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#202124">модели в чист код</text>
    <!-- Stages -->
    <text x="85" y="75" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#137333" font-weight="bold">Holdout &amp; Shadow тестове</text>
  </g>

  <!-- Connections (Offline Loop) -->
  <!-- Output sampling to Audit -->
  <path d="M 815 200 L 815 390" fill="none" stroke="#5f6368" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow-gray)" />
  <text x="825" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5f6368">Извадка решения</text>

  <!-- Audit samples to Multi-panel Judge -->
  <path d="M 815 460 L 815 545 L 720 545" fill="none" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow-gray)" />
  
  <!-- Reference Loop to Multi-panel Judge -->
  <path d="M 620 460 L 620 500" fill="none" stroke="#137333" stroke-width="1.5" marker-end="url(#arrow-gray)" />
  
  <!-- Multi-panel Judge to Tuning Controller -->
  <path d="M 520 545 L 485 545" fill="none" stroke="#1a73e8" stroke-width="1.5" marker-end="url(#arrow-gray)" />
  <text x="502" y="535" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1a73e8" text-anchor="middle" font-weight="bold">κ</text>
  
  <!-- Tuning Controller to Rule Distillation -->
  <path d="M 315 545 L 280 545" fill="none" stroke="var(--color-primary, #1a30ae)" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="298" y="535" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--color-primary, #1a30ae)" text-anchor="middle" font-weight="bold">ОК</text>

  <!-- Rule Distillation to deterministic Rules Engine (atomic CAS swap) -->
  <path d="M 195 500 L 195 290" fill="none" stroke="var(--color-primary, #1a30ae)" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 195 290 L 450 290 L 450 145" fill="none" stroke="var(--color-primary, #1a30ae)" stroke-width="2" />
  
  <rect x="230" y="278" width="190" height="22" rx="4" fill="#e8f0fe" stroke="var(--color-primary, #1a30ae)" stroke-width="1" />
  <text x="325" y="293" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="var(--color-primary, #1a30ae)">Atomic CAS Swap (Нови правила)</text>

  <!-- Legends and Metadata info -->
  <!-- Masking invariant label -->
  <circle cx="270" cy="180" r="14" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2" />
  <text x="270" y="184" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1a73e8">M</text>
  
  <text x="35" y="625" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#5f6368" font-weight="bold">M = Маскираща инварианта (Предотвратява циклично учене)</text>
</svg>
