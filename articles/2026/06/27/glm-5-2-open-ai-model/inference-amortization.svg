<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <defs>
    <marker id="arrow-primary" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 8 5 L 0 8 Z" fill="var(--color-primary)" />
    </marker>
    <marker id="arrow-secondary" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 8 5 L 0 8 Z" fill="var(--color-secondary)" />
    </marker>
    <marker id="arrow-tertiary" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 8 5 L 0 8 Z" fill="var(--color-tertiary)" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="var(--color-background)" />

  <!-- SECTION 1: Standard Inference (Repetitive) -->
  <!-- Title Standard -->
  <text x="40" y="44" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="var(--color-on-surface)">
    1. Стандартно извеждане (Пълно преизчисляване)
  </text>
  <text x="40" y="64" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-tertiary)" font-weight="500">
    Контекстът се изчислява отново при всяка стъпка • Висока латентност и разход на токени
  </text>

  <!-- Nodes Standard -->
  <!-- Input Block -->
  <rect x="60" y="96" width="180" height="72" fill="var(--color-surface)" stroke="var(--color-on-surface)" stroke-width="1" rx="8" />
  <text x="150" y="128" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="var(--color-on-surface)">
    Контекст + Нов промпт
  </text>
  <text x="150" y="148" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-tertiary)">
    (Пълно изпращане)
  </text>

  <!-- Arrow to LLM -->
  <path d="M 240 132 L 348 132" stroke="var(--color-primary)" stroke-width="2" fill="none" marker-end="url(#arrow-primary)" />

  <!-- LLM Processing -->
  <rect x="360" y="80" width="200" height="104" fill="var(--color-primary)" opacity="0.08" rx="8" />
  <rect x="360" y="80" width="200" height="104" fill="none" stroke="var(--color-primary)" stroke-width="2" rx="8" />
  <text x="460" y="124" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-primary)">
    ИИ Модел (LLM)
  </text>
  <text x="460" y="148" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-primary)">
    Пълно преизчисляване
  </text>

  <!-- Arrow to Output -->
  <path d="M 560 132 L 668 132" stroke="var(--color-primary)" stroke-width="2" fill="none" marker-end="url(#arrow-primary)" />

  <!-- Output Block -->
  <rect x="680" y="96" width="92" height="72" fill="var(--color-surface)" stroke="var(--color-on-surface)" stroke-width="1" rx="8" />
  <text x="726" y="132" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="var(--color-on-surface)">
    Отговор
  </text>


  <!-- SECTION 2: Amortized Inference (State Reused) -->
  <!-- Divider -->
  <line x1="40" y1="216" x2="760" y2="216" stroke="var(--color-surface)" stroke-width="2" stroke-dasharray="6" />

  <!-- Title Amortized -->
  <text x="40" y="248" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="var(--color-on-surface)">
    2. Амортизация на инференцията (Кеширано състояние)
  </text>
  <text x="40" y="268" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-secondary)" font-weight="500">
    Контекстът се изчислява еднократно • Междинните състояния се съхраняват в KV кеш за следващи стъпки
  </text>

  <!-- Input Block 1 (First Step) -->
  <rect x="60" y="296" width="180" height="52" fill="var(--color-surface)" stroke="var(--color-on-surface)" stroke-width="1" rx="8" />
  <text x="150" y="322" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="var(--color-on-surface)">
    Дълъг контекст (напр. код)
  </text>

  <!-- Arrow to LLM First Step -->
  <path d="M 240 322 L 348 322" stroke="var(--color-primary)" stroke-width="2" fill="none" marker-end="url(#arrow-primary)" />

  <!-- LLM Processing -->
  <rect x="360" y="296" width="200" height="96" fill="var(--color-primary)" opacity="0.08" rx="8" />
  <rect x="360" y="296" width="200" height="96" fill="none" stroke="var(--color-primary)" stroke-width="2" rx="8" />
  <text x="460" y="336" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="var(--color-primary)">
    ИИ Модел (LLM)
  </text>
  <text x="460" y="356" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="11" fill="var(--color-primary)">
    Еднократна обработка
  </text>

  <!-- Downward arrow to cache -->
  <path d="M 460 392 L 460 412" stroke="var(--color-secondary)" stroke-width="2" fill="none" marker-end="url(#arrow-secondary)" />

  <!-- KV Cache Block -->
  <rect x="360" y="420" width="200" height="48" fill="var(--color-secondary)" opacity="0.08" rx="8" />
  <rect x="360" y="420" width="200" height="48" fill="none" stroke="var(--color-secondary)" stroke-width="2" rx="8" />
  <text x="460" y="444" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="var(--color-secondary)">
    Векторен KV Кеш
  </text>

  <!-- Input Block 2 (Subsequent Prompt) -->
  <rect x="60" y="364" width="180" height="52" fill="var(--color-surface)" stroke="var(--color-on-surface)" stroke-width="1" rx="8" />
  <text x="150" y="390" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="var(--color-on-surface)">
    Нова заявка (Промпт)
  </text>

  <!-- Arrow from Subsequent Prompt to LLM -->
  <path d="M 240 390 L 320 390 C 340 390 340 368 348 368" stroke="var(--color-primary)" stroke-width="2" fill="none" marker-end="url(#arrow-primary)" />

  <!-- Loopback Arrow from Cache to LLM (representing reuse) -->
  <path d="M 560 444 C 612 444 612 344 572 344" stroke="var(--color-tertiary)" stroke-width="2" fill="none" marker-end="url(#arrow-tertiary)" />
  <text x="632" y="390" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="var(--color-tertiary)">
    Бързо преизползване
  </text>

  <!-- Arrow to final output -->
  <path d="M 560 322 L 668 322" stroke="var(--color-primary)" stroke-width="2" fill="none" marker-end="url(#arrow-primary)" />

  <!-- Output Block -->
  <rect x="680" y="296" width="92" height="72" fill="var(--color-surface)" stroke="var(--color-on-surface)" stroke-width="1" rx="8" />
  <text x="726" y="332" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="var(--color-on-surface)">
    Отговор
  </text>

</svg>
