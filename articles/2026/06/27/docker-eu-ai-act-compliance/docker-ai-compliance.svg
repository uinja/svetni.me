<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 8 5 L 0 8 z" fill="var(--color-primary)" />
    </marker>
  </defs>
  
  <!-- Outer Container Card -->
  <rect x="16" y="16" width="768" height="468" rx="24" fill="var(--color-surface)" stroke="var(--color-primary)" stroke-width="2" stroke-opacity="0.15" />
  
  <!-- Title and Subtitle -->
  <text x="400" y="68" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="var(--color-on-surface)" text-anchor="middle" dominant-baseline="central">Сигурност на контейнерите за EU AI Act</text>
  <text x="400" y="104" font-family="system-ui, sans-serif" font-size="14" font-weight="400" fill="var(--color-on-surface)" fill-opacity="0.7" text-anchor="middle" dominant-baseline="central">Стъпки за съответствие и защита на жизнения цикъл с Docker</text>
  
  <!-- BOX 1: Base Image -->
  <rect x="44" y="180" width="152" height="200" rx="16" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="2" stroke-opacity="0.2" />
  <path d="M 44 196 A 16 16 0 0 1 60 180 L 180 180 A 16 16 0 0 1 196 196 L 196 220 L 44 220 Z" fill="var(--color-primary)" />
  <text x="120" y="200" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="central">1. БАЗА</text>
  
  <!-- Cylinder Base Image Icon -->
  <path d="M 100 248 L 100 272 C 100 278 140 278 140 272 L 140 248 Z" fill="none" stroke="var(--color-primary)" stroke-width="3" />
  <ellipse cx="120" cy="248" rx="20" ry="6" fill="var(--color-secondary)" fill-opacity="0.2" stroke="var(--color-primary)" stroke-width="2" />
  <path d="M 100 260 C 100 266 140 266 140 260" fill="none" stroke="var(--color-primary)" stroke-width="2" />
  <path d="M 100 272 C 100 278 140 278 140 272" fill="none" stroke="var(--color-primary)" stroke-width="2" />
  
  <!-- Box 1 Text -->
  <text x="120" y="316" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" font-weight="500" text-anchor="middle" dominant-baseline="central">Сигурни базови</text>
  <text x="120" y="336" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" font-weight="500" text-anchor="middle" dominant-baseline="central">изображения</text>
  <text x="120" y="356" font-family="system-ui, sans-serif" font-size="9" fill="var(--color-primary)" font-weight="700" text-anchor="middle" dominant-baseline="central">БЕЗОПАСНА ОСНОВА</text>

  <!-- Arrow 1 -->
  <line x1="196" y1="280" x2="226" y2="280" stroke="var(--color-primary)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" />

  <!-- BOX 2: SBOM -->
  <rect x="232" y="180" width="152" height="200" rx="16" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="2" stroke-opacity="0.2" />
  <path d="M 232 196 A 16 16 0 0 1 248 180 L 368 180 A 16 16 0 0 1 384 196 L 384 220 L 232 220 Z" fill="var(--color-primary)" />
  <text x="308" y="200" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="central">2. SBOM</text>
  
  <!-- Document Icon -->
  <rect x="292" y="244" width="32" height="40" rx="4" fill="var(--color-secondary)" fill-opacity="0.2" stroke="var(--color-primary)" stroke-width="3" />
  <line x1="298" y1="254" x2="318" y2="254" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round" />
  <line x1="298" y1="264" x2="318" y2="264" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round" />
  <line x1="298" y1="274" x2="310" y2="274" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round" />
  
  <!-- Box 2 Text -->
  <text x="308" y="316" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" font-weight="500" text-anchor="middle" dominant-baseline="central">Опис на</text>
  <text x="308" y="336" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" font-weight="500" text-anchor="middle" dominant-baseline="central">зависимостите</text>
  <text x="308" y="356" font-family="system-ui, sans-serif" font-size="9" fill="var(--color-primary)" font-weight="700" text-anchor="middle" dominant-baseline="central">ПРОЗРАЧНОСТ</text>

  <!-- Arrow 2 -->
  <line x1="384" y1="280" x2="414" y2="280" stroke="var(--color-primary)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" />

  <!-- BOX 3: Scan -->
  <rect x="420" y="180" width="152" height="200" rx="16" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="2" stroke-opacity="0.2" />
  <path d="M 420 196 A 16 16 0 0 1 436 180 L 556 180 A 16 16 0 0 1 572 196 L 572 220 L 420 220 Z" fill="var(--color-primary)" />
  <text x="496" y="200" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="central">3. АНАЛИЗ</text>
  
  <!-- Shield Icon -->
  <path d="M 480 244 L 496 238 L 512 244 L 512 264 C 512 276 496 284 496 284 C 496 284 480 276 480 264 Z" fill="var(--color-secondary)" fill-opacity="0.2" stroke="var(--color-primary)" stroke-width="3" stroke-linejoin="round" />
  <path d="M 490 262 L 494 266 L 504 256" fill="none" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Box 3 Text -->
  <text x="496" y="316" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" font-weight="500" text-anchor="middle" dominant-baseline="central">Сканиране за</text>
  <text x="496" y="336" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" font-weight="500" text-anchor="middle" dominant-baseline="central">уязвимости</text>
  <text x="496" y="356" font-family="system-ui, sans-serif" font-size="9" fill="var(--color-primary)" font-weight="700" text-anchor="middle" dominant-baseline="central">СЪВМЕСТИМОСТ</text>

  <!-- Arrow 3 -->
  <line x1="572" y1="280" x2="602" y2="280" stroke="var(--color-primary)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" />

  <!-- BOX 4: Isolated Runtime -->
  <rect x="608" y="180" width="152" height="200" rx="16" fill="var(--color-background)" stroke="var(--color-primary)" stroke-width="2" stroke-opacity="0.2" />
  <path d="M 608 196 A 16 16 0 0 1 624 180 L 744 180 A 16 16 0 0 1 760 196 L 760 220 L 608 220 Z" fill="var(--color-primary)" />
  <text x="684" y="200" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="var(--color-on-primary)" text-anchor="middle" dominant-baseline="central">4. ИЗОЛАЦИЯ</text>
  
  <!-- Lock Icon -->
  <rect x="672" y="254" width="24" height="20" rx="3" fill="var(--color-secondary)" fill-opacity="0.2" stroke="var(--color-primary)" stroke-width="3" />
  <path d="M 677 254 L 677 246 C 677 242 691 242 691 246 L 691 254" fill="none" stroke="var(--color-primary)" stroke-width="2.5" stroke-linecap="round" />
  
  <!-- Box 4 Text -->
  <text x="684" y="316" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" font-weight="500" text-anchor="middle" dominant-baseline="central">Изолирана среда</text>
  <text x="684" y="336" font-family="system-ui, sans-serif" font-size="12" fill="var(--color-on-surface)" font-weight="500" text-anchor="middle" dominant-baseline="central">за високорисков AI</text>
  <text x="684" y="356" font-family="system-ui, sans-serif" font-size="9" fill="var(--color-primary)" font-weight="700" text-anchor="middle" dominant-baseline="central">КОНТРОЛ НА РИСКА</text>
</svg>
