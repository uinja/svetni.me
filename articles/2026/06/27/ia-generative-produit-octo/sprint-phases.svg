<svg width="100%" height="100%" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="var(--color-primary)" />
    </marker>
  </defs>
  <style id="dynamic-palette">
    :root {
      --color-primary: #1a30ae;
      --color-secondary: #1b31ae;
      --color-tertiary: #1e33af;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-on-primary: #ffffff;
      --color-on-surface: #202124;
    }
  </style>
  <style>
    .bg { fill: var(--color-background); }
    .card { fill: var(--color-surface); stroke: var(--color-primary); stroke-width: 2; }
    .card-header-circle { fill: var(--color-primary); }
    .day-num { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 700; fill: var(--color-on-primary); text-anchor: middle; dominant-baseline: central; }
    .day-label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 700; fill: var(--color-tertiary); text-anchor: middle; }
    .day-title { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: var(--color-on-surface); text-anchor: middle; }
    .day-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 400; fill: var(--color-on-surface); opacity: 0.8; text-anchor: middle; }
    .arrow { stroke: var(--color-primary); stroke-width: 2; fill: none; stroke-dasharray: 4,4; }
    .title-main { font-family: system-ui, -apple-system, sans-serif; font-size: 26px; font-weight: 800; fill: var(--color-on-surface); text-anchor: middle; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 400; fill: var(--color-secondary); text-anchor: middle; }
    .card-sep { stroke: var(--color-secondary); stroke-width: 1; opacity: 0.2; }
  </style>

  <!-- Background -->
  <rect width="800" height="500" class="bg" />

  <!-- Main Title -->
  <text x="400" y="60" class="title-main">Петте фази на AI Learning Sprint</text>
  <text x="400" y="90" class="subtitle">Интензивно практическо обучение на OCTO Technology за продуктови екипи</text>

  <!-- Card 1 -->
  <g id="card-day1">
    <rect x="36" y="150" width="124" height="260" class="card" rx="8" ry="8" />
    <circle cx="98" cy="190" r="18" class="card-header-circle" />
    <text x="98" y="190" class="day-num">1</text>
    <text x="98" y="230" class="day-label">ДЕН 1</text>
    <text x="98" y="255" class="day-title">Въведение</text>
    <line x1="52" y1="270" x2="144" y2="270" class="card-sep" />
    <text x="98" y="295" class="day-desc">Основни понятия</text>
    <text x="98" y="320" class="day-desc">Пазарни анализи</text>
    <text x="98" y="345" class="day-desc">9 споделени REX</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M 164 280 L 184 280" class="arrow" marker-end="url(#arrow)" />

  <!-- Card 2 -->
  <g id="card-day2">
    <rect x="188" y="150" width="124" height="260" class="card" rx="8" ry="8" />
    <circle cx="250" cy="190" r="18" class="card-header-circle" />
    <text x="250" y="190" class="day-num">2</text>
    <text x="250" y="230" class="day-label">ДЕН 2</text>
    <text x="250" y="255" class="day-title">Дискавъри</text>
    <line x1="204" y1="270" x2="296" y2="270" class="card-sep" />
    <text x="250" y="295" class="day-desc">Продуктово мислене</text>
    <text x="250" y="320" class="day-desc">Казуси за ИИ</text>
    <text x="250" y="345" class="day-desc">Дизайн сесии</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M 316 280 L 336 280" class="arrow" marker-end="url(#arrow)" />

  <!-- Card 3 -->
  <g id="card-day3">
    <rect x="340" y="150" width="124" height="260" class="card" rx="8" ry="8" />
    <circle cx="402" cy="190" r="18" class="card-header-circle" />
    <text x="402" y="190" class="day-num">3</text>
    <text x="402" y="230" class="day-label">ДЕН 3</text>
    <text x="402" y="255" class="day-title">Прототипиране</text>
    <line x1="356" y1="270" x2="448" y2="270" class="card-sep" />
    <text x="402" y="295" class="day-desc">2-дневен хакатон</text>
    <text x="402" y="320" class="day-desc">4 ИИ прототипа</text>
    <text x="402" y="345" class="day-desc">BMAD методология</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M 468 280 L 488 280" class="arrow" marker-end="url(#arrow)" />

  <!-- Card 4 -->
  <g id="card-day4">
    <rect x="492" y="150" width="124" height="260" class="card" rx="8" ry="8" />
    <circle cx="554" cy="190" r="18" class="card-header-circle" />
    <text x="554" y="190" class="day-num">4</text>
    <text x="554" y="230" class="day-label">ДЕН 4</text>
    <text x="554" y="255" class="day-title">Рефлексия</text>
    <line x1="508" y1="270" x2="600" y2="270" class="card-sep" />
    <text x="554" y="295" class="day-desc">Wall of Wonder</text>
    <text x="554" y="320" class="day-desc">Анализ на работата</text>
    <text x="554" y="345" class="day-desc">Нови оферти</text>
  </g>

  <!-- Arrow 4 -->
  <path d="M 620 280 L 640 280" class="arrow" marker-end="url(#arrow)" />

  <!-- Card 5 -->
  <g id="card-day5">
    <rect x="644" y="150" width="124" height="260" class="card" rx="8" ry="8" />
    <circle cx="706" cy="190" r="18" class="card-header-circle" />
    <text x="706" y="190" class="day-num">5</text>
    <text x="706" y="230" class="day-label">ДЕН 5</text>
    <text x="706" y="255" class="day-title">Презентация</text>
    <line x1="660" y1="270" x2="752" y2="270" class="card-sep" />
    <text x="706" y="295" class="day-desc">Pitch пред жури</text>
    <text x="706" y="320" class="day-desc">Обратна връзка</text>
    <text x="706" y="345" class="day-desc">Промяна на ролята</text>
  </g>
</svg>
